<!doctype html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8" />

<title>AI 가이드 허브 (오프라인)</title>
<style>
  /* 다크(기본) */
  html[data-theme="dark"]{
    --bg:#0b0d12; --panel:#11141b; --panel-2:#161a23; --border:#222836;
    --fg:#e6e8ee; --muted:#8a93a6; --accent:#6366f1;
    --main-bg:#fff; --main-fg:#111;
    --footer-bg:#fafafa; --footer-border:#eee; --footer-btn-bg:#fff; --footer-btn-border:#ddd; --footer-btn-hover:#f0f0f0;
  }
  /* 라이트 */
  html[data-theme="light"]{
    --bg:#f7f8fb; --panel:#ffffff; --panel-2:#f0f2f7; --border:#e3e6ee;
    --fg:#1a1d24; --muted:#5b6473; --accent:#6366f1;
    --main-bg:#fff; --main-fg:#111;
    --footer-bg:#fafafa; --footer-border:#eee; --footer-btn-bg:#fff; --footer-btn-border:#ddd; --footer-btn-hover:#f0f0f0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Pretendard","Noto Sans KR",sans-serif;}
  a{color:inherit}
  header{position:sticky;top:0;z-index:10;background:color-mix(in srgb, var(--bg) 90%, transparent);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--border);}
  .bar{display:flex;align-items:center;gap:12px;padding:12px 20px;}
  .bar h1{font-size:16px;margin:0;font-weight:700}
  .bar .crumb{color:var(--muted);font-size:14px}
  .bar button{background:var(--panel-2);color:var(--fg);border:1px solid var(--border);
    padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px}
  .bar button:hover{background:color-mix(in srgb, var(--panel-2) 70%, var(--accent) 10%)}
  .toolbar{display:flex;gap:8px;margin-left:auto}
  .layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 53px);}
  aside{border-right:1px solid var(--border);background:var(--panel);overflow-y:auto;max-height:calc(100vh - 53px);}
  .cat{padding:12px 16px 4px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;
    display:flex;align-items:center;gap:8px}
  .dot{width:8px;height:8px;border-radius:50%}
  .nav a{display:block;padding:6px 16px 6px 32px;font-size:14px;color:var(--muted);text-decoration:none;cursor:pointer}
  .nav a:hover{background:var(--panel-2);color:var(--fg)}
  .nav a.active{background:var(--panel-2);color:var(--fg);font-weight:600;border-left:3px solid var(--accent);padding-left:29px}
  main{overflow-y:auto;max-height:calc(100vh - 53px);background:var(--main-bg);color:var(--main-fg)}
  .home{padding:40px 32px;background:var(--bg);color:var(--fg);min-height:100%}
  .home h2{font-size:28px;margin:0 0 8px}
  .home p.lead{color:var(--muted);margin:0 0 32px}
  .cat-block{margin-bottom:32px}
  .cat-block h3{font-size:18px;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;
    transition:transform .15s,border-color .15s}
  .card:hover{transform:translateY(-2px);border-color:var(--accent)}
  .card .t{font-weight:600;margin-bottom:4px}
  .card .s{color:var(--muted);font-size:13px}
  .guide-wrap{padding:24px 32px;max-width:1100px;margin:0 auto}
  .footer-nav{display:flex;justify-content:space-between;padding:16px 32px;border-top:1px solid var(--footer-border);background:var(--footer-bg)}
  .footer-nav button{background:var(--footer-btn-bg);border:1px solid var(--footer-btn-border);padding:8px 14px;border-radius:8px;cursor:pointer}
  .footer-nav button:hover{background:var(--footer-btn-hover)}
  @media (max-width: 800px){ .layout{grid-template-columns:1fr} aside{display:none} }
</style>
</head>
<body>
<header>
  <div class="bar">
    <button id="homeBtn">🏠 홈</button>
    <h1>AI 가이드 허브</h1>
    <span class="crumb" id="crumb"></span>
    <div class="toolbar">
      <button id="themeBtn" title="테마 전환">🌙 다크</button>
      <button id="printBtn" style="display:none">🖨 인쇄 / PDF</button>
    </div>
  </div>
</header>
<div class="layout">
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>

le\">대화 간 지속\u003c/div>\n          \u003cdiv class=\"mi-desc\">새 대화에서도 이전에 기억한 내용 유지. 반복 설명 불필요.\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"memory-item\">\n          \u003cdiv class=\"mi-icon\">✏️\u003c/div>\n          \u003cdiv class=\"mi-title\">수동 편집\u003c/div>\n          \u003cdiv class=\"mi-desc\">설정 → 개인화 → 메모리에서 저장된 내용 확인·삭제·수정 가능.\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"memory-item\">\n          \u003cdiv class=\"mi-icon\">🔒\u003c/div>\n          \u003cdiv class=\"mi-title\">프라이버시 제어\u003c/div>\n          \u003cdiv class=\"mi-desc\">임시 채팅 모드로 메모리 없이 대화. 데이터 학습 제외 설정 가능.\u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n\u003c/main>\n\n\u003ca class=\"back-top\" href=\"#top\" title=\"맨 위로\">↑\u003c/a>\n\n\u003cfooter>\n  \u003cstrong>ChatGPT 완전 활용 가이드\u003c/strong> · OpenAI · 2026\u003cbr>\n  \u003cspan style=\"margin-top:6px;display:block;\">AI 도구 활용 교육 자료 — 내부 배포용\u003c/span>\n\u003c/footer>\n\n","styles":"\n    :root {\n      --brand:      #10A37F;\n      --brand-dark: #0D8065;\n      --brand-deep: #085C4A;\n      --brand-light:#E6F4F0;\n      --brand-mid:  #A8DDD0;\n      --text:      #1A1A2E;\n      --text-2:    #4B5575;\n      --text-3:    #8892B0;\n      --bg:        #F7FBF9;\n      --white:     #FFFFFF;\n      --border:    #C8E6DF;\n      --shadow:    0 4px 24px rgba(16,163,127,0.10);\n      --shadow-lg: 0 8px 40px rgba(16,163,127,0.16);\n      --radius:    16px;\n      --radius-sm: 10px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }\n    .nav-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }\n    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--brand); text-decoration: none; }\n    .nav-logo .logo-icon { width: 34px; height: 34px; background: #1A1A2E; border-radius: 10px; display: flex; align-items: center; justify-content: center; }\n    .nav-links { display: flex; gap: 6px; list-style: none; }\n    .nav-links a { text-decoration: none; color: var(--text-2); font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: all .2s; }\n    .nav-links a:hover { background: var(--brand-light); color: var(--brand); }\n\n    .hero { background: linear-gradient(135deg, #0A0F1E 0%, #1A1A2E 40%, #0D4A38 70%, #10A37F 100%); color: white; padding: 80px 24px 60px; text-align: center; position: relative; overflow: hidden; }\n    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(16,163,127,0.35) 0%, transparent 55%), radial-gradient(ellipse at 80% 20%, rgba(16,163,127,0.2) 0%, transparent 50%); }\n    .hero-inner { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }\n    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.25); border-radius: 100px; padding: 6px 16px; font-size: 13px; font-weight: 500; margin-bottom: 28px; }\n    .hero-badge span { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }\n    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }\n    .hero-logo { width: 90px; height: 90px; margin: 0 auto 24px; background: rgba(255,255,255,0.12); border-radius: 24px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); }\n    .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; margin-bottom: 16px; line-height: 1.2; }\n    .hero p { font-size: 1.1rem; opacity: .85; margin-bottom: 40px; }\n    .hero-stats { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; }\n    .hero-stat { text-align: center; }\n    .hero-stat strong { display: block; font-size: 1.6rem; font-weight: 700; }\n    .hero-stat span { font-size: .8rem; opacity: .7; }\n\n    main { max-width: 960px; margin: 0 auto; padding: 60px 24px; }\n    .section { margin-bottom: 72px; }\n    .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }\n    .section-num { width: 40px; height: 40px; background: var(--brand); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; flex-shrink: 0; }\n    .section-header h2 { font-family: 'Noto Serif KR', serif; font-size: 1.6rem; font-weight: 700; }\n\n    .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 28px; box-shadow: var(--shadow); margin-bottom: 16px; }\n\n    .plan-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }\n    .plan-card { background: white; border-radius: var(--radius); border: 2px solid var(--border); padding: 24px; transition: all .2s; }\n    .plan-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }\n    .plan-card.featured { border-color: var(--brand); }\n    .plan-badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: .8rem; font-weight: 700; margin-bottom: 10px; }\n    .pb-free { background: #F3F4F6; color: var(--text-2); }\n    .pb-plus { background: var(--brand); color: white; }\n    .pb-pro { background: #7C3AED; color: white; }\n    .pb-team { background: #1A1A2E; color: white; }\n    .plan-name { font-weight: 700; font-size: 1.05rem; margin-bottom: 6px; }\n    .plan-price { font-size: .9rem; color: var(--brand); font-weight: 600; margin-bottom: 10px; }\n    .plan-features { font-size: .83rem; color: var(--text-2); line-height: 1.8; }\n    .plan-features li { list-style: none; padding-left: 0; }\n    .plan-features li::before { content: '✓ '; color: var(--brand); }\n\n    .model-timeline { display: flex; flex-direction: column; gap: 16px; }\n    .mt-item { display: grid; grid-template-columns: 120px 1fr; gap: 20px; align-items: start; background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; }\n    .mt-label { text-align: center; padding: 12px; background: var(--brand-light); border-radius: var(--radius-sm); }\n    .mt-label strong { display: block; font-size: 1rem; color: var(--brand); font-weight: 700; }\n    .mt-label span { font-size: .78rem; color: var(--brand-dark); }\n    .mt-name { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }\n    .mt-desc { font-size: .87rem; color: var(--text-2); }\n    .mt-tag { display: inline-block; background: var(--brand-light); color: var(--brand-dark); border-radius: 6px; padding: 2px 8px; font-size: .78rem; margin-top: 8px; margin-right: 4px; font-weight: 600; }\n\n    .prompt-box { background: #0A0F1E; border-radius: var(--radius); padding: 24px; color: white; margin-bottom: 16px; }\n    .prompt-label { font-size: .8rem; color: #6B7280; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 12px; }\n    .prompt-content { font-family: monospace; font-size: .92rem; line-height: 1.8; color: #E2E8F0; }\n    .prompt-content .tag { color: #10A37F; font-weight: 700; }\n    .prompt-content .val { color: #7DD3FC; }\n\n    .gpt-tool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }\n    .gpt-tool { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px; transition: all .2s; }\n    .gpt-tool:hover { border-color: var(--brand); background: var(--brand-light); }\n    .gpt-tool-icon { font-size: 2rem; margin-bottom: 10px; }\n    .gpt-tool-name { font-weight: 700; font-size: .95rem; margin-bottom: 6px; }\n    .gpt-tool-desc { font-size: .82rem; color: var(--text-2); }\n\n    .memory-demo { background: linear-gradient(135deg, #0A0F1E, #0D4A38); color: white; border-radius: var(--radius); padding: 28px; }\n    .memory-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }\n    .memory-items { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }\n    .memory-item { background: rgba(255,255,255,0.1); border-radius: var(--radius-sm); padding: 14px; }\n    .mi-icon { font-size: 1.4rem; margin-bottom: 8px; }\n    .mi-title { font-size: .9rem; font-weight: 600; margin-bottom: 4px; color: #4ade80; }\n    .mi-desc { font-size: .82rem; opacity: .8; }\n\n    .tip-box { background: linear-gradient(135deg, var(--brand-light), #fff); border-left: 4px solid var(--brand); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 16px 20px; margin-top: 12px; }\n    .tip-box strong { color: var(--brand-dark); }\n\n    .back-top { position: fixed; bottom: 32px; right: 32px; width: 46px; height: 46px; background: var(--brand); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: var(--shadow-lg); font-size: 20px; transition: all .2s; }\n    .back-top:hover { background: var(--brand-dark); transform: translateY(-2px); }\n\n    footer { background: #0A0F1E; color: rgba(255,255,255,0.6); text-align: center; padding: 32px 24px; font-size: .88rem; }\n    footer strong { color: var(--brand); }\n  "},"claude":{"body":"\n\n\u003cnav class=\"nav\" id=\"top\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#top\">\n      \u003cdiv class=\"logo-icon\">\n        \u003csvg viewBox=\"0 0 24 24\">\u003cpath d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z\"/>\u003c/svg>\n      \u003c/div>\n      Claude 가이드\n    \u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#models\">모델 선택\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#prompt\">프롬프트\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#skills\">스킬\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#projects\">프로젝트\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#integrations\">연결 서비스\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"hero-inner\">\n    \u003cdiv class=\"hero-badge\">\u003cspan>\u003c/span> Anthropic · 2025\u003c/div>\n    \u003cdiv class=\"hero-logo\">\n      \u003csvg width=\"54\" height=\"54\" viewBox=\"0 0 64 64\" fill=\"none\">\n        \u003crect width=\"64\" height=\"64\" rx=\"16\" fill=\"rgba(255,255,255,0.1)\"/>\n        \u003cpath d=\"M32 10C20 10 12 20 12 32C12 44 20 54 32 54C44 54 52 44 52 32C52 20 44 10 32 10Z\" fill=\"rgba(255,255,255,0.3)\"/>\n        \u003cpath d=\"M24 38L32 16L40 38\" stroke=\"white\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n        \u003cpath d=\"M26.5 32H37.5\" stroke=\"white\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n      \u003c/svg>\n    \u003c/div>\n    \u003ch1>Claude\u003cbr>완전 활용 가이드\u003c/h1>\n    \u003cp>Anthropic의 AI 어시스턴트 — 모델 선택부터 프롬프트, 스킬, 프로젝트 설정까지\u003c/p>\n    \u003cdiv class=\"hero-stats\">\n      \u003cdiv class=\"hero-stat\">\u003cstrong>3종\u003c/strong>\u003cspan>모델 라인업\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>200K\u003c/strong>\u003cspan>컨텍스트 토큰\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>무제한\u003c/strong>\u003cspan>프로젝트 생성\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>50+\u003c/strong>\u003cspan>연결 가능 서비스\u003c/span>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003cmain>\n\n  \u003c!-- 1. 모델 선택 -->\n  \u003cdiv class=\"section\" id=\"models\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num\">1\u003c/div>\n      \u003ch2>모델 선택 가이드\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"grid-3\">\n      \u003cdiv class=\"model-card\">\n        \u003cspan class=\"model-badge badge-opus\">Claude Opus\u003c/span>\n        \u003cdiv class=\"model-name\">최고 성능\u003c/div>\n        \u003cdiv class=\"model-desc\">복잡한 분석, 장문 보고서, 다단계 추론에 최적. 가장 강력하지만 응답 속도가 느림.\u003c/div>\n        \u003cdiv class=\"model-tags\">\n          \u003cspan class=\"model-tag\">🧠 복잡한 분석\u003c/span>\n          \u003cspan class=\"model-tag\">📄 장문 작성\u003c/span>\n          \u003cspan class=\"model-tag\">🔬 연구\u003c/span>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"model-card recommended\">\n        \u003cspan class=\"model-badge badge-sonnet\">Claude Sonnet ⭐ 추천\u003c/span>\n        \u003cdiv class=\"model-name\">균형 잡힌 선택\u003c/div>\n        \u003cdiv class=\"model-desc\">성능과 속도의 황금비율. 일상 업무, 코딩, 문서 작성에 가장 적합. 대부분의 상황에서 최선.\u003c/div>\n        \u003cdiv class=\"model-tags\">\n          \u003cspan class=\"model-tag\">💼 업무 자동화\u003c/span>\n          \u003cspan class=\"model-tag\">💻 코딩\u003c/span>\n          \u003cspan class=\"model-tag\">✍️ 문서 작성\u003c/span>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"model-card\">\n        \u003cspan class=\"model-badge badge-haiku\">Claude Haiku\u003c/span>\n        \u003cdiv class=\"model-name\">빠른 응답\u003c/div>\n        \u003cdiv class=\"model-desc\">단순 요약, 분류, 빠른 Q&A에 최적화. API 활용 및 대량 처리에 비용 효율적.\u003c/div>\n        \u003cdiv class=\"model-tags\">\n          \u003cspan class=\"model-tag\">⚡ 빠른 응답\u003c/span>\n          \u003cspan class=\"model-tag\">📊 분류/요약\u003c/span>\n          \u003cspan class=\"model-tag\">🔄 API 처리\u003c/span>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- 2. 프롬프트 설정 -->\n  \u003cdiv class=\"section\" id=\"prompt\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num\">2\u003c/div>\n      \u003ch2>시스템 프롬프트 & 세부 설정\u003c/h2>\n    \u003c/div>\n\n    \u003cdiv class=\"system-prompt-demo\" style=\"margin-bottom:20px;\">\n      \u003cdiv class=\"sp-header\">\n        \u003cspan style=\"font-size:20px;\">⚙️\u003c/span>\n        \u003cdiv>\n          \u003cdiv class=\"title\">시스템 프롬프트 구성 예시\u003c/div>\n          \u003cdiv style=\"font-size:.8rem;color:var(--brand-dark);\">프로젝트 → 설정 → System Prompt에 입력\u003c/div>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"sp-body\">\n        \u003cdiv class=\"sp-field\">\n          \u003clabel>역할 정의 (Persona)\u003c/label>\n          \u003cp>당신은 한국 정부 ICT 정책 전문가입니다. 과기부 예산 문서를 분석하고, 정책 보고서를 작성하는 데 특화되어 있습니다.\u003c/p>\n        \u003c/div>\n        \u003cdiv class=\"sp-field\">\n          \u003clabel>출력 형식 (Format)\u003c/label>\n          \u003cp>한국어로 답변하세요. 보고서는 □ ○ ― 기호를 사용한 계층 구조로 작성하고, 핵심 수치는 표로 정리하세요.\u003c/p>\n        \u003c/div>\n        \u003cdiv class=\"sp-field\">\n          \u003clabel>제약 조건 (Constraints)\u003c/label>\n          \u003cp>출처를 명시하세요. 불확실한 내용은 \"추가 확인 필요\"로 표기하세요. 1차 문서 외 추측을 배제하세요.\u003c/p>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"prompt-box\">\n      \u003cdiv class=\"prompt-label\">실전 시스템 프롬프트 템플릿\u003c/div>\n      \u003cdiv class=\"prompt-content\">\n\u003cspan class=\"tag\">[역할]\u003c/span> \u003cspan class=\"val\">당신은 {직책/전문분야} 전문가입니다.\u003c/span>\u003cbr>\n\u003cspan class=\"comment\"># 구체적일수록 좋음: \"시니어 파이썬 개발자\", \"한국어 카피라이터\"\u003c/span>\u003cbr>\u003cbr>\n\u003cspan class=\"tag\">[맥락]\u003c/span> \u003cspan class=\"val\">현재 {프로젝트명}을 진행 중입니다.\u003c/span>\u003cbr>\n\u003cspan class=\"val\">{핵심 배경 정보 2-3줄}\u003c/span>\u003cbr>\u003cbr>\n\u003cspan class=\"tag\">[출력 규칙]\u003c/span>\u003cbr>\n\u003cspan class=\"val\">- 언어: 한국어 (기술 용어는 영문 병기)\u003c/span>\u003cbr>\n\u003cspan class=\"val\">- 형식: {마크다운/표/리스트 등}\u003c/span>\u003cbr>\n\u003cspan class=\"val\">- 길이: {간결/상세} 위주\u003c/span>\u003cbr>\u003cbr>\n\u003cspan class=\"tag\">[금지 사항]\u003c/span> \u003cspan class=\"val\">불필요한 서문 생략, 확인되지 않은 수치 사용 금지\u003c/span>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"grid-2\">\n      \u003cdiv class=\"card\">\n        \u003cdiv class=\"card-title\">\u003cdiv class=\"icon\">🎯\u003c/div>효과적인 프롬프트 기법\u003c/div>\n        \u003cdiv style=\"font-size:.9rem;color:var(--text-2);line-height:1.9;\">\n          \u003cdiv style=\"margin-bottom:8px;\">\u003cstrong>Chain of Thought:\u003c/strong> \"단계별로 생각하며 설명해줘\"\u003c/div>\n          \u003cdiv style=\"margin-bottom:8px;\">\u003cstrong>Few-shot 예시:\u003c/strong> 입력→출력 예시 2-3개 제공\u003c/div>\n          \u003cdiv style=\"margin-bottom:8px;\">\u003cstrong>XML 태그 구조화:\u003c/strong> &lt;context&gt;, &lt;task&gt;, &lt;format&gt;\u003c/div>\n          \u003cdiv>\u003cstrong>역할 부여:\u003c/strong> \"당신은 10년 경력의...\"\u003c/div>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"card\">\n        \u003cdiv class=\"card-title\">\u003cdiv class=\"icon\">⚡\u003c/div>Claude 고유 강점 활용\u003c/div>\n        \u003cdiv style=\"font-size:.9rem;color:var(--text-2);line-height:1.9;\">\n          \u003cdiv style=\"margin-bottom:8px;\">\u003cstrong>긴 문서 분석:\u003c/strong> 200K 토큰으로 책 한 권 통째로\u003c/div>\n          \u003cdiv style=\"margin-bottom:8px;\">\u003cstrong>정확한 지시 이해:\u003c/strong> 복잡한 조건도 빠짐없이 처리\u003c/div>\n          \u003cdiv style=\"margin-bottom:8px;\">\u003cstrong>코드 작업:\u003c/strong> Claude Code 연동 시 최강 조합\u003c/div>\n          \u003cdiv>\u003cstrong>윤리적 추론:\u003c/strong> 민감한 주제에서 균형 잡힌 시각\u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- 3. 스킬 -->\n  \u003cdiv class=\"section\" id=\"skills\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num\">3\u003c/div>\n      \u003ch2>Claude 스킬 (Skills) 활용\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"card\" style=\"margin-bottom:20px;\">\n      \u003cp style=\"color:var(--text-2);margin-bottom:16px;\">스킬은 Claude에게 특정 작업 방식을 학습시키는 지시 문서입니다. SKILL.md 파일로 관리하며, 프로젝트에 업로드하면 자동으로 적용됩니다.\u003c/p>\n      \u003cdiv class=\"skill-grid\">\n        \u003cdiv class=\"skill-item\">\n          \u003cdiv class=\"skill-icon\">📝\u003c/div>\n          \u003cdiv class=\"skill-info\">\n            \u003cstrong>HWPX 생성\u003c/strong>\n            \u003cspan>한글 보고서 자동화\u003c/span>\n          \u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"skill-item\">\n          \u003cdiv class=\"skill-icon\">📊\u003c/div>\n          \u003cdiv class=\"skill-info\">\n            \u003cstrong>Excel/PPTX\u003c/strong>\n            \u003cspan>문서 생성 자동화\u003c/span>\n          \u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"skill-item\">\n          \u003cdiv class=\"skill-icon\">🤖\u003c/div>\n          \u003cdiv class=\"skill-info\">\n            \u003cstrong>AI 전략 보고서\u003c/strong>\n            \u003cspan>시장 분석 특화\u003c/span>\n          \u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"skill-item\">\n          \u003cdiv class=\"skill-icon\">🔤\u003c/div>\n          \u003cdiv class=\"skill-info\">\n            \u003cstrong>문장 정규화\u003c/strong>\n            \u003cspan>공문서 스타일 변환\u003c/span>\n          \u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"skill-item\">\n          \u003cdiv class=\"skill-icon\">💻\u003c/div>\n          \u003cdiv class=\"skill-info\">\n            \u003cstrong>Frontend 설계\u003c/strong>\n            \u003cspan>UI/UX 컴포넌트\u003c/span>\n          \u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"skill-item\">\n          \u003cdiv class=\"skill-icon\">📖\u003c/div>\n          \u003cdiv class=\"skill-info\">\n            \u003cstrong>PDF 파싱\u003c/strong>\n            \u003cspan>문서 구조 추출\u003c/span>\n          \u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\">\n      \u003cstrong>💡 스킬 파일 작성 팁:\u003c/strong> SKILL.md에 \"언제 이 스킬을 사용하는가\"를 명확히 명시하고, 입출력 예시를 포함시키면 Claude가 자동으로 적절한 스킬을 선택합니다.\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- 4. 프로젝트 -->\n  \u003cdiv class=\"section\" id=\"projects\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num\">4\u003c/div>\n      \u003ch2>프로젝트 (Projects) 설정\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"grid-2\">\n      \u003cdiv class=\"project-card\">\n        \u003cdiv class=\"project-header\">\n          \u003cdiv class=\"project-icon\">📋\u003c/div>\n          \u003cdiv>\n            \u003cdiv class=\"project-title\">업무 자동화 프로젝트\u003c/div>\n            \u003cdiv class=\"project-subtitle\">반복 문서 작업 제거\u003c/div>\n          \u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"project-body\">\n          \u003cdiv class=\"project-feature\">시스템 프롬프트로 역할과 출력 형식 고정\u003c/div>\n          \u003cdiv class=\"project-feature\">SKILL.md 파일 업로드로 전문 기능 추가\u003c/div>\n          \u003cdiv class=\"project-feature\">참고 문서(예시 보고서) 컨텍스트에 유지\u003c/div>\n          \u003cdiv class=\"project-feature\">대화 히스토리로 맥락 지속 유지\u003c/div>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"project-card\">\n        \u003cdiv class=\"project-header\">\n          \u003cdiv class=\"project-icon\">💻\u003c/div>\n          \u003cdiv>\n            \u003cdiv class=\"project-title\">개발 지원 프로젝트\u003c/div>\n            \u003cdiv class=\"project-subtitle\">코딩 생산성 극대화\u003c/div>\n          \u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"project-body\">\n          \u003cdiv class=\"project-feature\">코드베이스 구조 문서를 프로젝트 파일로 업로드\u003c/div>\n          \u003cdiv class=\"project-feature\">코딩 컨벤션, 스택 정보 시스템 프롬프트에 명시\u003c/div>\n          \u003cdiv class=\"project-feature\">에러 로그 첨부하면 즉시 디버깅\u003c/div>\n          \u003cdiv class=\"project-feature\">Claude Code와 연동하여 직접 코드 실행\u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"card\" style=\"margin-top:16px;\">\n      \u003cdiv class=\"card-title\">\u003cdiv class=\"icon\">🗂️\u003c/div>프로젝트 구성 3단계\u003c/div>\n      \u003cdiv style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:8px;\">\n        \u003cdiv style=\"text-align:center;padding:16px;background:var(--bg);border-radius:var(--radius-sm);\">\n          \u003cdiv style=\"font-size:2rem;margin-bottom:8px;\">1️⃣\u003c/div>\n          \u003cstrong style=\"display:block;margin-bottom:4px;\">시스템 프롬프트\u003c/strong>\n          \u003cspan style=\"font-size:.82rem;color:var(--text-3);\">역할·형식·제약 조건 설정\u003c/span>\n        \u003c/div>\n        \u003cdiv style=\"text-align:center;padding:16px;background:var(--bg);border-radius:var(--radius-sm);\">\n          \u003cdiv style=\"font-size:2rem;margin-bottom:8px;\">2️⃣\u003c/div>\n          \u003cstrong style=\"display:block;margin-bottom:4px;\">파일 업로드\u003c/strong>\n          \u003cspan style=\"font-size:.82rem;color:var(--text-3);\">SKILL.md·참고 문서·데이터\u003c/span>\n        \u003c/div>\n        \u003cdiv style=\"text-align:center;padding:16px;background:var(--bg);border-radius:var(--radius-sm);\">\n          \u003cdiv style=\"font-size:2rem;margin-bottom:8px;\">3️⃣\u003c/div>\n          \u003cstrong style=\"display:block;margin-bottom:4px;\">팀 공유\u003c/strong>\n          \u003cspan style=\"font-size:.82rem;color:var(--text-3);\">Team 플랜에서 협업\u003c/span>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- 5. 연결 서비스 -->\n  \u003cdiv class=\"section\" id=\"integrations\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num\">5\u003c/div>\n      \u003ch2>연결 서비스 & 통합\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"integration-grid\">\n      \u003cdiv class=\"integration-item\">\n        \u003cdiv class=\"int-icon\">📧\u003c/div>\n        \u003cdiv class=\"int-name\">Gmail\u003c/div>\n        \u003cdiv class=\"int-type\">이메일 자동화\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"integration-item\">\n        \u003cdiv class=\"int-icon\">📅\u003c/div>\n        \u003cdiv class=\"int-name\">Google Calendar\u003c/div>\n        \u003cdiv class=\"int-type\">일정 관리\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"integration-item\">\n        \u003cdiv class=\"int-icon\">📁\u003c/div>\n        \u003cdiv class=\"int-name\">Google Drive\u003c/div>\n        \u003cdiv class=\"int-type\">문서 접근\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"integration-item\">\n        \u003cdiv class=\"int-icon\">💬\u003c/div>\n        \u003cdiv class=\"int-name\">Slack\u003c/div>\n        \u003cdiv class=\"int-type\">팀 커뮤니케이션\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"integration-item\">\n        \u003cdiv class=\"int-icon\">📋\u003c/div>\n        \u003cdiv class=\"int-name\">Notion\u003c/div>\n        \u003cdiv class=\"int-type\">지식 베이스\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"integration-item\">\n        \u003cdiv class=\"int-icon\">🗄️\u003c/div>\n        \u003cdiv class=\"int-name\">Supabase\u003c/div>\n        \u003cdiv class=\"int-type\">DB 연동\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"integration-item\">\n        \u003cdiv class=\"int-icon\">🚀\u003c/div>\n        \u003cdiv class=\"int-name\">Vercel\u003c/div>\n        \u003cdiv class=\"int-type\">배포 자동화\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"integration-item\">\n        \u003cdiv class=\"int-icon\">🐙\u003c/div>\n        \u003cdiv class=\"int-name\">GitHub\u003c/div>\n        \u003cdiv class=\"int-type\">코드 관리\u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\" style=\"margin-top:20px;\">\n      \u003cstrong>💡 MCP 서버 활용:\u003c/strong> Model Context Protocol로 외부 서비스와 직접 연결. Claude Code에서 \u003ccode>claude mcp add\u003c/code> 명령으로 추가하면 Claude가 직접 서비스를 제어할 수 있습니다.\n    \u003c/div>\n\n    \u003cdiv class=\"card\" style=\"margin-top:20px;\">\n      \u003cdiv class=\"card-title\">\u003cdiv class=\"icon\">📡\u003c/div>Claude API 활용\u003c/div>\n      \u003ctable class=\"compare-table\" style=\"margin-top:12px;\">\n        \u003cthead>\u003ctr>\u003cth>활용 방식\u003c/th>\u003cth>특징\u003c/th>\u003cth>적합한 용도\u003c/th>\u003c/tr>\u003c/thead>\n        \u003ctbody>\n          \u003ctr>\u003ctd>claude.ai (웹)\u003c/td>\u003ctd>설정 불필요, 즉시 사용\u003c/td>\u003ctd>개인 업무, 프로토타이핑\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>Claude Code (CLI)\u003c/td>\u003ctd>터미널 직접 제어\u003c/td>\u003ctd>개발, 파일 자동화\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>API 직접 호출\u003c/td>\u003ctd>완전한 커스터마이징\u003c/td>\u003ctd>서비스 개발, 대량 처리\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>Artifacts 내 AI\u003c/td>\u003ctd>앱 내 AI 기능 탑재\u003c/td>\u003ctd>인터랙티브 도구 제작\u003c/td>\u003c/tr>\n        \u003c/tbody>\n      \u003c/table>\n    \u003c/div>\n  \u003c/div>\n\n\u003c/main>\n\n\u003ca class=\"back-top\" href=\"#top\" title=\"맨 위로\">↑\u003c/a>\n\n\u003cfooter>\n  \u003cstrong>Claude 완전 활용 가이드\u003c/strong> · Anthropic Claude · 2025\u003cbr>\n  \u003cspan style=\"margin-top:6px;display:block;\">AI 도구 활용 교육 자료 — 내부 배포용\u003c/span>\n\u003c/footer>\n\n","styles":"\n    :root {\n      --brand:      #D97757;\n      --brand-dark: #B85F3F;\n      --brand-deep: #8B3A20;\n      --brand-light:#FDF0EB;\n      --brand-mid:  #F5C4AF;\n      --green:     #22C55E;\n      --red:       #EF4444;\n      --yellow:    #F59E0B;\n      --text:      #1A1A2E;\n      --text-2:    #4B5575;\n      --text-3:    #8892B0;\n      --bg:        #FDF8F5;\n      --white:     #FFFFFF;\n      --border:    #F0D9CC;\n      --shadow:    0 4px 24px rgba(217,119,87,0.10);\n      --shadow-lg: 0 8px 40px rgba(217,119,87,0.16);\n      --radius:    16px;\n      --radius-sm: 10px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }\n    .nav-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }\n    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--brand); text-decoration: none; }\n    .nav-logo .logo-icon { width: 34px; height: 34px; background: var(--brand); border-radius: 10px; display: flex; align-items: center; justify-content: center; }\n    .nav-logo .logo-icon svg { width: 20px; height: 20px; fill: white; }\n    .nav-links { display: flex; gap: 6px; list-style: none; }\n    .nav-links a { text-decoration: none; color: var(--text-2); font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: all .2s; }\n    .nav-links a:hover { background: var(--brand-light); color: var(--brand); }\n\n    .hero { background: linear-gradient(135deg, #2D1B10 0%, #5C2E14 40%, #8B4513 70%, #D97757 100%); color: white; padding: 80px 24px 60px; text-align: center; position: relative; overflow: hidden; }\n    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(217,119,87,0.3) 0%, transparent 60%), radial-gradient(ellipse at 70% 20%, rgba(255,200,150,0.2) 0%, transparent 50%); }\n    .hero-inner { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }\n    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.25); border-radius: 100px; padding: 6px 16px; font-size: 13px; font-weight: 500; margin-bottom: 28px; }\n    .hero-badge span { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }\n    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }\n    .hero-logo { width: 90px; height: 90px; margin: 0 auto 24px; background: rgba(255,255,255,0.15); border-radius: 24px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); }\n    .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; margin-bottom: 16px; line-height: 1.2; }\n    .hero p { font-size: 1.1rem; opacity: .85; margin-bottom: 40px; }\n    .hero-stats { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; }\n    .hero-stat { text-align: center; }\n    .hero-stat strong { display: block; font-size: 1.6rem; font-weight: 700; }\n    .hero-stat span { font-size: .8rem; opacity: .7; }\n\n    main { max-width: 960px; margin: 0 auto; padding: 60px 24px; }\n    .section { margin-bottom: 72px; }\n    .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }\n    .section-num { width: 40px; height: 40px; background: var(--brand); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; flex-shrink: 0; }\n    .section-header h2 { font-family: 'Noto Serif KR', serif; font-size: 1.6rem; font-weight: 700; }\n\n    .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 28px; box-shadow: var(--shadow); margin-bottom: 16px; }\n    .card-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }\n    .card-title .icon { width: 28px; height: 28px; background: var(--brand-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }\n\n    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }\n    .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }\n\n    .model-card { background: white; border-radius: var(--radius); border: 2px solid var(--border); padding: 24px; transition: all .2s; }\n    .model-card:hover { border-color: var(--brand); transform: translateY(-2px); box-shadow: var(--shadow-lg); }\n    .model-card.recommended { border-color: var(--brand); background: var(--brand-light); }\n    .model-badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; margin-bottom: 10px; }\n    .badge-opus { background: #2D1B10; color: white; }\n    .badge-sonnet { background: var(--brand); color: white; }\n    .badge-haiku { background: var(--brand-light); color: var(--brand-dark); }\n    .model-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; }\n    .model-desc { font-size: .88rem; color: var(--text-2); margin-bottom: 14px; }\n    .model-tags { display: flex; flex-wrap: wrap; gap: 6px; }\n    .model-tag { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: .8rem; }\n\n    .prompt-box { background: #1A1A2E; border-radius: var(--radius); padding: 24px; margin-bottom: 16px; color: white; }\n    .prompt-label { font-size: .8rem; color: #8892B0; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 12px; }\n    .prompt-content { font-family: monospace; font-size: .92rem; line-height: 1.8; color: #E2E8F0; }\n    .prompt-content .tag { color: #D97757; font-weight: 700; }\n    .prompt-content .val { color: #7DD3FC; }\n    .prompt-content .comment { color: #6B7280; }\n\n    .system-prompt-demo { background: white; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }\n    .sp-header { background: var(--brand-light); padding: 16px 24px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }\n    .sp-header .title { font-weight: 700; font-size: .95rem; color: var(--brand-dark); }\n    .sp-body { padding: 24px; }\n    .sp-field { margin-bottom: 20px; }\n    .sp-field label { display: block; font-size: .8rem; font-weight: 700; color: var(--text-3); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }\n    .sp-field p { font-size: .92rem; color: var(--text-2); line-height: 1.8; }\n\n    .skill-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }\n    .skill-item { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; display: flex; align-items: center; gap: 12px; transition: all .2s; }\n    .skill-item:hover { border-color: var(--brand); background: var(--brand-light); }\n    .skill-icon { width: 36px; height: 36px; background: var(--brand-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }\n    .skill-info strong { display: block; font-size: .9rem; font-weight: 700; }\n    .skill-info span { font-size: .8rem; color: var(--text-3); }\n\n    .project-card { background: white; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }\n    .project-header { background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%); padding: 20px 24px; color: white; display: flex; align-items: center; gap: 12px; }\n    .project-icon { width: 44px; height: 44px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }\n    .project-title { font-weight: 700; font-size: 1.05rem; }\n    .project-subtitle { font-size: .85rem; opacity: .8; }\n    .project-body { padding: 20px 24px; }\n    .project-feature { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; font-size: .9rem; }\n    .project-feature::before { content: '✓'; color: var(--brand); font-weight: 700; flex-shrink: 0; margin-top: 2px; }\n\n    .integration-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }\n    .integration-item { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 12px; text-align: center; transition: all .2s; }\n    .integration-item:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--brand-mid); }\n    .int-icon { font-size: 28px; margin-bottom: 8px; }\n    .int-name { font-size: .85rem; font-weight: 600; }\n    .int-type { font-size: .75rem; color: var(--text-3); }\n\n    .tip-box { background: linear-gradient(135deg, var(--brand-light), #fff); border-left: 4px solid var(--brand); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 16px 20px; margin-top: 12px; }\n    .tip-box strong { color: var(--brand-dark); }\n\n    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }\n    .tag { background: var(--brand-light); color: var(--brand-dark); border-radius: 6px; padding: 4px 12px; font-size: .82rem; font-weight: 600; }\n\n    .compare-table { width: 100%; border-collapse: collapse; }\n    .compare-table th { background: var(--brand); color: white; padding: 12px 16px; text-align: left; font-weight: 600; font-size: .9rem; }\n    .compare-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: .9rem; }\n    .compare-table tr:last-child td { border-bottom: none; }\n    .compare-table tr:nth-child(even) td { background: var(--bg); }\n\n    .back-top { position: fixed; bottom: 32px; right: 32px; width: 46px; height: 46px; background: var(--brand); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: var(--shadow-lg); font-size: 20px; transition: all .2s; }\n    .back-top:hover { background: var(--brand-dark); transform: translateY(-2px); }\n\n    footer { background: #1A1A2E; color: rgba(255,255,255,0.6); text-align: center; padding: 32px 24px; font-size: .88rem; }\n    footer strong { color: var(--brand); }\n  "},"gemini":{"body":"\n\n\u003cnav class=\"nav\" id=\"top\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#top\">\n      \u003cdiv class=\"logo-icon\">\n        \u003csvg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\">\n          \u003cpath d=\"M12 2L15 9H22L16.5 13.5L18.5 21L12 17L5.5 21L7.5 13.5L2 9H9L12 2Z\" fill=\"white\"/>\n        \u003c/svg>\n      \u003c/div>\n      Gemini 가이드\n    \u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#models\">모델\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#features\">핵심 기능\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#prompt\">프롬프트\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#workspace\">Workspace\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#advanced\">고급 활용\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"hero-inner\">\n    \u003cdiv class=\"hero-badge\">\u003cspan>\u003c/span> Google DeepMind · 2025\u003c/div>\n    \u003cdiv class=\"google-logo\">\n      \u003cdiv class=\"google-dot\" style=\"background:#EA4335;width:22px;height:22px;\">\u003c/div>\n      \u003cdiv class=\"google-dot\" style=\"background:#FBBC04;width:30px;height:30px;\">\u003c/div>\n      \u003cdiv class=\"google-dot\" style=\"background:#34A853;width:22px;height:22px;\">\u003c/div>\n      \u003cdiv class=\"google-dot\" style=\"background:#4285F4;width:26px;height:26px;\">\u003c/div>\n    \u003c/div>\n    \u003ch1>Google Gemini\u003cbr>완전 활용 가이드\u003c/h1>\n    \u003cp>Google의 멀티모달 AI — 텍스트·이미지·영상·음성을 한 번에 처리하는 차세대 AI\u003c/p>\n    \u003cdiv class=\"hero-stats\">\n      \u003cdiv class=\"hero-stat\">\u003cstrong>2M\u003c/strong>\u003cspan>컨텍스트 토큰 (Ultra)\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>4종\u003c/strong>\u003cspan>모델 라인업\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>Google\u003c/strong>\u003cspan>전체 생태계 통합\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>실시간\u003c/strong>\u003cspan>웹 검색 연동\u003c/span>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003cmain>\n\n  \u003c!-- 1. 모델 라인업 -->\n  \u003cdiv class=\"section\" id=\"models\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num\">1\u003c/div>\n      \u003ch2>Gemini 모델 라인업\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"model-grid\">\n      \u003cdiv class=\"model-card\">\n        \u003cspan class=\"model-tier tier-ultra\">⭐ Ultra\u003c/span>\n        \u003cdiv class=\"model-name\">Gemini Ultra\u003c/div>\n        \u003cdiv class=\"model-ctx\">컨텍스트: 2M 토큰\u003c/div>\n        \u003cdiv class=\"model-desc\">가장 강력한 멀티모달 추론. 복잡한 과학·수학·코딩 문제에 탁월. 전문가급 성능.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"model-card featured\">\n        \u003cspan class=\"model-tier tier-pro\">🔥 Pro (추천)\u003c/span>\n        \u003cdiv class=\"model-name\">Gemini Pro / Pro Vision\u003c/div>\n        \u003cdiv class=\"model-ctx\">컨텍스트: 1M 토큰\u003c/div>\n        \u003cdiv class=\"model-desc\">일상 업무와 비즈니스에 최적화. 텍스트·이미지·PDF 분석. Google Workspace 통합.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"model-card\">\n        \u003cspan class=\"model-tier tier-flash\">⚡ Flash\u003c/span>\n        \u003cdiv class=\"model-name\">Gemini Flash\u003c/div>\n        \u003cdiv class=\"model-ctx\">컨텍스트: 1M 토큰\u003c/div>\n        \u003cdiv class=\"model-desc\">빠른 속도와 낮은 비용. API 대량 처리, 실시간 응답이 필요한 서비스에 적합.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"model-card\">\n        \u003cspan class=\"model-tier tier-nano\">📱 Nano\u003c/span>\n        \u003cdiv class=\"model-name\">Gemini Nano\u003c/div>\n        \u003cdiv class=\"model-ctx\">온디바이스 실행\u003c/div>\n        \u003cdiv class=\"model-desc\">Android 기기에서 인터넷 없이 실행. Pixel 폰, Galaxy AI 탑재. 완전한 프라이버시.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- 2. 핵심 기능 -->\n  \u003cdiv class=\"section\" id=\"features\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num\">2\u003c/div>\n      \u003ch2>핵심 기능 & 강점\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"gem-feature-grid\">\n      \u003cdiv class=\"gem-feature\">\n        \u003cdiv class=\"gf-icon\">🌐\u003c/div>\n        \u003cdiv class=\"gf-title\">실시간 Google 검색 연동\u003c/div>\n        \u003cdiv class=\"gf-desc\">최신 정보를 실시간으로 검색하여 답변에 포함. 뉴스, 주가, 최신 연구도 즉시 확인 가능. 다른 AI 대비 최대 강점.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"gem-feature\">\n        \u003cdiv class=\"gf-icon\">🖼️\u003c/div>\n        \u003cdiv class=\"gf-title\">네이티브 멀티모달\u003c/div>\n        \u003cdiv class=\"gf-desc\">텍스트·이미지·영상·음성·문서를 하나의 대화에서 처리. PDF·PPT 업로드 후 즉시 분석·요약·질의응답.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"gem-feature\">\n        \u003cdiv class=\"gf-icon\">🎨\u003c/div>\n        \u003cdiv class=\"gf-title\">Imagen 3 이미지 생성\u003c/div>\n        \u003cdiv class=\"gf-desc\">Google의 최신 이미지 생성 모델 통합. 고품질 사진, 일러스트, 다이어그램 생성. Gemini Pro에서 직접 사용.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"gem-feature\">\n        \u003cdiv class=\"gf-icon\">🎙️\u003c/div>\n        \u003cdiv class=\"gf-title\">Deep Research & Gems\u003c/div>\n        \u003cdiv class=\"gf-desc\">복잡한 주제를 심층 분석하는 Deep Research 기능. Gems로 특정 역할의 AI 에이전트를 만들어 재활용.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"gem-feature\">\n        \u003cdiv class=\"gf-icon\">💻\u003c/div>\n        \u003cdiv class=\"gf-title\">코드 실행 (Python)\u003c/div>\n        \u003cdiv class=\"gf-desc\">Python 코드를 대화 중 직접 실행하고 결과 확인. 데이터 분석, 차트 생성, 계산을 실시간으로 수행.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"gem-feature\">\n        \u003cdiv class=\"gf-icon\">🔗\u003c/div>\n        \u003cdiv class=\"gf-title\">Google 생태계 완전 통합\u003c/div>\n        \u003cdiv class=\"gf-desc\">Gmail·Drive·Docs·Sheets·YouTube 직접 접근. \"내 지난주 이메일 요약해줘\" 같은 개인화 작업 가능.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- 3. 프롬프트 -->\n  \u003cdiv class=\"section\" id=\"prompt\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num\">3\u003c/div>\n      \u003ch2>효과적인 프롬프트 & Gems 설정\u003c/h2>\n    \u003c/div>\n\n    \u003cdiv class=\"prompt-box\">\n      \u003cdiv class=\"prompt-label\">Gems 시스템 지침 예시 — 업무 보고서 작성 에이전트\u003c/div>\n      \u003cdiv class=\"prompt-content\">\n\u003cspan class=\"tag\">역할:\u003c/span> \u003cspan class=\"val\">당신은 한국 공공기관 전문 보고서 작성 AI입니다.\u003c/span>\u003cbr>\u003cbr>\n\u003cspan class=\"tag\">능력:\u003c/span>\u003cbr>\n\u003cspan class=\"val\">- Google Drive에서 관련 문서를 검색하여 참고\u003c/span>\u003cbr>\n\u003cspan class=\"val\">- 최신 정책 동향을 Google 검색으로 확인\u003c/span>\u003cbr>\n\u003cspan class=\"val\">- 표·차트를 포함한 구조화된 보고서 작성\u003c/span>\u003cbr>\u003cbr>\n\u003cspan class=\"tag\">출력 형식:\u003c/span>\u003cbr>\n\u003cspan class=\"val\">1. 개요 (3줄 이내)\u003c/span>\u003cbr>\n\u003cspan class=\"val\">2. 현황 분석 (표 포함)\u003c/span>\u003cbr>\n\u003cspan class=\"val\">3. 시사점 및 제언\u003c/span>\u003cbr>\u003cbr>\n\u003cspan class=\"comment\"># Gems는 claude.ai의 프로젝트와 유사한 개인화 에이전트\u003c/span>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;\">\n      \u003cdiv class=\"card\">\n        \u003cdiv style=\"font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;\">\u003cspan>🎯\u003c/span> Gemini 특화 프롬프트 기법\u003c/div>\n        \u003cdiv style=\"font-size:.88rem;color:var(--text-2);line-height:1.9;\">\n          \u003cdiv style=\"margin-bottom:8px;\">\u003cstrong>검색 활용:\u003c/strong> \"최신 정보로\" / \"2025년 기준으로 검색해서\"\u003c/div>\n          \u003cdiv style=\"margin-bottom:8px;\">\u003cstrong>파일 분석:\u003c/strong> 문서 업로드 후 \"이 문서의 핵심 수치를 표로\"\u003c/div>\n          \u003cdiv style=\"margin-bottom:8px;\">\u003cstrong>코드 실행:\u003c/strong> \"Python으로 계산하고 차트로 보여줘\"\u003c/div>\n          \u003cdiv>\u003cstrong>유튜브 분석:\u003c/strong> URL 붙여넣기 → \"이 영상 요약해줘\"\u003c/div>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"card\">\n        \u003cdiv style=\"font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;\">\u003cspan>💎\u003c/span> Gems 활용 예시\u003c/div>\n        \u003cdiv style=\"font-size:.88rem;color:var(--text-2);line-height:1.9;\">\n          \u003cdiv style=\"margin-bottom:8px;\">\u003cstrong>번역 전문가:\u003c/strong> 한↔영 번역 + 문화적 뉘앙스 반영\u003c/div>\n          \u003cdiv style=\"margin-bottom:8px;\">\u003cstrong>코딩 멘토:\u003c/strong> 내 코드 스타일을 학습한 리뷰어\u003c/div>\n          \u003cdiv style=\"margin-bottom:8px;\">\u003cstrong>회의록 작성:\u003c/strong> 음성/텍스트 → 구조화된 회의록\u003c/div>\n          \u003cdiv>\u003cstrong>데이터 분석:\u003c/strong> CSV 업로드 → 자동 인사이트 도출\u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- 4. Google Workspace -->\n  \u003cdiv class=\"section\" id=\"workspace\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num\">4\u003c/div>\n      \u003ch2>Google Workspace 통합\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"google-suite\">\n      \u003cdiv class=\"suite-item\">\n        \u003cdiv class=\"suite-icon\">📧\u003c/div>\n        \u003cdiv class=\"suite-name\">Gmail\u003c/div>\n        \u003cdiv style=\"font-size:.78rem;color:var(--text-3);margin-top:4px;\">이메일 요약·작성·분류\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"suite-item\">\n        \u003cdiv class=\"suite-icon\">📄\u003c/div>\n        \u003cdiv class=\"suite-name\">Google Docs\u003c/div>\n        \u003cdiv style=\"font-size:.78rem;color:var(--text-3);margin-top:4px;\">문서 분석·편집·생성\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"suite-item\">\n        \u003cdiv class=\"suite-icon\">📊\u003c/div>\n        \u003cdiv class=\"suite-name\">Google Sheets\u003c/div>\n        \u003cdiv style=\"font-size:.78rem;color:var(--text-3);margin-top:4px;\">데이터 분석·수식 생성\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"suite-item\">\n        \u003cdiv class=\"suite-icon\">📁\u003c/div>\n        \u003cdiv class=\"suite-name\">Google Drive\u003c/div>\n        \u003cdiv style=\"font-size:.78rem;color:var(--text-3);margin-top:4px;\">파일 검색·내용 분석\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"suite-item\">\n        \u003cdiv class=\"suite-icon\">📅\u003c/div>\n        \u003cdiv class=\"suite-name\">Calendar\u003c/div>\n        \u003cdiv style=\"font-size:.78rem;color:var(--text-3);margin-top:4px;\">일정 관리·회의 요약\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"suite-item\">\n        \u003cdiv class=\"suite-icon\">🎬\u003c/div>\n        \u003cdiv class=\"suite-name\">YouTube\u003c/div>\n        \u003cdiv style=\"font-size:.78rem;color:var(--text-3);margin-top:4px;\">영상 요약·자막 분석\u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\" style=\"margin-top:16px;\">\n      \u003cstrong>💡 Workspace AI 활성화:\u003c/strong> Google Workspace 계정에서 Gemini for Workspace 구독 시 Docs·Sheets·Slides·Gmail에서 AI 기능 직접 사용. \"@Gemini\"를 입력하면 즉시 호출.\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- 5. 고급 활용 -->\n  \u003cdiv class=\"section\" id=\"advanced\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num\">5\u003c/div>\n      \u003ch2>고급 활용 — AI Studio & API\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"gem-advanced\">\n      \u003cdiv class=\"adv-title\">🔬 Google AI Studio 핵심 기능\u003c/div>\n      \u003cdiv class=\"adv-grid\">\n        \u003cdiv class=\"adv-item\">\n          \u003cstrong>프롬프트 설계 도구\u003c/strong>\n          \u003cspan>시스템 지침·예시·온도 조절을 시각적으로 설정. 최적 프롬프트 실험 가능.\u003c/span>\n        \u003c/div>\n        \u003cdiv class=\"adv-item\">\n          \u003cstrong>Grounding with Search\u003c/strong>\n          \u003cspan>API 호출 시 Google 검색을 자동으로 연동. 항상 최신 정보 기반 답변 생성.\u003c/span>\n        \u003c/div>\n        \u003cdiv class=\"adv-item\">\n          \u003cstrong>Function Calling\u003c/strong>\n          \u003cspan>외부 API와 연결하여 실제 서비스를 제어하는 AI 에이전트 구축.\u003c/span>\n        \u003c/div>\n        \u003cdiv class=\"adv-item\">\n          \u003cstrong>무료 API 티어\u003c/strong>\n          \u003cspan>AI Studio에서 개인 프로젝트는 무료로 API 사용 가능. 개발 테스트에 적합.\u003c/span>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n\u003c/main>\n\n\u003ca class=\"back-top\" href=\"#top\" title=\"맨 위로\">↑\u003c/a>\n\n\u003cfooter>\n  \u003cstrong>Google Gemini 완전 활용 가이드\u003c/strong> · Google DeepMind · 2025\u003cbr>\n  \u003cspan style=\"margin-top:6px;display:block;\">AI 도구 활용 교육 자료 — 내부 배포용\u003c/span>\n\u003c/footer>\n\n","styles":"\n    :root {\n      --brand:      #1A73E8;\n      --brand-dark: #1557B0;\n      --brand-deep: #0D3FA6;\n      --brand-light:#E8F0FE;\n      --brand-mid:  #B3D0F5;\n      --g-blue:    #4285F4;\n      --g-red:     #EA4335;\n      --g-yellow:  #FBBC04;\n      --g-green:   #34A853;\n      --text:      #1A1A2E;\n      --text-2:    #4B5575;\n      --text-3:    #8892B0;\n      --bg:        #F8FAFF;\n      --white:     #FFFFFF;\n      --border:    #D2E3FC;\n      --shadow:    0 4px 24px rgba(26,115,232,0.10);\n      --shadow-lg: 0 8px 40px rgba(26,115,232,0.16);\n      --radius:    16px;\n      --radius-sm: 10px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }\n    .nav-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }\n    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--brand); text-decoration: none; }\n    .nav-logo .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, #4285F4, #34A853); border-radius: 10px; display: flex; align-items: center; justify-content: center; }\n    .nav-links { display: flex; gap: 6px; list-style: none; }\n    .nav-links a { text-decoration: none; color -bottom: 72px; }\n    .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }\n    .section-num { width: 40px; height: 40px; background: linear-gradient(135deg, var(--g-blue), var(--g-green)); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; flex-shrink: 0; }\n    .section-header h2 { font-family: 'Noto Serif KR', serif; font-size: 1.6rem; font-weight: 700; }\n\n    .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 28px; box-shadow: var(--shadow); margin-bottom: 16px; }\n\n    .model-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }\n    .model-card { background: white; border-radius: var(--radius); border: 2px solid var(--border); padding: 22px; transition: all .2s; }\n    .model-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }\n    .model-card.featured { border-color: var(--g-blue); background: var(--brand-light); }\n    .model-tier { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 100px; font-size: .8rem; font-weight: 700; margin-bottom: 12px; }\n    .tier-ultra { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }\n    .tier-pro { background: var(--g-blue); color: white; }\n    .tier-flash { background: var(--g-green); color: white; }\n    .tier-nano { background: #F5F5F5; color: var(--text-2); }\n    .model-name { font-weight: 700; font-size: 1.05rem; margin-bottom: 6px; }\n    .model-ctx { font-size: .8rem; color: var(--text-3); margin-bottom: 10px; }\n    .model-desc { font-size: .87rem; color: var(--text-2); line-height: 1.6; }\n\n    .gem-feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }\n    .gem-feature { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; }\n    .gf-icon t(auto-fit, minmax(150px, 1fr)); gap: 12px; }\n    .suite-item { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 12px; text-align: center; transition: all .2s; }\n    .suite-item:hover { border-color: var(--g-blue); transform: translateY(-2px); }\n    .suite-icon { font-size: 26px; margin-bottom: 6px; }\n    .suite-name { font-size: .85rem; font-weight: 600; }\n\n    .tip-box { background: linear-gradient(135deg, var(--brand-light), #fff); border-left: 4px solid var(--brand); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 16px 20px; margin-top: 12px; }\n    .tip-box strong { color: var(--brand-dark); }\n\n    .back-top { position: fixed; bottom: 32px; right: 32px; width: 46px; height: 46px; background: linear-gradient(135deg, var(--g-blue), var(--g-green)); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: var(--shadow-lg); font-size: 20px; transition: all .2s; }\n    .back-top:hover { transform: translateY(-2px); opacity: .9; }\n\n    footer { background: #0D1B4F; color: rgba(255,255,255,0.6); text-align: center; padding: 32px 24px; font-size: .88rem; }\n    footer strong { color: #FBBC04; }\n  "},"grok":{"body":"\n\u003cnav class=\"nav\" id=\"top\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#top\">\n      \u003cdiv class=\"logo-icon\">\n        \u003csvg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"white\">\u003cpath d=\"M12.6 1.2L6.4 9.6H1.2L9.6 1.2H12.6ZM22.8 1.2L14.4 13.2L22.8 22.8H19.8L12.6 14.4L6.4 22.8H1.2L12.6 9.6L4.2 1.2H7.2L12.6 8.4L18 1.2H22.8Z\"/>\u003c/svg>\n      \u003c/div>\n      Grok 가이드\n    \u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#features\">핵심 기능\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#aurora\">Aurora AI\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#plans\">플랜\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#tips\">활용 팁\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"hero-inner\">\n    \u003cdiv class=\"hero-badge\">\u003cspan>\u003c/span> xAI · Elon Musk · 2025\u003c/div>\n    \u003cdiv class=\"hero-logo\">\n      \u003csvg width=\"54\" height=\"54\" viewBox=\"0 0 24 24\" fill=\"white\">\n        \u003cpath d=\"M12.6 1.2L6.4 9.6H1.2L9.6 1.2H12.6ZM22.8 1.2L14.4 13.2L22.8 22.8H19.8L12.6 14.4L6.4 22.8H1.2L12.6 9.6L4.2 1.2H7.2L12.6 8.4L18 1.2H22.8Z\"/>\n      \u003c/svg>\n    \u003c/div>\n    \u003ch1>Grok\u003cbr>완전 활용 가이드\u003c/h1>\n    \u003cp>Elon Musk의 xAI가 만든 AI — X(트위터) 실시간 데이터와\u003cbr>Aurora 이미지 생성으로 무장한 차세대 어시스턴트\u003c/p>\n    \u003cdiv class=\"hero-stats\">\n      \u003cdiv class=\"hero-stat\">\u003cstrong>실시간\u003c/strong>\u003cspan>X 데이터 연동\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>Aurora\u003c/strong>\u003cspan>이미지 생성 내장\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>DeepSearch\u003c/strong>\u003cspan>심층 웹 검색\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>무제한\u003c/strong>\u003cspan>SuperGrok 플랜\u003c/span>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003cmain>\n  \u003cdiv class=\"section\" id=\"features\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">1\u003c/div>\u003ch2>핵심 기능 & 강점\u003c/h2>\u003c/div>\n    \u003cdiv class=\"grid-2\">\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">🐦\u003c/div>\n        \u003cdiv class=\"feat-title\">X(트위터) 실시간 연동\u003c/div>\n        \u003cdiv class=\"feat-desc\">X 플랫폼의 실시간 트렌드, 게시물, 여론을 즉시 분석. 소셜 미디어 동향 파악에서 타 AI 대비 압도적 우위. \"지금 X에서 ~에 대해 뭐라고 하는지 알려줘\"\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">🔍\u003c/div>\n        \u003cdiv class=\"feat-title\">DeepSearch — 심층 웹 검색\u003c/div>\n        \u003cdiv class=\"feat-desc\">단순 검색을 넘어 수십 개 소스를 동시에 분석하는 심층 리서치 모드. 복잡한 주제에 대해 출처가 명확한 종합 보고서를 자동 생성.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">🎨\u003c/div>\n        \u003cdiv class=\"feat-title\">Aurora — 이미지 생성\u003c/div>\n        \u003cdiv class=\"feat-desc\">xAI가 자체 개발한 Aurora 이미지 모델 통합. 텍스트 프롬프트로 고품질 이미지 생성. 다른 AI보다 콘텐츠 제한이 유연하여 창의적 표현에 강점.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">🧠\u003c/div>\n        \u003cdiv class=\"feat-title\">Think 모드 — 추론 강화\u003c/div>\n        \u003cdiv class=\"feat-desc\">복잡한 문제 해결 시 단계별로 추론하는 Think 모드 활성화. 수학, 코딩, 논리 문제에서 정확도 대폭 향상. o3/Gemini Ultra와 경쟁하는 추론 능력.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">🎤\u003c/div>\n        \u003cdiv class=\"feat-title\">음성 대화 모드\u003c/div>\n        \u003cdiv class=\"feat-desc\">iOS/Android 앱에서 실시간 음성 대화. 자연스러운 대화 흐름과 감정 표현 지원. 영어 외 다국어 음성 지원.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">📎\u003c/div>\n        \u003cdiv class=\"feat-title\">멀티모달 파일 처리\u003c/div>\n        \u003cdiv class=\"feat-desc\">이미지, PDF, 문서를 업로드하여 분석. 스크린샷 내 텍스트 추출, 차트 해석, 문서 요약 모두 지원.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section\" id=\"aurora\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">2\u003c/div>\u003ch2>Grok의 특별한 위치\u003c/h2>\u003c/div>\n    \u003cdiv class=\"xai-dark\">\n      \u003cdiv class=\"xai-dark-title\">⚡ xAI Grok만의 차별점\u003c/div>\n      \u003cdiv class=\"xai-grid\">\n        \u003cdiv class=\"xai-item\">\n          \u003cstrong>X 생태계 완전 통합\u003c/strong>\n          \u003cspan>X 계정 로그인 시 팔로우 계정의 트윗 맥락을 AI가 이해. 개인화된 소셜 분석 가능.\u003c/span>\n        \u003c/div>\n        \u003cdiv class=\"xai-item\">\n          \u003cstrong>유머·직설적 성격\u003c/strong>\n          \u003cspan>Grok은 의도적으로 유머러스하고 직설적. 다른 AI보다 솔직한 의견 표현. 논쟁적 주제도 회피 없이 답변.\u003c/span>\n        \u003c/div>\n        \u003cdiv class=\"xai-item\">\n          \u003cstrong>Tesla · SpaceX 정보\u003c/strong>\n          \u003cspan>Elon Musk 기업들의 최신 정보에 빠른 접근. 테슬라 FSD, 스타십 업데이트 실시간 파악.\u003c/span>\n        \u003c/div>\n        \u003cdiv class=\"xai-item\">\n          \u003cstrong>오픈소스 전략\u003c/strong>\n          \u003cspan>Grok 기반 모델 일부 오픈소스 공개. 연구자·개발자가 자체 배포 및 파인튜닝 가능.\u003c/span>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\">\n      \u003cstrong>💡 Grok이 빛나는 순간:\u003c/strong> \"X에서 오늘 ~에 대한 여론은?\" / \"최신 테슬라 FSD 업데이트 내용 알려줘\" / \"논란이 되는 이 주제에 대해 솔직하게 분석해줘\" — 소셜 데이터와 직설적 분석이 필요할 때 최강.\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section\" id=\"plans\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">3\u003c/div>\u003ch2>플랜 & 접근 방법\u003c/h2>\u003c/div>\n    \u003cdiv class=\"plan-grid\">\n      \u003cdiv class=\"plan-card\">\n        \u003cspan class=\"plan-badge pb-free\">Free\u003c/span>\n        \u003cdiv class=\"plan-name\">무료\u003c/div>\n        \u003cdiv class=\"plan-price\">₩0\u003c/div>\n        \u003cul class=\"plan-feat\">\n          \u003cli>Grok 기본 모델\u003c/li>\n          \u003cli>제한된 메시지 수\u003c/li>\n          \u003cli>X 계정 필요\u003c/li>\n          \u003cli>기본 이미지 생성\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"plan-card featured\">\n        \u003cspan class=\"plan-badge pb-plus\">X Premium ⭐\u003c/span>\n        \u003cdiv class=\"plan-name\">X 프리미엄\u003c/div>\n        \u003cdiv class=\"plan-price\">$8~16 / 월\u003c/div>\n        \u003cul class=\"plan-feat\">\n          \u003cli>Grok 확장 접근\u003c/li>\n          \u003cli>더 많은 메시지\u003c/li>\n          \u003cli>Aurora 이미지\u003c/li>\n          \u003cli>DeepSearch 사용\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"plan-card\">\n        \u003cspan class=\"plan-badge pb-super\">SuperGrok\u003c/span>\n        \u003cdiv class=\"plan-name\">SuperGrok\u003c/div>\n        \u n    \u003ch1>Perplexity AI\u003cbr>완전 활용 가이드\u003c/h1>\n    \u003cp>링크 목록이 아닌 답변을 주는 AI 검색 엔진 — 출처가 명시된\u003cbr>실시간 웹 검색 기반 정확한 정보를 즉시 제공\u003c/p>\n    \u003cdiv class=\"hero-stats\">\n      \u003cdiv class=\"hero-stat\">\u003cstrong>실시간\u003c/strong>\u003cspan>웹 검색 기반\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>출처 명시\u003c/strong>\u003cspan>모든 답변에 인용\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>Deep Research\u003c/strong>\u003cspan>심층 분석 보고서\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>무료\u003c/strong>\u003cspan>기본 사용 가능\u003c/span>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\u003cmain>\n  \u003cdiv class=\"section\" id=\"features\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">1\u003c/div>\u003ch2>핵심 기능 & 강점\u003c/h2>\u003c/div>\n    \u003cdiv class=\"grid-2\">\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">🔍\u003c/div>\n        \u003cdiv class=\"feat-title\">출처 인용 답변\u003c/div>\n        \u003cdiv class=\"feat-desc\">모든 답변에 실제 웹 출처를 번호로 표시. 클릭하면 원문 확인 가능. 환각(hallucination) 최소화. 학술·리서치 작업에서 타 AI 대비 압도적 신뢰성.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">📊\u003c/div>\n        \u003cdiv class=\"feat-title\">Deep Research\u003c/div>\n        \u003cdiv class=\"feat-desc\">복잡한 주제에 대해 수십 개 소스를 자동 분석하여 수 페이지 분량의 종합 보고서 생성. 10~15분 소요이나 논문 수준의 리서치 결과물 제공.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">🤖\u003c/div>\n        \u003cdiv class=\"feat-title\">다중 AI 모델 선택\u003c/div>\n        \u003cdiv class=\"feat-desc\">Pro 플랜에서 Claude, GPT-4o, Gemini, Sonar Large 등 다양한 모델 직접 선택. 작업 특성에 맞는 최적 모델로 전환 가능.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">🖼️\u003c/div>\n        \u003cdiv class=\"feat-title\">이미지 생성 & 분석\u003c/div>\n        \u003cdiv class=\"feat-desc\">DALL-E·Stable Diffusion 기반 이미지 생성 내장. 이미지 업로드 후 분석·질의응답. 시각 자료와 텍스트 정보를 한 화면에서 처리.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">📁\u003c/div>\n        \u003cdiv class=\"feat-title\">파일 & 문서 분석\u003c/div>\n        \u003cdiv class=\"feat-desc\">PDF·Word·Excel 업로드 후 즉시 분석·요약·Q&A. 최대 수십 MB 파일 지원. 문서 내용 기반 정확한 답변과 페이지 인용 제공.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">🔗\u003c/div>\n        \u003cdiv class=\"feat-title\">Spaces (공유 리서치)\u003c/div>\n        \u003cdiv class=\"feat-desc\">팀원과 리서치 공간 공유. 같은 소스 기반으로 여러 명이 질문하고 결과 축적. 팀 지식베이스 역할 수행.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n  \u003cdiv class=\"section\" id=\"modes\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">2\u003c/div>\u003ch2>검색 모드 & 활용법\u003c/h2>\u003c/div>\n    \u003cdiv class=\"grid-3\">\n      \u003cdiv class=\"card\" style=\"margin-bottom:0;\">\n        \u003cdiv style=\"font-weight:700;margin-bottom:10px;color:var(--brand);\">Quick Search\u003c/div>\n        \u003cdiv style=\"font-size:.88rem;color:var(--text-2);line-height:1.8;\">빠른 단답형 질문에 최적. 뉴스·현황·정의 등 즉각적인 정보 필요 시. 무료 사용자도 무제한.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"card\" style=\"margin-bottom:0;\">\n        \u003cdiv style=\"font-weight:700;margin-bottom:10px;color:var(--brand);\">Pro Search\u003c/div>\n        \u003cdiv style=\"font-size:.88rem;color:var(--text-2);line-height:1.8;\">복잡한 질문에 추가 검색 수행. 여러 소스 교차 검증. Pro 플랜 1일 300회 이상 제공.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"card\" style=\"margin-bottom:0;\">\n        \u003cdiv style=\"font-weight:700;margin-bottom:10px;color:var(--brand);\">Deep Research\u003c/div>\n        \u003cdiv style=\"font-size:.88rem;color:var(--text-2);line-height:1.8;\">자동 반복 검색으로 종합 보고서 생성. 시장 조사·논문 검토·경쟁 분석에 최적. Pro 필요.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\" style=\"margin-top:16px;\">\n      \u003cstrong>💡 Perplexity 최강 활용:\u003c/strong> \"~에 대한 최신 연구 동향 정리해줘 (출처 포함)\" / \"경쟁사 3곳 비교 분석 후 표로 정리해줘\" / \"이 PDF의 핵심 주장과 근거를 요약해줘\"\n    \u003c/div>\n  \u003c/div>\n  \u003cdiv class=\"section\" id=\"plans\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">3\u003c/div>\u003ch2>플랜 선택\u003c/h2>\u003c/div>\n    \u003cdiv class=\"plan-grid\">\n      \u003cdiv class=\"plan-card\">\n        \u003cspan class=\"plan-badge pb-free\">Free\u003c/span>\n        \u003cdiv class=\"plan-name\">무료\u003c/div>\n        \u003cdiv class=\"plan-price\">₩0\u003c/div>\n        \u003cul class=\"plan-feat\">\n          \u003cli>Quick Search 무제한\u003c/li>\n          \u003cli>Pro Search 1일 5회\u003c/li>\n          \u003cli>기본 파일 분석\u003c/li>\n          \u003cli>이미지 생성 제한적\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"plan-card featured\">\n        \u003cspan class=\"plan-badge pb-pro\">Pro ⭐\u003c/span>\n        \u003cdiv class=\"plan-name\">Pro 플랜\u003c/div>\n        \u003cdiv class=\"plan-price\">$20 / 월\u003c/div>\n        \u003cul class=\"plan-feat\">\n          \u003cli>Pro Search 1일 300회+\u003c/li>\n          \u003cli>Deep Research 무제한\u003c/li>\n          \u003cli>Claude·GPT-4o·Gemini 선택\u003c/li>\n          \u003cli>이미지 생성 무제한\u003c/li>\n          \u003cli>Spaces 공유 기능\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"plan-card\">\n        \u003cspan class=\"plan-badge pb-ent\">Enterprise\u003c/span>\n        \u003cdiv class=\"plan-name\">기업용\u003c/div>\n        \u003cdiv class=\"plan-price\">$40 / 월 / 인\u003c/div>\n        \u003cul class=\"plan-feat\">\n          \u003cli>데이터 학습 제외\u003c/li>\n          \u003cli>SSO·관리자 기능\u003c/li>\n          \u003cli>내부 데이터 연동\u003c/li>\n          \u003cli>API 접근\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n  \u003cdiv class=\"section\" id=\"vs\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">4\u003c/div>\u003ch2>검색 AI 비교\u003c/h2>\u003c/div>\n    \u003cdiv class=\"card\">\n      \u003ctable class=\"vs-table\">\n        \u003cthead>\u003ctr>\u003cth>항목\u003c/th>\u003cth>Perplexity\u003c/th>\u003cth>Genspark\u003c/th>\u003cth>Google Gemini\u003c/th>\u003cth>ChatGPT\u003c/th>\u003c/tr>\u003c/thead>\n        \u003ctbody>\n          \u003ctr>\u003ctd>출처 인용\u003c/td>\u003ctd class=\"check\">✓ 모든 답변\u003c/td>\u003ctd class=\"check\">✓ Sparkpage\u003c/td>\u003ctd>✓ 일부\u003c/td>\u003ctd>△ 제한적\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>실시간 검색\u003c/td>\u003ctd class=\"check\">✓ 항상\u003c/td>\u003ctd class=\"check\">✓ 항상\u003c/td>\u003ctd class=\"check\">✓ Google\u003c/td>\u003ctd>✓ Bing\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>Deep Research\u003c/td>\u003ctd class=\"check\">✓ 전용 모드\u003c/td>\u003ctd>△ 에이전트\u003c/td>\u003ctd class=\"check\">✓ Gemini\u003c/td>\u003ctd>✓ 일부\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>다중 AI 모델\u003c/td>\u003ctd class=\"check\">✓ Pro에서\u003c/td>\u003ctd>✗\u003c/td>\u003ctd>✗\u003c/td>\u003ctd>✗\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>무료 사용\u003c/td>\u003ctd>✓ 충분\u003c/td>\u003ctd>✓ 충분\u003c/td>\u003ctd>✓ 충분\u003c/td>\u003ctd>✓ 충분\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>주력 강점\u003c/td>\u003ctd>출처 신뢰성\u003c/td>\u003ctd>Sparkpage 공유\u003c/td>\u003ctd>Google 통합\u003c/td>\u003ctd>범용 AI\u003c/td>\u003c/tr>\n        \u003c/tbody>\n      \u003c/table>\n    \u003c/div>\n  \u003c/div>\n\u003c/main>\n\u003ca class=\"back-top\" href=\"#top\">↑\u003c/a>\n\u003cfooter>\u003cstrong>Perplexity AI 완전 활용 가이드\u003c/strong> · Perplexity AI · 2025\u003c/footer>\n","styles":"\n    :root{--brand:#20B2AA;--brand-dark:#178F87;--brand-light:#E0F7F6;--text:#1A1A2E;--text-2:#4B5575;--text-3:#8892B0;--bg:#F5FFFE;--white:#FFFFFF;--border:#B2DFDB;--shadow:0 4px 24px rgba(32,178,170,0.10);--shadow-lg:0 8px 40px rgba(32,178,170,0.16);--radius:16px;--radius-sm:10px;}\n    *{box-sizing:border-box;margin:0;paddi
