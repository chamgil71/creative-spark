.scrollY > 300); });\n\u003c/script>\n","styles":"\n    :root {\n      --gh-dark:    #0D1117;\n      --gh-dark2:   #161B22;\n      --gh-border:  #30363D;\n      --gh-text:    #E6EDF3;\n      --gh-text2:   #8B949E;\n      --green:      #3FB950;\n      --blue:       #58A6FF;\n      --purple:     #BC8CFF;\n      --orange:     #F0883E;\n      --red:        #F85149;\n      --text:       #1A1A2E;\n      --text-2:     #4B5575;\n      --bg:         #F6F8FA;\n      --white:      #FFFFFF;\n      --border:     #D0D7DE;\n      --shadow:     0 4px 24px rgba(0,0,0,0.08);\n      --radius:     12px;\n      --radius-sm:  8px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(13,17,23,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid var(--gh-border); padding: 0 24px; }\n    .nav-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }\n    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: white; text-decoration: none; }\n    .nav-logo .logo-icon { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; }\n    .nav-links { display: flex; gap: 6px; list-style: none; }\n    .nav-links a { text-decoration: none; color: var(--gh-text2); font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: all .2s; }\n    .nav-links a:hover { background: rgba(255,255,255,0.1); color: white; }\n\n    .hero { background: linear-gradient(160deg, #0D1117 0%, #161B22 60%, #0D1117 100%); padding: 80px 24px 100px; text-align: center; position: relative; overflow: hidden; }\n    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% -20%, rgba(63,185,80,0.12) 0%, transparent 60%); }\n    .github-logo-wrap { margin: 0 auto 24px; }\n    .hero-badge { display: inline-block; background: rgba(63,185,80,0.15); color: #3FB950; font-size: 13px; font-weight: 600; padding: 6px 16px; border-radius: 100px; border: 1px solid rgba(63,185,80,0.3); margin-bottom: 24px; position: relative; }\n    .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(28px,5vw,50px); font-weight: 700; color: var(--gh-text); line-height: 1.3; margin-bottom: 20px; position: relative; }\n    .hero h1 span { color: #3FB950; }\n    .hero p { font-size: clamp(15px,2.5vw,18px); color: var(--gh-text2); max-width: 560px; margin: 0 auto 36px; position: relative; }\n    .hero-cta { display: inline-flex; align-items: center; gap: 8px; background: #3FB950; color: #0D1117; font-weight: 700; font-size: 16px; padding: 14px 28px; border-radius: 8px; text-decoration: none; box-shadow: 0 8px 32px rgba(63,185,80,0.25); transition: transform .2s; position: relative; }\n    .hero-cta:hover { transform: translateY(-2px); }\n    .hero-stats { display: flex; justify-content: center; gap: 48px; margin-top: 56px; position: relative; flex-wrap: wrap; }\n    .hero-stat { text-align: center; }\n    .hero-stat strong { display: block; font-size: 26px; font-weight: 900; color: var(--gh-text); }\n    .hero-stat span { font-size: 13px; color: var(--gh-text2); }\n\n    .section { padding: 72px 24px; }\n    .section-inner { max-width: 960px; margin: 0 auto; }\n    .section-title { font-family: 'Noto Serif KR', serif; font-size: clamp(22px,3.5vw,30px); font-weight: 700; margin-bottom: 8px; }\n    .section-sub { color: var(--text-2); font-size: 15px; margin-bottom: 40px; }\n    .section-num { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 16px; }\n    .section-num .num { width: 36px; height: 36px; background: var(--gh-dark); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; flex-shrink: 0; border: 1px solid var(--gh-border); }\n    .section-num .label { font-size: 13px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .06em; }\n\n    /* Git 플로우 다이어그램 */\n    .flow-container { background: var(--gh-dark); border-radius: var(--radius); padding: 32px; border: 1px solid var(--gh-border); overflow-x: auto; }\n    .flow-branches { display: flex; flex-direction: column; gap: 20px; min-width: 600px; }\n    .branch-row { display: flex; align-items: center; gap: 0; }\n    .branch-label { width: 80px; font-size: 12px; font-weight: 700; color: var(--gh-text2); flex-shrink: 0; }\n    .branch-line { flex: 1; display: flex; align-items: center; }\n    .commit { width: 20px; height: 20px; border-radius: 50%; border: 3px solid; flex-shrink: 0; position: relative; }\n    .commit-line { flex: 1; height: 3px; }\n    .main-color { border-color: #3FB950; } .main-line { background: #3FB950; }\n    .dev-color { border-color: #58A6FF; } .dev-line { background: #58A6FF; }\n    .feat-color { border-color: #BC8CFF; } .feat-line { background: #BC8CFF; }\n    .commit-label { font-size: 10px; color: var(--gh-text2); position: absolute; top: 22px; left: -20px; white-space: nowrap; }\n\n    /* 기능 카드 */\n    .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }\n    .feature-card { background: white; border-radius: var(--radius); padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); transition: transform .2s; }\n    .feature-card:hover { transform: translateY(-4px); }\n    .feature-card .fi { font-size: 32px; margin-bottom: 14px; }\n    .feature-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }\n    .feature-card p { font-size: 14px; color: var(--text-2); line-height: 1.6; }\n    .feature-tag { display: inline-block; margin-top: 10px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 100px; background: #DCFCE7; color: #16A34A; }\n    .feature-tag.blue { background: #EFF6FF; color: #2563EB; }\n    .feature-tag.purple { background: #F5F3FF; color: #7C3AED; }\n\n    /* 터미널 블록 */\n    .terminal { background: var(--gh-dark); border-radius: var(--radius-sm); border: 1px solid var(--gh-border); overflow: hidden; margin: 16px 0; }\n    .terminal-header { background: var(--gh-dark2); padding: 10px 16px; display: flex; align-items: center; gap: 8px; }\n    .terminal-dot { width: 12px; height: 12px; border-radius: 50%; }\n    .terminal-title { font-size: 12px; color: var(--gh-text2); margin-left: 8px; font-family: monospace; }\n    .terminal-body { padding: 16px 20px; font-family: 'Courier New', monospace; font-size: 13px; color: var(--gh-text); line-height: 1.8; }\n    .terminal-body .cmd { color: #3FB950; }\n    .terminal-body .comment { color: var(--gh-text2); }\n    .terminal-body .output { color: #58A6FF; }\n\n    /* GitHub Actions */\n    .actions-flow { display: flex; align-items: center; gap: 0; flex-wrap: wrap; justify-content: center; }\n    .action-step { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 20px; text-align: center; min-width: 130px; box-shadow: var(--shadow); }\n    .action-step .as-icon { font-size: 24px; margin-bottom: 6px; }\n    .action-step h4 { font-size: 13px; font-weight: 700; }\n    .action-step p { font-size: 11px; color: var(--text-2); margin-top: 2px; }\n    .action-arrow { font-size: 20px; color: var(--border); padding: 0 8px; }\n\n    /* 단축키 */\n    .shortcut-table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); }\n    .shortcut-table th { background: var(--gh-dark); color: var(--gh-text); padding: 12px 20px; text-align: left; font-size: 13px; font-weight: 600; }\n    .shortcut-table td { padding: 11px 20px; font-size: 14px; border-bottom: 1px solid var(--border); }\n    .shortcut-table tr:last-child td { border-bottom: none; }\n    .shortcut-table tr:hover td { background: var(--bg); }\n    .key { display: inline-block; background: #F6F8FA; border: 1px solid #D0D7DE; border-radius: 4px; padding: 1px 7px; font-family: monospace; font-size: 12px; }\n\n    .done-section { background: var(--gh-dark); padding: 72px 24px; text-align: center; border-top: 1px solid var(--gh-border); }\n    .done-section h2 { font-family: 'Noto Serif KR', serif; font-size: clamp(22px,4vw,32px); color: var(--gh-text); margin-bottom: 16px; }\n    .done-section p { font-size: 16px; color: var(--gh-text2); margin-bottom: 32px; }\n    .done-link { display: inline-flex; align-items: center; gap: 8px; background: #3FB950; color: #0D1117; font-weight: 700; padding: 14px 28px; border-radius: 8px; text-decoration: none; font-size: 16px; transition: transform .2s; }\n    .done-link:hover { transform: translateY(-2px); }\n\n    footer { background: var(--gh-dark2); color: var(--gh-text2); text-align: center; padding: 28px 24px; font-size: 14px; border-top: 1px solid var(--gh-border); }\n    footer a { color: var(--blue); text-decoration: none; }\n    .back-top { position: fixed; bottom: 28px; right: 28px; width: 44px; height: 44px; background: var(--gh-dark); color: var(--gh-text); border: 1px solid var(--gh-border); border-radius: 8px; font-size: 18px; cursor: pointer; opacity: 0; transition: opacity .3s; z-index: 200; }\n    .back-top.visible { opacity: 1; }\n\n    @media (max-width: 640px) { .nav-links { display: none; } .hero-stats { gap: 24px; } .actions-flow { flex-direction: column; } .action-arrow { transform: rotate(90deg); } }\n  "},"notebooklm":{"body":"\n\n\u003cnav class=\"nav\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#\">\n      \u003cdiv class=\"logo-icon\">📒\u003c/div>\n      NotebookLM 가이드\n    \u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#sources\">소스 연결\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#workflow\">사용법\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#audio\">오디오 개요\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#usecases\">활용 사례\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#tips\">팁\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"hero-logo\">📒\u003c/div>\n  \u003cdiv class=\"hero-badge\">🔵 Google이 만든 AI 지식 어시스턴트\u003c/div>\n  \u003ch1>내 문서로 만드는\u003cbr/>\u003cspan>나만의 AI 전문가\u003c/span>\u003c/h1>\n  \u003cp>PDF, 문서, 유튜브, 웹페이지를 업로드하면 — 내 자료 기반으로만 정확하게 답하는 AI 연구 도구. 환각(Hallucination)이 없습니다.\u003c/p>\n  \u003ca class=\"hero-cta\" href=\"https://notebooklm.google.com\" target=\"_blank\">📒 NotebookLM 시작하기 (무료)\u003c/a>\n  \u003cdiv class=\"hero-stats\">\n    \u003cdiv class=\"hero-stat\">\u003cstrong>완전 무료\u003c/strong>\u003cspan>Google 계정만 있으면\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>50개\u003c/strong>\u003cspan>소스 per 노트북\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>오디오 개요\u003c/strong>\u003cspan>AI 팟캐스트 생성\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>출처 인용\u003c/strong>\u003cspan>모든 답변에 소스 표시\u003c/span>\u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 소스 연결 -->\n\u003csection class=\"section\" id=\"sources\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">1\u003c/div>\u003cspan class=\"label\">Sources\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">지원하는 소스 종류\u003c/h2>\n    \u003cp class=\"section-sub\">다양한 형식의 문서를 하나의 노트북에 연결하여 통합 분석합니다.\u003c/p>\n    \u003cdiv class=\"source-grid\">\n      \u003cdiv class=\"source-card\">\u003cdiv class=\"sc-icon\">📄\u003c/div>\u003ch4>PDF\u003c/h4>\u003cp>논문, 보고서, 계약서 등 PDF 파일\u003c/p>\u003c/div>\n      \u003cdiv class=\"source-card\">\u003cdiv class=\"sc-icon\">📝\u003c/div>\u003ch4>Google Docs\u003c/h4>\u003cp>구글 문서 직접 연결\u003c/p>\u003c/div>\n      \u003cdiv class=\"source-card\">\u003cdiv class=\"sc-icon\">📊\u003c/div>\u003ch4>Google Slides\u003c/h4>\u003cp>프레젠테이션 자료\u003c/p>\u003c/div>\n      \u003cdiv class=\"source-card\">\u003cdiv class=\"sc-icon\">🌐\u003c/div>\u003ch4>웹페이지\u003c/h4>\u003cp>URL 붙여넣기로 웹 콘텐츠 추가\u003c/p>\u003c/div>\n      \u003cdiv class=\"source-card\">\u003cdiv class=\"sc-icon\">▶️\u003c/div>\u003ch4>YouTube\u003c/h4>\u003cp>자막이 있는 영상 내용 분석\u003c/p>\u003c/div>\n      \u003cdiv class=\"source-card\">\u003cdiv class=\"sc-icon\">🎵\u003c/div>\u003ch4>오디오\u003c/h4>\u003cp>팟캐스트, 강의 녹음 파일\u003c/p>\u003c/div>\n      \u003cdiv class=\"source-card\">\u003cdiv class=\"sc-icon\">📄\u003c/div>\u003ch4>텍스트 파일\u003c/h4>\u003cp>.txt, .md 파일\u003c/p>\u003c/div>\n      \u003cdiv class=\"source-card\">\u003cdiv class=\"sc-icon\">💬\u003c/div>\u003ch4>직접 입력\u003c/h4>\u003cp>노트나 텍스트 직접 붙여넣기\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\" style=\"margin-top:24px;\">\n      \u003cstrong>💡 소스 용량 제한\u003c/strong>\n      \u003cp>소스당 최대 500,000 단어 (PDF 기준 약 200-500페이지). 노트북 하나에 최대 50개 소스까지 추가 가능합니다.\u003c/p>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 워크플로우 -->\n\u003csection class=\"section\" id=\"workflow\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">2\u003c/div>\u003cspan class=\"label\">Workflow\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">NotebookLM 사용 방법\u003c/h2>\n    \u003cp class=\"section-sub\">4단계로 나만의 AI 지식 베이스를 만들어보세요.\u003c/p>\n    \u003cdiv class=\"workflow\">\n      \u003cdiv class=\"wf-step\">\n        \u003cdiv class=\"wf-num\">1\u003c/div>\n        \u003ch4>🆕 노트북 생성\u003c/h4>\n        \u003cp>notebooklm.google.com에서 \"새 노트북\" 클릭\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"wf-step\">\n        \u003cdiv class=\"wf-num\">2\u003c/div>\n        \u003ch4>📥 소스 추가\u003c/h4>\n        \u003cp>PDF, URL, Google Docs, 유튜브 링크를 업로드\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"wf-step\">\n        \u003cdiv class=\"wf-num\">3\u003c/div>\n        \u003ch4>💬 AI와 대화\u003c/h4>\n        \u003cp>내 문서 기반으로 질문하고 분석 요청\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"wf-step\">\n        \u003cdiv class=\"wf-num\">4\u003c/div>\n        \u003ch4>📝 노트 저장\u003c/h4>\n        \u003cp>AI 답변을 노트로 저장하고 정리\u003c/p>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv style=\"margin-top:32px;\">\n      \u003ch3 style=\"font-size:18px;font-weight:700;margin-bottom:16px;\">AI에게 이렇게 물어보세요\u003c/h3>\n      \u003cdiv style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;\">\n        \u003cdiv style=\"background:white;border-radius:var(--radius-sm);padding:16px 20px;border:1px solid var(--border);box-shadow:var(--shadow);\">\n          \u003cdiv style=\"font-weight:700;font-size:14px;margin-bottom:6px;color:var(--blue);\">📋 요약 요청\u003c/div>\n          \u003cp style=\"font-size:13px;color:var(--text-2);\">\"이 보고서의 핵심 주장을 3가지로 요약해줘\"\u003cbr/>\"목차를 만들어줘\"\u003c/p>\n        \u003c/div>\n        \u003cdiv style=\"background:white;border-radius:var(--radius-sm);padding:16px 20px;border:1px solid var(--border);box-shadow:var(--shadow);\">\n          \u003cdiv style=\"font-weight:700;font-size:14px;margin-bottom:6px;color:var(--blue);\">🔍 특정 정보 검색\u003c/div>\n          \u003cp style=\"font-size:13px;color:var(--text-2);\">\"3장에서 언급된 방법론은 무엇인가?\"\u003cbr/>\"참고문헌 목록을 모아줘\"\u003c/p>\n        \u003c/div>\n        \u003cdiv style=\"background:white;border-radius:var(--radius-sm);padding:16px 20px;border:1px solid var(--border);box-shadow:var(--shadow);\">\n          \u003cdiv style=\"font-weight:700;font-size:14px;margin-bottom:6px;color:var(--blue);\">⚖️ 비교 분석\u003c/div>\n          \u003cp style=\"font-size:13px;color:var(--text-2);\">\"소스 A와 B의 주장 차이점은?\"\u003cbr/>\"두 논문의 연구 방법을 비교해줘\"\u003c/p>\n        \u003c/div>\n        \u003cdiv style=\"background:white;border-radius:var(--radius-sm);padding:16px 20px;border:1px solid var(--border);box-shadow:var(--shadow);\">\n          \u003cdiv style=\"font-weight:700;font-size:14px;margin-bottom:6px;color:var(--blue);\">❓ 심층 질문\u003c/div>\n          \u003cp style=\"font-size:13px;color:var(--text-2);\">\"이 데이터의 한계점은 무엇인가?\"\u003cbr/>\"FAQ를 만들어줘\"\u003c/p>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 오디오 개요 -->\n\u003csection class=\"section\" id=\"audio\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">3\u003c/div>\u003cspan class=\"label\">Audio Overview\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">오디오 개요 — AI 팟캐스트\u003c/h2>\n    \u003cp class=\"section-sub\">문서를 두 AI 진행자가 나누는 자연스러운 팟캐스트로 변환합니다.\u003c/p>\n    \u003cdiv class=\"audio-card\">\n      \u003ch3>🎙️ 클릭 한 번으로 팟캐스트 생성\u003c/h3>\n      \u003cp>업로드한 문서를 AI가 두 화자의 대화 형식으로 요약합니다. 운전 중, 산책 중에도 자료를 \"들을\" 수 있습니다.\u003c/p>\n      \u003cdiv class=\"audio-features\">\n        \u003cdiv class=\"audio-feat\">\u003ch4>🔊 자연스러운 대화체\u003c/h4>\u003cp>딱딱한 문서 읽기가 아닌 두 사람의 토론 형식\u003c/p>\u003c/div>\n        \u003cdiv class=\"audio-feat\">\u003ch4>🌍 다국어 지원\u003c/h4>\u003cp>한국어 포함 다국어로 생성 가능\u003c/p>\u003c/div>\n        \u003cdiv class=\"audio-feat\">\u003ch4>💾 MP3 다운로드\u003c/h4>\u003cp>생성된 오디오 파일을 저장 가능\u003c/p>\u003c/div>\n        \u003cdiv class=\"audio-feat\">\u003ch4>⚙️ 커스텀 가이드\u003c/h4>\u003cp>특정 청중, 강조 내용 지정 가능\u003c/p>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 활용 사례 -->\n\u003csection class=\"section\" id=\"usecases\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">4\u003c/div>\u003cspan class=\"label\">Use Cases\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">실전 활용 사례\u003c/h2>\n    \u003cp class=\"section-sub\">이런 용도로 활용하면 생산성이 크게 향상됩니다.\u003c/p>\n    \u003cdiv class=\"usecase-grid\">\n      \u003cdiv class=\"usecase-card\">\n        \u003cdiv class=\"uc-icon\">🎓\u003c/div>\n        \u003ch3>학업 & 연구\u003c/h3>\n        \u003cul>\n          \u003cli>논문 여러 편을 한 노트북에 모아 비교분석\u003c/li>\n          \u003cli>강의 자료 업로드 후 시험 대비 Q&A\u003c/li>\n          \u003cli>참고문헌 자동 정리\u003c/li>\n          \u003cli>리뷰 논문 초안 작성 지원\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"usecase-card\">\n        \u003cdiv class=\"uc-icon\">💼\u003c/div>\n        \u003ch3>업무 & 보고서\u003c/h3>\n        \u003cul>\n          \u003cli>긴 보고서 신속 요약 및 핵심 추출\u003c/li>\n          \u003cli>회의록 여러 개 통합 분석\u003c/li>\n          \u003cli>산업 리포트 비교 인사이트\u003c/li>\n          \u003cli>발표 자료 스크립트 생성\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"usecase-card\">\n        \u003cdiv class=\"uc-icon\">📰\u003c/div>\n        \u003ch3>콘텐츠 제작\u003c/h3>\n        \u003cul>\n          \u003cli>유튜브 영상 내용 텍스트로 정리\u003c/li>\n          \u003cli>웹 아티클 수집 후 뉴스레터 작성\u003c/li>\n          \u003cli>책 요약 및 독서 노트\u003c/li>\n          \u003cli>팟캐스트 원고 자동 생성\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 팁 -->\n\u003csection class=\"section\" id=\"tips\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">5\u003c/div>\u003cspan class=\"label\">Pro Tips\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">NotebookLM 활용 팁\u003c/h2>\n    \u003cp class=\"section-sub\">더 정확하고 유용한 결과를 얻기 위한 노하우입니다.\u003c/p>\n    \u003cdiv class=\"tip-box\">\u003cstrong>🔗 NotebookLM Importer 확장 활용\u003c/strong>\u003cp>크롬 확장 'NotebookLM Importer'를 설치하면 브라우저에서 읽는 페이지를 버튼 하나로 노트북에 추가할 수 있습니다. 웹서핑 중 발견한 자료를 즉시 저장하세요.\u003c/p>\u003c/div>\n    \u003cdiv class=\"tip-box\">\u003cstrong>🎯 노트북을 주제별로 분리하세요\u003c/strong>\u003cp>하나의 노트북에 모든 자료를 넣기보다, \"AI 동향 리서치\", \"Q3 프로젝트\", \"독서 노트\"처럼 주제별로 분리하면 AI 답변의 정확도가 높아집니다.\u003c/p>\u003c/div>\n    \u003cdiv class=\"tip-box\">\u003cstrong>📌 인용 출처를 항상 확인하세요\u003c/strong>\u003cp>NotebookLM의 모든 답변에는 출처 인용이 포함됩니다. 인용 번호를 클릭하면 해당 소스의 정확한 위치로 이동합니다. 중요한 정보는 항상 원문을 확인하세요.\u003c/p>\u003c/div>\n    \u003cdiv class=\"tip-box\">\u003cstrong>💡 노트 기능 적극 활용\u003c/strong>\u003cp>AI 답변 중 유용한 내용은 \"노트에 추가\" 버튼으로 저장합니다. 저장된 노트들은 다시 AI 분석의 소스로 활용할 수 있습니다.\u003c/p>\u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection class=\"done-section\">\n  \u003ch2>📒 내 문서를 AI 전문가로 만들어보세요\u003c/h2>\n  \u003cp>무료로 시작하고, 즉시 생산성을 높여보세요.\u003c/p>\n  \u003ca class=\"done-link\" href=\"https://notebooklm.google.com\" target=\"_blank\">📒 NotebookLM 무료 시작\u003c/a>\n\u003c/section>\n\n\u003cfooter>\n  \u003cp>NotebookLM은 Google DeepMind의 Gemini를 기반으로 합니다.\u003c/p>\n  \u003cp style=\"margin-top:8px;\">공식 사이트: \u003ca href=\"https://notebooklm.google.com\" target=\"_blank\">notebooklm.google.com\u003c/a>\u003c/p>\n\u003c/footer>\n\u003cbutton class=\"back-top\" id=\"backTop\" onclick=\"window.scrollTo({top:0,behavior:'smooth'})\">↑\u003c/button>\n\u003cscript>\n  window.addEventListener('scroll', () => { document.getElementById('backTop').classList.toggle('visible', window.scrollY > 300); });\n\u003c/script>\n","styles":"\n    :root {\n      --blue:       #1A73E8;\n      --blue-dark:  #1557B0;\n      --blue-light: #E8F0FE;\n      --teal:       #00BCD4;\n      --teal-light: #E0F7FA;\n      --green:      #34A853;\n      --text:       #202124;\n      --text-2:     #5F6368;\n      --text-3:     #9AA0A6;\n      --bg:         #F8F9FA;\n      --white:      #FFFFFF;\n      --border:     #DADCE0;\n      --shadow:     0 4px 24px rgba(26,115,232,0.10);\n      --shadow-lg:  0 8px 40px rgba(26,115,232,0.16);\n      --radius:     16px;\n      --radius-sm:  10px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.95); backd ition: relative; }\n    .hero h1 span { color: #A8D8FF; }\n    .hero p { font-size: clamp(15px,2.5vw,18px); color: rgba(255,255,255,0.88); max-width: 580px; margin: 0 auto 36px; position: relative; }\n    .hero-cta { display: inline-flex; align-items: center; gap: 8px; background: white; color: var(--blue); font-weight: 700; font-size: 16px; padding: 14px 28px; border-radius: 100px; text-decoration: none; box-shadow: 0 8px 32px rgba(0,0,0,0.2); transition: transform .2s; position: relative; }\n    .hero-cta:hover { transform: translateY(-2px); }\n    .hero-stats { display: flex; justify-content: center; gap: 48px; margin-top: 56px; position: relative; flex-wrap: wrap; }\n    .hero-stat { text-align: center; }\n    .hero-stat strong { display: block; font-size: 26px; font-weight: 900; color: white; }\n    .hero-stat span { font-size: 13px; color: rgba(255,255,255,0.7); }\n\n    .section { padding: 72px 24px; }\n    .section-inner { max-width: 960px; margin: 0 auto; }\n    .section-title { font-family: 'Noto Serif KR', serif; font-size: clamp(22px,3.5vw,30px); font-weight: 700; margin-bottom: 8px; }\n    .section-sub { color: var(--text-2); font-size: 15px; margin-bottom: 40px; }\n    .section-num { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 16px; }\n    .section-num .num { width: 36px; height: 36px; background: var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; flex-shrink: 0; }\n    .section-num .label { font-size: 13px; font-weight: 600; color: var(--blue); text-transform: uppercase; letter-spacing: .06em; }\n\n    /* 소스 타입 카드 */\n    .source-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }\n    .source-card { background: white; border-radius: var(--radius-sm); padding: 20px; border: 1px solid var(--border); text-align: center; transition: all .2s; box-shadow: var(--shadow); }\n    .source-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--blue); }\n    .source-card .sc-icon { font-size: 32px; margin-bottom: 10px; }\n    .source-card h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }\n    .source-card p { font-size: 12px; color: var(--text-2); line-height: 1.4; }\n\n    /* 워크플로우 */\n    .workflow { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }\n    .wf-step { flex: 1; min-width: 180px; background: white; border-radius: var(--radius-sm); padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); position: relative; }\n    .wf-step::after { content: '→'; position: absolute; right: -16px; top: 50%; transform: translateY(-50%); font-size: 20px; color: var(--border); z-index: 1; }\n    .wf-step:last-child::after { display: none; }\n    .wf-num { width: 32px; height: 32px; background: var(--blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; margin-bottom: 12px; }\n    .wf-step h4 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }\n    .wf-step p { font-size: 13px; color: var(--text-2); line-height: 1.5; }\n\n    /* 오디오 오버뷰 */\n    .audio-card { background: linear-gradient(135deg, #0D47A1, #1A73E8, #00BCD4); border-radius: var(--radius); padding: 32px; color: white; }\n    .audio-card h3 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }\n    .audio-card p { font-size: 15px; color: rgba(255,255,255,0.85); margin-bottom: 24px; }\n    .audio-features { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }\n    .audio-feat { background: rgba(255,255,255,0.12); border-radius: 10px; padding: 16px; }\n    .audio-feat h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }\n    .audio-feat p { font-size: 12px; color: rgba(255,255,255,0.75); line-height: 1.5; }\n\n    /* 활용 사례 */\n    .usecase-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }\n    .usecase-card { background: white; border-radius: var(--radius); padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }\n    .usecase-card .uc-icon { font-size: 32px; margin-bottom: 14px; }\n    .usecase-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }\n    .usecase-card ul { padding-left: 18px; font-size: 14px; color: var(--text-2); line-height: 1.9; }\n\n    /* 팁 */\n    .tip-box { background: white; border-left: 4px solid var(--blue); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 20px 24px; margin: 16px 0; box-shadow: var(--shadow); }\n    .tip-box strong { display: block; margin-bottom: 8px; font-size: 15px; color: var(--blue); }\n    .tip-box p, .tip-box ul { font-size: 14px; color: var(--text-2); line-height: 1.7; }\n    .tip-box ul { padding-left: 20px; }\n\n    .done-section { background: linear-gradient(135deg, #0D47A1, #1A73E8); padding: 72px 24px; text-align: center; color: white; }\n    .done-section h2 { font-family: 'Noto Serif KR', serif; font-size: clamp(22px,4vw,34px); margin-bottom: 16px; }\n    .done-section p { font-size: 16px; color: rgba(255,255,255,0.8); margin-bottom: 32px; }\n    .done-link { display: inline-flex; align-items: center; gap: 8px; background: white; color: var(--blue); font-weight: 700; padding: 14px 28px; border-radius: 100px; text-decoration: none; font-size: 16px; transition: transform .2s; }\n    .done-link:hover { transform: translateY(-2px); }\n\n    footer { background: #0D47A1; color: rgba(255,255,255,0.6); text-align: center; padding: 28px 24px; font-size: 14px; }\n    footer a { color: #A8D8FF; text-decoration: none; }\n    .back-top { position: fixed; bottom: 28px; right: 28px; width: 44px; height: 44px; background: var(--blue); color: white; border: none; border-radius: 50%; font-size: 18px; cursor: pointer; opacity: 0; transition: opacity .3s; box-shadow: var(--shadow); z-index: 200; }\n    .back-top.visible { opacity: 1; }\n\n    @media (max-width: 640px) { .nav-links { display: none; } .wf-step::after { display: none; } .workflow { flex-direction: column; } }\n  "},"notebooklm-importer":{"body":"\n\u003cnav class=\"nav\" id=\"top\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#top\">\u003cdiv class=\"logo-icon\">📥\u003c/div>NLM Importer\u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#what\">소개\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#how\">사용법\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#cases\">활용\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"hero-inner\">\n    \u003cdiv class=\"hero-badge free-badge\">✅ 크롬 익스텐션 · 완전 무료\u003c/div>\n    \u003cspan class=\"hero-emoji\">📥\u003c/span>\n    \u003ch1>NotebookLM Importer\u003c/h1>\n    \u003cp>웹 서핑 중 발견한 아티클을 클릭 한 번으로\u003cbr>NotebookLM 지식베이스에 바로 저장\u003c/p>\n    \u003cdiv class=\"hero-stats\">\n      \u003cdiv class=\"hero-stat\">\u003cstrong>1클릭\u003c/strong>\u003cspan>즉시 저장\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>무료\u003c/strong>\u003cspan>완전 무료\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>Chrome\u003c/strong>\u003cspan>익스텐션\u003c/span>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003cmain>\n  \u003cdiv class=\"section\" id=\"what\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">1\u003c/div>\u003ch2>무엇을 해결하는가?\u003c/h2>\u003c/div>\n    \u003cdiv class=\"flow-demo\">\n      \u003cdiv class=\"flow-step\">\n        \u003cdiv class=\"fs-icon\">🌐\u003c/div>\n        \u003cdiv class=\"fs-title\">웹 서핑 중\u003c/div>\n        \u003cdiv class=\"fs-desc\">유용한 아티클 발견\u003c/div>\n        \u003cdiv class=\"flow-arrow\">→\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"flow-step\">\n        \u003cdiv class=\"fs-icon\">📋\u003c/div>\n        \u003cdiv class=\"fs-title\">기존 방식\u003c/div>\n        \u003cdiv class=\"fs-desc\">URL 복사 → NotebookLM 열기 → 소스 추가 → 붙여넣기\u003c/div>\n        \u003cdiv class=\"flow-arrow\">→\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"flow-step\">\n        \u003cdiv class=\"fs-icon\">⚡\u003c/div>\n        \u003cdiv class=\"fs-title\">Importer 사용\u003c/div>\n        \u003cdiv class=\"fs-desc\">익스텐션 아이콘 클릭 → 완료!\u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\" style=\"margin-top:16px;\">\n      \u003cstrong>💡 핵심 가치:\u003c/strong> 좋은 콘텐츠를 발견했을 때 \"나중에 봐야지\"가 아니라 즉시 지식베이스로. 컨텍스트 전환 없이 웹 서핑 흐름 유지.\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section\" id=\"how\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">2\u003c/div>\u003ch2>설치 & 사용법\u003c/h2>\u003c/div>\n    \u003cdiv class=\"step-list\">\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">1\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>Chrome 웹스토어에서 \"NotebookLM Importer\" 검색 후 설치\u003c/strong>\u003cspan>또는 GitHub에서 직접 설치 (오픈소스). 완전 무료.\u003c/span>\u003c/div>\u003c/div>\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">2\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>Google 계정으로 로그인 (NotebookLM과 동일 계정)\u003c/strong>\u003cspan>권한: NotebookLM 접근 허용. 다른 데이터에는 접근하지 않음.\u003c/span>\u003c/div>\u003c/div>\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">3\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>저장할 NotebookLM 노트북 선택 (드롭다운)\u003c/strong>\u003cspan>여러 노트북 중 원하는 곳으로 바로 지정 가능.\u003c/span>\u003c/div>\u003c/div>\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">4\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>웹페이지에서 아이콘 클릭 → 자동으로 소스 추가 완료\u003c/strong>\u003cspan>URL이 자동으로 NotebookLM 소스 목록에 추가됨. 나중에 NotebookLM에서 AI 분석 가능.\u003c/span>\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section\" id=\"cases\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">3\u003c/div>\u003ch2>활용 시나리오\u003c/h2>\u003c/div>\n    \u003cdiv class=\"use-case-grid\">\n      \u003cdiv class=\"uc-card\">\u003cdiv class=\"uc-icon\">🔬\u003c/div>\u003cdiv class=\"uc-title\">리서치 수집\u003c/div>\u003cdiv class=\"uc-desc\">논문·기사·보고서를 발견할 때마다 즉시 주제별 노트북에 저장.\u003c/div>\u003c/div>\n      \u003cdiv class=\"uc-card\">\u003cdiv class=\"uc-icon\">📰\u003c/div>\u003cdiv class=\"uc-title\">뉴스 큐레이션\u003c/div>\u003cdiv class=\"uc-desc\">매일 읽는 AI·정책 뉴스를 자동 누적. 월말에 NotebookLM으로 동향 분석.\u003c/div>\u003c/div>\n      \u003cdiv class=\"uc-card\">\u003cdiv class=\"uc-icon\">📚\u003c/div>\u003cdiv class=\"uc-title\">학습 자료 구성\u003c/div>\u003cdiv class=\"uc-desc\">강의·튜토리얼 링크를 모아 NotebookLM에서 AI 요약·퀴즈 생성.\u003c/div>\u003c/div>\n      \u003cdiv class=\"uc-card\">\u003cdiv class=\"uc-icon\">🏢\u003c/div>\u003cdiv class=\"uc-title\">경쟁사 모니터링\u003c/div>\u003cdiv class=\"uc-desc\">경쟁사 블로그·보도자료 발견 즉시 저장 → 통합 분석.\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/main>\n\n\u003ca class=\"back-top\" href=\"#top\">↑\u003c/a>\n\u003cfooter>\u003cstrong>NotebookLM Importer 가이드\u003c/strong> · Chrome Extension · 무료 · 2025\u003c/footer>\n","styles":"\n    :root {\n      --brand:      #1A73E8;\n      --brand-dark: #1557B0;\n      --brand-light:#E8F0FE;\n      --teal:      #00BFA5;\n      --text:      #1A1A2E;\n      --text-2:    #4B5575;\n      --text-3:    #8892B0;\n      --bg:        #F8FAFF;\n      --white:     #FFFFFF;\n      --border:    #D2E3FC;\n      --shadow:    0 4px 24px rgba(26,115,232,0.10);\n      --shadow-lg: 0 8px 40px rgba(26,115,232,0.16);\n      --radius:    16px;\n      --radius-sm: 10px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }\n    .nav-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }\n    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--brand); text-decoration: none; }\n    .nav-logo .logo-icon { width: 34px; height: 34px; background: var(--brand); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }\n    .nav-links { display: flex; gap: 6px; list-style: none; }\n    .nav-links a { text-decoration: none; color: var(--text-2); font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: all .2s; }\n    .nav-links a:hover { background: var(--brand-light); color: var(--brand); }\n\n    .hero { background: linear-gradient(135deg, #0D1B4F 0%, #1A3A8F 50%, #1A73E8 100%); color: white; padding: 72px 24px 56px; text-align: center; position: relative; overflow: hidden; }\n    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(0,191,165,0.25) 0%, transparent 55%); }\n    .hero-inner { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }\n    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.25); border-radius: 100px; padding: 6px 16px; font-size: 13px; font-weight: 600; margin-bottom: 24px; }\n    .free-badge { background: rgba(0,191,165,0.3); }\n    .hero-emoji { font-size: 64px; display: block; margin-bottom: 16px; }\n    .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 700; margin-bottom: 14px; }\n    .hero p { font-size: 1.05rem; opacity: .85; margin-bottom: 36px; }\n    .hero-stats { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; }\n    .hero-stat strong { display: block; font-size: 1.5rem; font-weight: 700; }\n    .hero-stat span { font-size: .78rem; opacity: .7; }\n\n    main { max-width: 900px; margin: 0 auto; padding: 56px 24px; }\n    .section { margin-bottom: 64px; }\n    .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }\n    .section-num { width: 38px; height: 38px; background: var(--brand); color: white; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 17px; flex-shrink: 0; }\n    .section-header h2 { font-family: 'Noto Serif KR', serif; font-size: 1.5rem; font-weight: 700; }\n    .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 26px; box-shadow: var(--shadow); margin-bottom: 14px; }\n\n    .flow-demo { display: flex; align-items: center; gap: 0; background: white; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }\n    .flow-step { flex: 1; padding: 24px 20px; text-align: center; position: relative; }\n    .flow-step:not(:last-child) { border-right: 1px solid var(--border); }\n    .flow-arrow { position: absolute; right: -16px; top: 50%; transform: translateY(-50%); background: var(--brand); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; z-index: 1; box-shadow: var(--shadow); }\n    .fs-icon { font-size: 2.2rem; margin-bottom: 10px; }\n    .fs-title { font-weight: 700; font-size: .92rem; margin-bottom: 4px; }\n    .fs-desc { font-size: .8rem; color: var(--text-3); }\n\n    .step-list { display: flex; flex-direction: column; gap: 14px; }\n    .step-item { display: flex; gap: 16px; align-items: flex-start; padding: 16px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); }\n    .step-num { width: 30px; height: 30px; background: var(--brand); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .88rem; flex-shrink: 0; }\n    .step-content strong { display: block; font-size: .93rem; margin-bottom: 3px; }\n    .step-content span { font-size: .84rem; color: var(--text-2); }\n\n    .use-case-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }\n    .uc-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px; transition: all .2s; }\n    .uc-card:hover { border-color: var(--brand); transform: translateY(-2px); box-shadow: var(--shadow); }\n    .uc-icon { font-size: 1.8rem; margin-bottom: 8px; }\n    .uc-title { font-weight: 700; font-size: .9rem; margin-bottom: 5px; }\n    .uc-desc { font-size: .82rem; color: var(--text-2); }\n\n    .tip-box { background: linear-gradient(135deg, var(--brand-light), #fff); border-left: 4px solid var(--brand); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 14px 18px; font-size: .88rem; }\n    .tip-box strong { color: var(--brand-dark); }\n\n    .back-top { position: fixed; bottom: 32px; right: 32px; width: 44px; height: 44px; background: var(--brand); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: var(--shadow-lg); font-size: 20px; transition: all .2s; }\n    footer { background: #0D1B4F; color: rgba(255,255,255,0.6); text-align: center; padding: 28px 24px; font-size: .86rem; }\n    footer strong { color: #64B5F6; }\n  "},"notion":{"body":"\n\n\u003cnav class=\"nav\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#\">\n      \u003cdiv class=\"logo-icon\">N\u003c/div>\n      노션 가이드\n    \u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#blocks\">블록\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#database\">데이터베이스\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#ai\">AI 기능\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#shortcuts\">단축키\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#tips\">팁\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"notion-logo-wrap\">\n    \u003csvg class=\"notion-logo-svg\" viewBox=\"0 0 100 100\" xmlns=\"http://www.w3.org/2000/svg\">\n      \u003crect width=\"100\" height=\"100\" rx=\"18\" fill=\"white\"/>\n      \u003ctext x=\"50\" y=\"70\" font-size=\"60\" text-anchor=\"middle\" font-weight=\"900\" font-family=\"Georgia,serif\" fill=\"#191919\">N\u003c/text>\n    \u003c/svg>\n  \u003c/div>\n  \u003cdiv class=\"hero-badge\">📝 올인원 워크스페이스\u003c/div>\n  \u003ch1>모든 작업을 \u003cspan>한 곳에서\u003c/span>,\u003cbr/>노션으로 정리하세요\u003c/h1>\n  \u003cp>노트, 문서, 데이터베이스, 프로젝트 관리를 하나의 플랫폼에서. 개인부터 팀까지 유연하게 활용할 수 있는 올인원 생산성 도구입니다.\u003c/p>\n  \u003ca class=\"hero-cta\" href=\"https://notion.so\" target=\"_blank\">📝 노션 시작하기 (무료)\u003c/a>\n  \u003cdiv class=\"hero-stats\">\n    \u003cdiv class=\"hero-stat\">\u003cstrong>무료\u003c/strong>\u003cspan>기본 플랜\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>1억+\u003c/strong>\u003cspan>사용자\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>Notion AI\u003c/strong>\u003cspan>내장 AI\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>멀티플랫폼\u003c/strong>\u003cspan>웹·앱 지원\u003c/span>\u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 블록 -->\n\u003csection class=\"section\" id=\"blocks\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">1\u003c/div>\u003cspan class=\"label\">Blocks\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">노션의 기본 단위: 블록\u003c/h2>\n    \u003cp class=\"section-sub\">노션의 모든 콘텐츠는 '블록'으로 구성됩니다. \u003ccode style=\"background:#F0F0F0;padding:2px 6px;border-radius:4px;\">/\u003c/code>를 입력하면 블록 메뉴가 열립니다.\u003c/p>\n    \u003cdiv class=\"block-grid\">\n      \u003cdiv class=\"block-card\">\u003cdiv class=\"block-emoji\">📄\u003c/div>\u003cdiv class=\"block-text\">\u003ch4>텍스트\u003c/h4>\u003cp>기본 텍스트 입력\u003c/p>\u003c/div>\u003c/div>\n      \u003cdiv class=\"block-card\">\u003cdiv class=\"block-emoji\">1️⃣\u003c/div>\u003cdiv class=\"block-text\">\u003ch4>제목 H1/H2/H3\u003c/h4>\u003cp>계층별 제목 구조\u003c/p>\u003c/div>\u003c/div>\n      \u003cdiv class=\"block-card\">\u003cdiv class=\"block-emoji\">☑️\u003c/div>\u003cdiv class=\"block-text\">\u003ch4>할 일 목록\u003c/h4>\u003cp>체크박스 할 일\u003c/p>\u003c/div>\u003c/div>\n      \u003cdiv class=\"block-card\">\u003cdiv class=\"block-emoji\">📋\u003c/div>\u003cdiv class=\"block-text\">\u003ch4>글머리 / 번호\u003c/h4>\u003cp>리스트 및 순서 목록\u003c/p>\u003c/div>\u003c/div>\n      \u003cdiv class=\"block-card\">\u003cdiv class=\"block-emoji\">💡\u003c/div>\u003cdiv class=\"block-text\">\u003ch4>콜아웃\u003c/h4>\u003cp>강조 블록\u003c/p>\u003c/div>\u003c/div>\n      \u003cdiv class=\"block-card\">\u003cdiv class=\"block-emoji\">💬\u003c/div>\u003cdiv class=\"block-text\">\u003ch4>인용\u003c/h4>\u003cp>인용구 블록\u003c/p>\u003c/div>\u003c/div>\n      \u003cdiv class=\"block-card\">\u003cdiv class=\"block-emoji\">📊\u003c/div>\u003cdiv class=\"block-text\">\u003ch4>데이터베이스\u003c/h4>\u003cp>테이블/칸반/갤러리\u003c/p>\u003c/div>\u003c/div>\n      \u003cdiv class=\"block-card\">\u003cdiv class=\"block-emoji\">🖼️\u003c/div>\u003cdiv class=\"block-text\">\u003ch4>이미지/영상\u003c/h4>\u003cp>미디어 삽입\u003c/p>\u003c/div>\u003c/div>\n      \u003cdiv class=\"block-card\">\u003cdiv class=\"block-emoji\">🔗\u003c/div>\u003cdiv class=\"block-text\">\u003ch4>북마크\u003c/h4>\u003cp>URL 링크 카드\u003c/p>\u003c/div>\u003c/div>\n      \u003cdiv class=\"block-card\">\u003cdiv class=\"block-emoji\">💻\u003c/div>\u003cdiv class=\"block-text\">\u003ch4>코드 블록\u003c/h4>\u003cp>신택스 하이라이팅\u003c/p>\u003c/div>\u003c/div>\n      \u003cdiv class=\"block-card\">\u003cdiv class=\"block-emoji\">📐\u003c/div>\u003cdiv class=\"block-text\">\u003ch4>수식 (LaTeX)\u003c/h4>\u003cp>수학 수식 표현\u003c/p>\u003c/div>\u003c/div>\n      \u003cdiv class=\"block-card\">\u003cdiv class=\"block-emoji\">📄\u003c/div>\u003cdiv class=\"block-text\">\u003ch4>페이지 삽입\u003c/h4>\u003cp>하위 페이지 생성\u003c/p>\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 데이터베이스 -->\n\u003csection class=\"section\" id=\"database\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">2\u003c/div>\u003cspan class=\"label\">Database\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">노션의 핵심: 데이터베이스\u003c/h2>\n    \u003cp class=\"section-sub\">스프레드시트처럼 정보를 구조화하고, 다양한 뷰로 시각화할 수 있습니다.\u003c/p>\n\n    \u003cdiv class=\"db-showcase\">\n      \u003cdiv class=\"db-tabs\">\n        \u003cdiv class=\"db-tab active\" onclick=\"switchTab(this,'table')\">📋 테이블 뷰\u003c/div>\n        \u003cdiv class=\"db-tab\" onclick=\"switchTab(this,'views')\">👁️ 뷰 종류\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"db-content active\" id=\"tab-table\">\n        \u003ctable class=\"db-table\">\n          \u003cthead>\n            \u003ctr>\u003cth>프로젝트명\u003c/th>\u003cth>담당자\u003c/th>\u003cth>마감일\u003c/th>\u003cth>상태\u003c/th>\u003cth>우선순위\u003c/th>\u003c/tr>\n          \u003c/thead>\n          \u003ctbody>\n            \u003ctr>\u003ctd>랜딩 페이지 리뉴얼\u003c/td>\u003ctd>김민준\u003c/td>\u003ctd>2025. 7. 15\u003c/td>\u003ctd>\u003cspan class=\"status-tag st-progress\">진행중\u003c/span>\u003c/td>\u003ctd>🔴 높음\u003c/td>\u003c/tr>\n            \u003ctr>\u003ctd>사용자 인터뷰 정리\u003c/td>\u003ctd>이수진\u003c/td>\u003ctd>2025. 7. 20\u003c/td>\u003ctd>\u003cspan class=\"status-tag st-done\">완료\u003c/span>\u003c/td>\u003ctd>🟡 중간\u003c/td>\u003c/tr>\n            \u003ctr>\u003ctd>Q3 전략 보고서\u003c/td>\u003ctd>박지훈\u003c/td>\u003ctd>2025. 8. 1\u003c/td>\u003ctd>\u003cspan class=\"status-tag st-todo\">예정\u003c/span>\u003c/td>\u003ctd>🔴 높음\u003c/td>\u003c/tr>\n            \u003ctr>\u003ctd>SNS 콘텐츠 캘린더\u003c/td>\u003ctd>최유리\u003c/td>\u003ctd>2025. 7. 30\u003c/td>\u003ctd>\u003cspan class=\"status-tag st-progress\">진행중\u003c/span>\u003c/td>\u003ctd>🟢 낮음\u003c/td>\u003c/tr>\n          \u003c/tbody>\n        \u003c/table>\n      \u003c/div>\n      \u003cdiv class=\"db-content\" id=\"tab-views\">\n        \u003cdiv class=\"view-grid\">\n          \u003cdiv class=\"view-card\">\u003cdiv class=\"view-icon\">📋\u003c/div>\u003ch4>테이블\u003c/h4>\u003cp>스프레드시트 형식의 기본 뷰\u003c/p>\u003c/div>\n          \u003cdiv class=\"view-card\">\u003cdiv class=\"view-icon\">🗂️\u003c/div>\u003ch4>칸반 보드\u003c/h4>\u003cp>상태별 카드 보드. 프로젝트 관리 최적\u003c/p>\u003c/div>\n          \u003cdiv class=\"view-card\">\u003cdiv class=\"view-icon\">📅\u003c/div>\u003ch4>캘린더\u003c/h4>\u003cp>날짜 속성 기반 일정 뷰\u003c/p>\u003c/div>\n          \u003cdiv class=\"view-card\">\u003cdiv class=\"view-icon\">🖼️\u003c/div>\u003ch4>갤러리\u003c/h4>\u003cp>썸네일 이미지 카드 뷰\u003c/p>\u003c/div>\n          \u003cdiv class=\"view-card\">\u003cdiv class=\"view-icon\">📊\u003c/div>\u003ch4>타임라인\u003c/h4>\u003cp>간트 차트식 일정 관리\u003c/p>\u003c/div>\n          \u003cdiv class=\"view-card\">\u003cdiv class=\"view-icon\">📃\u003c/div>\u003ch4>리스트\u003c/h4>\u003cp>간결한 목록 형식\u003c/p>\u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"tip-box\" style=\"margin-top:24px;\">\n      \u003cstrong>💡 데이터베이스 속성(프로퍼티) 종류\u003c/strong>\n      \u003cp>텍스트, 숫자, 선택/다중선택, 날짜, 담당자, 체크박스, URL, 이메일, 전화번호, 수식, 관계(Relation), 롤업(Rollup) — 다양한 속성으로 원하는 데이터 구조를 만들 수 있습니다.\u003c/p>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- AI 기능 -->\n\u003csection class=\"section\" id=\"ai\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">3\u003c/div>\u003cspan class=\"label\">Notion AI\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">Notion AI — 내장 AI 어시스턴트\u003c/h2>\n    \u003cp class=\"section-sub\">별도 앱 없이 노션 안에서 AI를 바로 활용합니다. 스페이스바를 누르면 AI 메뉴가 열립니다.\u003c/p>\n    \u003cdiv class=\"ai-card\">\n      \u003ch3>✨ Notion AI로 할 수 있는 것\u003c/h3>\n      \u003cp>문서 작성, 요약, 번역, 개선부터 Q&A(Ask AI), 자동화까지 — 글쓰기의 모든 과정을 AI가 도와줍니다.\u003c/p>\n      \u003cdiv class=\"ai-features\">\n        \u003cdiv class=\"ai-feature\">\u003ch4>✍️ 글쓰기 도움\u003c/h4>\u003cp>브레인스토밍, 초안 작성, 문체 개선, 길이 조절\u003c/p>\u003c/div>\n        \u003cdiv class=\"ai-feature\">\u003ch4>📝 요약 & 번역\u003c/h4>\u003cp>긴 문서를 한 줄로, 다국어 번역 즉시 처리\u003c/p>\u003c/div>\n        \u003cdiv class=\"ai-feature\">\u003ch4>💬 Ask AI (Q&A)\u003c/h4>\u003cp>워크스페이스의 내용을 기반으로 질문에 답변\u003c/p>\u003c/div>\n        \u003cdiv class=\"ai-feature\">\u003ch4>⚡ 자동 채우기\u003c/h4>\u003cp>DB 속성을 AI로 자동 분류·태깅·요약\u003c/p>\u003c/div>\n        \u003cdiv class=\"ai-feature\">\u003ch4>🔧 액션 아이템 추출\u003c/h4>\u003cp>회의록에서 할 일 목록 자동 추출\u003c/p>\u003c/div>\n        \u003cdiv class=\"ai-feature\">\u003ch4>🌐 웹 검색 연동\u003c/h4>\u003cp>최신 정보를 검색하여 문서에 통합\u003c/p>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\">\n      \u003cstrong>💰 Notion AI 요금\u003c/strong>\n      \u003cp>Notion AI는 별도 추가 요금($10/월 per user)이 있습니다. Free 플랜에서도 제한적으로 체험 가능합니다. 팀 플랜($15/월)에는 AI가 포함되어 있습니다.\u003c/p>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 단축키 -->\n\u003csection class=\"section\" id=\"shortcuts\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">4\u003c/div>\u003cspan class=\"label\">Shortcuts\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">필수 단축키\u003c/h2>\n    \u003cp class=\"section-sub\">노션을 빠르게 쓰기 위한 핵심 단축키 모음입니다.\u003c/p>\n    \u003cdiv class=\"shortcut-grid\">\n      \u003cdiv class=\"shortcut-group\">\n        \u003ch4>📝 편집\u003c/h4>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>굵게\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">B\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>기울임\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">I\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>취소선\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">Shift\u003c/span>\u003cspan class=\"key\">S\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>인라인 코드\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">E\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>실행취소/재실행\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">Z/Y\u003c/span>\u003c/div>\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"shortcut-group\">\n        \u003ch4>🧭 내비게이션\u003c/h4>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>빠른 검색\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">P\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>새 페이지\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">N\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>사이드바 토글\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">\\\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>앞/뒤로 이동\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">Alt\u003c/span>\u003cspan class=\"key\">←/→\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>전체화면\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">Shift\u003c/span>\u003cspan class=\"key\">F\u003c/span>\u003c/div>\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"shortcut-group\">\n        \u003ch4>⚡ 블록 명령\u003c/h4>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>블록 메뉴 열기\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">/\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>AI 메뉴 열기\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">Space\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>블록 이동\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">Shift\u003c/span>\u003cspan class=\"key\">↑↓\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>블록 선택\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">Esc\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"shortcut-row\">\u003cspan>들여쓰기\u003c/span>\u003cdiv class=\"keys\">\u003cspan class=\"key\">Tab\u003c/span>\u003c/div>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 팁 -->\n\u003csection class=\"section\" id=\"tips\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">5\u003c/div>\u003cspan class=\"label\">Pro Tips\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">실전 노션 활용 팁\u003c/h2>\n    \u003cp class=\"section-sub\">노션을 더 잘 쓰기 위한 노하우를 정리했습니다.\u003c/p>\n    \u003cdiv class=\"tip-box\">\u003cstrong>🏗️ 템플릿 갤러리 활용\u003c/strong>\u003cp>노션 공식 템플릿 갤러리에서 OKR, 독서 목록, 콘텐츠 캘린더, 버그 트래커 등 수백 가지 무료 템플릿을 바로 사용할 수 있습니다.\u003c/p>\u003c/div>\n    \u003cdiv class=\"tip-box\">\u003cstrong>🔁 관계형 DB (Relation & Rollup)\u003c/strong>\u003cp>두 데이터베이스를 연결하고 집계값을 롤업으로 가져올 수 있습니다. 예: 프로젝트 DB ↔ 작업 DB를 연결하여 프로젝트별 완료율을 자동 계산.\u003c/p>\u003c/div>\n    \u003cdiv class=\"tip-box\">\u003cstrong>🌐 노션 커넥터\u003c/strong>\u003cp>GitHub, Jira, Slack, Google Drive 등 외부 서비스를 노션과 연동할 수 있습니다. 설정 → 커넥터에서 연결하세요.\u003c/p>\u003c/div>\n    \u003cdiv class=\"tip-box\">\u003cstrong>📤 공유 & 웹 퍼블리시\u003c/strong>\u003cp>모든 페이지를 URL로 공유하거나 웹사이트로 공개할 수 있습니다. 포트폴리오, 이력서, 팀 위키로 활용됩니다.\u003c/p>\u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection class=\"done-section\">\n  \u003ch2>📝 노션으로 나만의 워크스페이스를 만들어보세요\u003c/h2>\n  \u003cp>무료로 시작하고, 필요에 따라 확장하세요.\u003c/p>\n  \u003ca class=\"done-link\" href=\"https://notion.so\" target=\"_blank\">📝 노션 무료 시작\u003c/a>\n\u003c/section>\n\n\u003cfooter>\n  \u003cp>Notion은 Notion Labs Inc.에서 개발한 생산성 도구입니다.\u003c/p>\n  \u003cp style=\"margin-top:8px;\">공식 사이트: \u003ca href=\"https://notion.so\" target=\"_blank\">notion.so\u003c/a> &nbsp;|&nbsp; 템플릿: \u003ca href=\"https://notion.so/templates\" target=\"_blank\">notion.so/templates\u003c/a>\u003c/p>\n\u003c/footer>\n\u003cbutton class=\"back-top\" id=\"backTop\" onclick=\"window.scrollTo({top:0,behavior:'smooth'})\">↑\u003c/button>\n\u003cscript>\n  window.addEventListener('scroll', () => { document.getElementById('backTop').classList.toggle('visible', window.scrollY > 300); });\n  function switchTab(el, id) {\n    document.querySelectorAll('.db-tab').forEach(t => t.classList.remove('active'));\n    document.querySelectorAll('.db-content').forEach(c => c.classList.remove('active'));\n    el.classList.add('active');\n    document.getElementById('tab-' + id).classList.add('active');\n  }\n\u003c/script>\n","styles":"\n    :root {\n      --black:       #191919;\n      --gray-dark:   #2D2D2D;\n      --gray:        #37352F;\n      --gray-mid:    #787774;\n      --gray-light:  #E9E9E7;\n      --gray-bg:     #F7F6F3;\n      --accent:      #0A85D1;\n      --accent-light:#E8F4FD;\n      --green:       #0F9D58;\n      --orange:      #E55B0A;\n      --purple:      #6940A5;\n      --text:        #1A1A1A;\n      --text-2:      #4A4A4A;\n      --text-3:      #787774;\n      --border:      #E3E2DF;\n      --shadow:      0 4px 24px rgba(0,0,0,0.08);\n      --shadow-lg:   0 8px 40px rgba(0,0,0,0.14);\n      --radius:      14px;\n      --radius-sm:   8px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--gray-bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }\n    .nav-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }\n    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--black); text-decoration: none; }\n    .nav-logo .logo-icon { width: 34px; height: 34px; background: var(--black); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }\n    .nav-links { display: flex; gap: 6px; list-style: none; }\n    .nav-links a { text-decoration: none; color: var(--text-2); font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: all .2s; }\n    .nav-links a:hover { background: var(--gray-light); color: var(--black); }\n\n    .hero { background: linear-gradient(160deg, #191919 0%, #2D2D2D 60%, #37352F 100%); padding: 80px 24px 100px; text-align: center; position: relative; overflow: hidden; }\n    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.04) 0%, transparent 70%); }\n    .notion-logo-wrap { margin: 0 auto 24px; }\n    .notion-logo-svg { width: 72px; height: 72px; }\n    .hero-badge { display: inline-block; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9); font-size: 13px; font-weight: 600; padding: 6px 16px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 24px; position: relative; }\n    .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(30px,5vw,50px); font-weight: 700; color: white; line-height: 1.3; margin-bottom: 20px; position: relative; }\n    .hero h1 span { color: #9ECBFF; }\n    .hero p { font-size: clamp(15px,2.5vw,18px); color: rgba(255,255,255,0.8); max-width: 560px; margin: 0 auto 36px; position: relative; }\n    .hero-cta { display: inline-flex; align-items: center; gap: 8px; background: white; color: var(--black); font-weight: 700; font-size: 16px; padding: 14px 28px; border-radius: 8px; text-decoration: none; box-shadow: 0 8px 32px rgba(0,0,0,0.3); transition: transform .2s; position: relative; }\n    .hero-cta:hover { transform: translateY(-2px); }\n    .hero-stats { display: flex; justify-content: center; gap: 48px; margin-top: 56px; position: relative; flex-wrap: wrap; }\n    .hero-stat { text-align: center; }\n    .hero-stat strong { display: block; font-size: 26px; font-weight: 900; color: white; }\n    .hero-stat span { font-size: 13px; color: rgba(255,255,255,0.6); }\n\n    .section { padding: 72px 24px; }\n    .section-inner { max-width: 960px; margin: 0 auto; }\n    .section-title { font-family: 'Noto Serif KR', serif; font-size: clamp(22px,3.5vw,30px); font-weight: 700; margin-bottom: 8px; }\n    .section-sub { color: var(--text-3); font-size: 15px; margin-bottom: 40px; }\n    .section-num { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 16px; }\n    .section-num .num { width: 36px; height: 36px; background: var(--black); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; flex-shrink: 0; }\n    .section-num .label { font-size: 13px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: .06em; }\n\n    /* 블록 타입 카드 */\n    .block-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }\n    .block-card { background: white; border-radius: var(--radius-sm); padding: 16px 18px; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; transition: all .2s; cursor: default; }\n    .block-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }\n    .block-emoji { font-size: 22px; width: 40px; text-align: center; flex-shrink: 0; }\n    .block-text h4 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }\n    .block-text p { font-size: 12px; color: var(--text-3); line-height: 1.4; }\n\n    /* 데이터베이스 */\n    .db-showcase { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); }\n    .db-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--gray-bg); }\n    .db-tab { padding: 12px 20px; font-size: 14px; font-weight: 600; color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }\n    .db-tab.active { color: var(--black); border-bottom-color: var(--black); background: white; }\n    .db-content { padding: 24px; display: none; }\n    .db-content.active { display: block; }\n    .db-table { width: 100%; border-collapse: collapse; font-size: 14px; }\n    .db-table th { background: var(--gray-bg); padding: 10px 14px; text-align: left; font-weight: 600; color: var(--text-3); font-size: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); }\n    .db-table td { padding: 10px 14px; border-bottom: 1px solid var(--gray-light); }\n    .db-table tr:last-child td { border-bottom: none; }\n    .status-tag { display: inline-block; padding: 2px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; }\n    .st-done { background: #DCFCE7; color: #16A34A; }\n    .st-progress { background: #FEF3C7; color: #D97706; }\n    .st-todo { background: var(--gray-light); color: var(--text-3); }\n\n    /* 뷰 타입 */\n    .view-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; }\n    .view-card { background: white; border-radius: var(--radius-sm); padding: 20px; border: 1px solid var(--border); text-align: center; transition: all .2s; }\n    .view-card:hover { box-shadow: var(--shadow); transform: translateY(-3px); }\n    .view-icon { font-size: 32px; margin-bottom: 10px; }\n    .view-card h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }\n    .view-card p { font-size: 12px; color: var(--text-3); line-height: 1.4; }\n\n    /* AI 기능 */\n    .ai-card { background: linear-gradient(135deg, #191919, #2D2D2D); border-radius: var(--radius); padding: 32px; color: white; margin-bottom: 20px; }\n    .ai-card h3 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }\n    .ai-card p { font-size: 15px; color: rgba(255,255,255,0.8); margin-bottom: 20px; }\n    .ai-features { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }\n    .ai-feature { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 14px; }\n    .ai-feature h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }\n    .ai-feature p { font-size: 12px; color: rgba(255,255,255,0.65); line-height: 1.5; }\n\n    /* 단축키 */\n    .shortcut-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }\n    .shortcut-group { background: white; border-radius: var(--radius-sm); padding: 20px; border: 1px solid var(--border); }\n    .shortcut-group h4 { font-size: 14px; font-weight: 700; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }\n    .shortcut-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 14px; border-bottom: 1px solid var(--gray-light); }\n    .shortcut-row:last-child { border-bottom: none; }\n    .shortcut-row span:first-child { color: var(--text-2); }\n    .keys { display: flex; gap: 4px; }\n    .key { display: inline-block; background: var(--gray-bg); border: 1px solid var(--gray-light); border-radius: 4px; padding: 1px 7px; font-family: monospace; font-size: 12px; color: var(--text); }\n\n    /* 팁 */\n    .tip-box { background: white; border-left: 4px solid var(--black); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 20px 24px; margin: 16px 0; box-shadow: var(--shadow); }\n    .tip-box strong { display: block; margin-bottom: 6px; font-size: 15px; }\n    .tip-box p, .tip-box ul { font-size: 14px; color: var(--text-2); line-height: 1.7; }\n    .tip-box ul { padding-left: 20px; }\n\n    .done-section { background: #191919; padding: 72px 24px; text-align: center; color: white; }\n    .done-section h2 { font-family: 'Noto Serif KR', serif; font-size: clamp(22px,4vw,34px); margin-bottom: 16px; }\n    .done-section p { font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 32px; }\n    .done-link { display: inline-flex; align-items: center; gap: 8px; background: white; color: var(--black); font-weight: 700; padding: 14px 28px; border-radius: 8px; text-decoration: none; font-size: 16px; transition: transform .2s; }\n    .done-link:hover { transform: translateY(-2px); }\n\n    footer { background: #111; color: rgba(255,255,255,0.5); text-align: center; padding: 28px 24px; font-size: 14px; }\n    footer a { color: #9ECBFF; text-decoration: none; }\n    .back-top { position: fixed; bottom: 28px; right: 28px; width: 44px; height: 44px; background: var(--black); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; opacity: 0; transition: opacity .3s; box-shadow: var(--shadow); z-index: 200; }\n    .back-top.visible { opacity: 1; }\n\n    @media (max-width: 640px) { .nav-links { display: none; } .hero-stats { gap: 24px; } }\n  "},"obsidian":{"body":"\n\n\u003cnav class=\"nav\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#\">\n      \u003cdiv class=\"logo-icon\">🔮\u003c/div>\n      옵시디언 가이드\n    \u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#concept\">개념\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#features\">핵심 기능\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#graph\">그래프뷰\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#plugins\">플러그인\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#shortcuts\">단축키\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#tips\">활용 팁\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"obsidian-logo\">\n    \u003csvg viewBox=\"0 0 100 100\" xmlns=\"http://www.w3.org/2000/svg\">\n      \u003cdefs>\n        \u003clinearGradient id=\"og1\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"100%\">\n          \u003cstop offset=\"0%\" style=\"stop-color:#C4B5FD\"/>\n          \u003cstop offset=\"100%\" style=\"stop-color:#7C3AED\"/>\n        \u003c/linearGradient>\n        \u003clinearGradient id=\"og2\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"100%\">\n          \u003cstop offset=\"0%\" style=\"stop-color:#7C3AED\"/>\n          \u003cstop offset=\"100%\" style=\"stop-color:#3B0764\"/>\n        \u003c/linearGradient>\n      \u003c/defs>\n      \u003cpolygon points=\"50,5 85,30 90,65 50,95 10,65 15,30\" fill=\"url(#og2)\" opacity=\"0.9\"/>\n      \u003cpolygon points=\"50,15 78,35 82,62 50,85 18,62 22,35\" fill=\"url(#og1)\" opacity=\"0.7\"/>\n      \u003cpolygon points=\"50,25 68,40 72,60 50,75 28,60 32,40\" fill=\"white\" opacity=\"0.3\"/>\n      \u003ccircle cx=\"50\" cy=\"50\" r=\"8\" fill=\"white\" opacity=\"0.9\"/>\n    \u003c/svg>\n  \u003c/div>\n  \u003cdiv class=\"hero-badge\">🔮 로컬 우선 지식 관리 도구\u003c/div>\n  \u003ch1>생각을 \u003cspan>연결하는\u003c/span>\u003cbr/>두 번째 뇌, 옵시디언\u003c/h1>\n  \u003cp>마크다운 기반의 강력한 노트 앱. 내 데이터는 내 컴퓨터에, 지식은 그래프로 연결되어 새로운 인사이트를 만들어냅니다.\u003c/p>\n  \u003ca class=\"hero-cta\" href=\"https://obsidian.md\" target=\"_blank\">\n    🔮 공식 사이트 바로가기\n  \u003c/a>\n  \u003cdiv class=\"hero-stats\">\n    \u003cdiv class=\"hero-stat\">\u003cstrong>무료\u003c/strong>\u003cspan>개인 사용\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>1,400+\u003c/strong>\u003cspan>커뮤니티 플러그인\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>로컬\u003c/strong>\u003cspan>데이터 완전 소유\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>Markdown\u003c/strong>\u003cspan>표준 포맷\u003c/span>\u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 개념 -->\n\u003csection class=\"section\" id=\"concept\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">1\u003c/div>\u003cspan class=\"label\">Core Concept\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">옵시디언이란?\u003c/h2>\n    \u003cp class=\"section-sub\">옵시디언은 마크다운(.md) 파일을 기반으로 동작하는 로컬 지식 관리 도구입니다. 모든 데이터는 내 컴퓨터에 저장됩니다.\u003c/p>\n    \u003cdiv class=\"concept-grid\">\n      \u003cdiv class=\"concept-card\">\n        \u003cdiv class=\"concept-icon\" style=\"background:#F5F3FF;\">🧠\u003c/div>\n        \u003ch3>두 번째 뇌 (Second Brain)\u003c/h3>\n        \u003cp>PKM(개인 지식 관리) 방법론을 실현하는 도구. 생각과 정보를 체계적으로 수집·연결·활용할 수 있습니다.\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"concept-card\">\n        \u003cdiv class=\"concept-icon\" style=\"background:#FFF7ED;\">📁\u003c/div>\n        \u003ch3>Vault (볼트)\u003c/h3>\n        \u003cp>옵시디언의 작업 단위. 하나의 폴더가 하나의 볼트가 됩니다. 모든 노트와 첨부파일이 이 폴더 안에 저장됩니다.\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"concept-card\">\n        \u003cdiv class=\"concept-icon\" style=\"background:#F0FDF4;\">🔗\u003c/div>\n        \u003ch3>내부 링크 ([[wikilink]])\u003c/h3>\n        \u003cp>\u003ccode style=\"background:#F3F4F6;padding:2px 6px;border-radius:4px;\">[[노트이름]]\u003c/code> 형식으로 노트 간 연결. 이 링크들이 쌓여 지식 그래프가 완성됩니다.\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"concept-card\">\n        \u003cdiv class=\"concept-icon\" style=\"background:#FEF3C7;\">🏷️\u003c/div>\n        \u003ch3>태그 & 프로퍼티\u003c/h3>\n        \u003cp>\u003ccode style=\"background:#F3F4F6;padding:2px 6px;border-radius:4px;\">#태그\u003c/code>와 YAML 프론트매터로 노트를 분류·필터링할 수 있습니다.\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"concept-card\">\n        \u003cdiv class=\"concept-icon\" style=\"background:#F5F3FF;\">🗺️\u003c/div>\n        \u003ch3>그래프 뷰 (Graph View)\u003c/h3>\n        \u003cp>모든 노트와 연결 관계를 시각화. 지식의 클러스터와 고립된 노트를 한눈에 파악할 수 있습니다.\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"concept-card\">\n        \u003cdiv class=\"concept-icon\" style=\"background:#FFF0F3;\">🔌\u003c/div>\n        \u003ch3>플러그인 생태계\u003c/h3>\n        \u003cp>공식 코어 플러그인과 1,400개 이상의 커뮤니티 플러그인으로 기능을 무한히 확장할 수 있습니다.\u003c/p>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 핵심 기능 -->\n\u003csection class=\"section\" id=\"features\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">2\u003c/div>\u003cspan class=\"label\">Key Features\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">꼭 알아야 할 핵심 기능\u003c/h2>\n    \u003cp class=\"section-sub\">옵시디언을 강력하게 만드는 주요 기능들을 소개합니다.\u003c/p>\n    \u003cdiv class=\"feature-list\">\n      \u003cdiv class=\"feature-item\">\n        \u003cdiv class=\"feature-num\">①\u003c/div>\n        \u003cdiv class=\"feature-content\">\n          \u003ch3>📎 백링크 (Backlinks)\u003c/h3>\n          \u003cp>현재 노트를 링크한 다른 노트들의 목록을 자동으로 표시합니다. \"이 개념이 어디서 언급되었는가\"를 역추적할 수 있어 지식의 맥락을 풍부하게 만들어줍니다.\u003c/p>\n          \u003cspan class=\"feature-tag\">자동 생성\u003c/span>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feature-item\">\n        \u003cdiv class=\"feature-num\">②\u003c/div>\n        \u003cdiv class=\"feature-content\">\n          \u003ch3>🪄 Canvas (캔버스)\u003c/h3>\n          \u003cp>무한 화이트보드에 노트, 이미지, 웹페이지를 배치하고 연결할 수 있습니다. 아이디어 정리, 마인드맵, 프로젝트 계획에 활용됩니다.\u003c/p>\n          \u003cspan class=\"feature-tag\">코어 플러그인\u003c/span>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feature-item\">\n        \u003cdiv class=\"feature-num\">③\u003c/div>\n        \u003cdiv class=\"feature-content\">\n          \u003ch3>📆 데일리 노트 (Daily Notes)\u003c/h3>\n          \u003cp>날짜별 노트를 자동 생성합니다. 저널링, 일일 회고, 할 일 관리 등에 활용됩니다. 템플릿을 설정하면 매일 같은 형식으로 시작할 수 있습니다.\u003c/p>\n          \u003cspan class=\"feature-tag\">코어 플러그인\u003c/span>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feature-item\">\n        \u003cdiv class=\"feature-num\">④\u003c/div>\n        \u003cdiv class=\"feature-content\">\n          \u003ch3>🔍 전체 텍스트 검색\u003c/h3>\n          \u003cp>볼트 내 모든 노트의 내용을 즉시 검색합니다. 정규식, 태그 검색, 경로 검색 등 고급 쿼리도 지원합니다.\u003c/p>\n          \u003cspan class=\"feature-tag\">기본 기능\u003c/span>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feature-item\">\n        \u003cdiv class=\"feature-num\">⑤\u003c/div>\n        \u003cdiv class=\"feature-content\">\n          \u003ch3>📐 템플릿 (Templates)\u003c/h3>\n          \u003cp>미리 만들어둔 노트 구조를 새 노트에 즉시 적용합니다. 회의록, 독서 노트, 프로젝트 계획 등 반복적인 형식을 자동화합니다.\u003c/p>\n          \u003cspan class=\"feature-tag\">코어 플러그인\u003c/span>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feature-item\">\n        \u003cdiv class=\"feature-num\">⑥\u003c/div>\n        \u003cdiv class=\"feature-content\">\n          \u003ch3>☁️ 옵시디언 Sync / Publish\u003c/h3>\n          \u003cp>공식 유료 서비스. Sync는 기기 간 동기화($4/월), Publish는 노트를 웹사이트로 공개($8/월)할 수 있습니다. iCloud, Git 등으로 무료 동기화도 가능합니다.\u003c/p>\n          \u003cspan class=\"feature-tag\">유료 서비스\u003c/span>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 그래프 뷰 -->\n\u003csection class=\"section\" id=\"graph\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">3\u003c/div>\u003cspan class=\"label\">Graph View\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">그래프 뷰: 지식 지도\u003c/h2>\n    \u003cp class=\"section-sub\">연결된 노트들을 시각화하여 지식 구조를 한눈에 파악합니다.\u003c/p>\n    \u003cdiv class=\"graph-visual\">\n      \u003cdiv class=\"graph-nodes\">\n        \u003cdiv class=\"node node-main\">📚\u003cbr/>메인\u003c/div>\n        \u003cdiv class=\"node node-1\">AI\u003c/div>\n        \u003cdiv class=\"node node-2\">독서\u003c/div>\n        \u003cdiv class=\"node node-3\">프로젝트\u003c/div>\n        \u003cdiv class=\"node node-4\">아이디어\u003c/div>\n        \u003cdiv class=\"node node-5\">일기\u003c/div>\n        \u003cdiv class=\"node node-6\">연구\u003c/div>\n        \u003csvg style=\"position:absolute;inset:0;width:100%;height:100%;pointer-events:none;\" viewBox=\"0 0 100 100\" preserveAspectRatio=\"none\">\n          \u003cline x1=\"50\" y1=\"50\" x2=\"22\" y2=\"18\" stroke=\"rgba(167,139,250,0.5)\" stroke-width=\"0.5\"/>\n          \u003cline x1=\"50\" y1=\"50\" x2=\"74\" y2=\"13\" stroke=\"rgba(167,139,250,0.5)\" stroke-width=\"0.5\"/>\n          \u003cline x1=\"50\" y1=\"50\" x2=\"80\" y2=\"57\" stroke=\"rgba(167,139,250,0.5)\" stroke-width=\"0.5\"/>\n          \u003cline x1=\"50\" y1=\"50\" x2=\"14\" y2=\"62\" stroke=\"rgba(167,139,250,0.5)\" stroke-width=\"0.5\"/>\n          \u003cline x1=\"50\" y1=\"50\" x2=\"42\" y2=\"8\" stroke=\"rgba(167,139,250,0.5)\" stroke-width=\"0.5\"/>\n          \u003cline x1=\"50\" y1=\"50\" x2=\"62\" y2=\"80\" stroke=\"rgba(167,139,250,0.5)\" stroke-width=\"0.5\"/>\n          \u003cline x1=\"22\" y1=\"18\" x2=\"42\" y2=\"8\" stroke=\"rgba(167,139,250,0.3)\" stroke-width=\"0.3\"/>\n          \u003cline x1=\"74\" y1=\"13\" x2=\"80\" y2=\"57\" stroke=\"rgba(167,139,250,0.3)\" stroke-width=\"0.3\"/>\n        \u003c/svg>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\" style=\"margin-top:24px;\">\n      \u003cdiv class=\"tip-header\">💡 그래프 뷰 활용 팁\u003c/div>\n      \u003cul>\n        \u003cli>노드 크기: 링크가 많을수록 노드가 커집니다 — 허브 노트를 식별할 수 있습니다\u003c/li>\n        \u003cli>색상 필터: 태그별로 노드 색상을 다르게 설정하면 카테고리가 한눈에 보입니다\u003c/li>\n        \u003cli>고립 노트: 연결이 없는 노트를 찾아 링크를 추가하면 지식 그래프가 풍부해집니다\u003c/li>\n        \u003cli>로컬 그래프: 현재 노트와 연결된 노트만 보여주는 뷰도 활용해보세요\u003c/li>\n      \u003c/ul>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 플러그인 -->\n\u003csection class=\"section\" id=\"plugins\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">4\u003c/div>\u003cspan class=\"label\">Plugins\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">필수 커뮤니티 플러그인\u003c/h2>\n    \u003cp class=\"section-sub\">설정 → 커뮤니티 플러그인 → 탐색에서 설치할 수 있습니다.\u003c/p>\n    \u003cdiv class=\"plugin-grid\">\n      \u003cdiv class=\"plugin-card\">\n        \u003cdiv class=\"plugin-icon\">📅\u003c/div>\n        \u003cdiv class=\"plugin-info\">\n          \u003ch4>Templater\u003c/h4>\n          \u003cp>고급 템플릿 기능. 날짜, 파일명, 스크립트를 템플릿에 삽입할 수 있습니다.\u003c/p>\n          \u003cspan class=\"plugin-badge badge-community\">커뮤니티\u003c/span>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"plugin-card\">\n        \u003cdiv class=\"plugin-icon\">✅\u003c/div>\n        \u003cdiv class=\"plugin-info\">\n          \u003ch4>Tasks\u003c/h4>\n          \u003cp>볼트 전체의 할 일을 한 곳에 모아서 관리합니다. 마감일, 우선순위 설정 가능.\u003c/p>\n          \u003cspan class=\"plugin-badge badge-community\">커뮤니티\u003c/span>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"plugin-card\">\n        \u003cdiv class=\"plugin-icon\">📊\u003c/div>\n        \u003cdiv class=\"plugin-info\">\n          \u003ch4>Dataview\u003c/h4>\n          \u003cp>노트를 데이터베이스처럼 쿼리합니다. 특정 태그, 날짜, 속성을 가진 노트 목록을 동적으로 생성합니다.\u003c/p>\n          \u003cspan class=\"plugin-badge badge-community\">커뮤니티\u003c/span>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"plugin-card\">\n        \u003cdiv class=\"plugin-icon\">🤖\u003c/div>\n        \u003cdiv class=\"plugin-info\">\n          \u003ch4>Copilot\u003c/h4>\n          \u003cp>ChatGPT, Claude 등 AI를 옵시디언 내에서 직접 사용합니다. 노트 요약, 번역, 질문 응답 등.\u003c/p>\n          \u003cspan class=\"plugin-badge badge-community\">커뮤니티\u003c/span>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"plugin-card\">\n        \u003cdiv class=\"plugin-icon\">🗂️\u003c/div>\n        \u003cdiv class=\"plugin-info\">\n          \u003ch4>Kanban\u003c/h4>\n          \u003cp>노트 파일로 칸반 보드를 생성합니다. 프로젝트 관리와 작업 흐름 시각화에 활용됩니다.\u003c/p>\n          \u003cspan class=\"plugin-badge badge-community\">커뮤니티\u003c/span>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"plugin-card\">\n        \u003cdiv class=\"plugin-icon\">🌐\u003c/div>\n        \u003cdiv class=\"plugin-info\">\n          \u003ch4>Web Clipper\u003c/h4>\n          \u003cp>브라우저에서 웹페이지를 클리핑하여 옵시디언 볼트로 저장합니다. (공식 확장)\u003c/p>\n          \u003cspan class=\"plugin-badge badge-free\">공식\u003c/span>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"plugin-card\">\n        \u003cdiv class=\"plugin-icon\">🎨\u003c/div>\n        \u003cdiv class=\"plugin-info\">\n          \u003ch4>Excalidraw\u003c/h4>\n          \u003cp>옵시디언 내에서 손으로 그린 듯한 다이어그램을 작성합니다. 노트에 직접 삽입 가능.\u003c/p>\n          \u003cspan class=\"plugin-badge badge-community\">커뮤니티\u003c/span>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"plugin-card\">\n        \u003cdiv class=\"plugin-icon\">⏱️\u003c/div>\n        \u003cdiv class=\"plugin-info\">\n          \u003ch4>Periodic Notes\u003c/h4>\n          \u003cp>주간, 월간, 분기별, 연간 노트를 자동으로 생성하고 관리합니다.\u003c/p>\n          \u003cspan class=\"plugin-badge badge-community\">커뮤니티\u003c/span>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 단축키 -->\n\u003csection class=\"section\" id=\"shortcuts\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">5\u003c/div>\u003cspan class=\"label\">Shortcuts\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">필수 단축키\u003c/h2>\n    \u003cp class=\"section-sub\">이 단축키들만 익혀도 작업 속도가 크게 향상됩니다.\u003c/p>\n    \u003ctable class=\"shortcut-table\">\n      \u003cthead>\n        \u003ctr>\u003cth>기능\u003c/th>\u003cth>Mac\u003c/th>\u003cth>Windows / Linux\u003c/th>\u003c/tr>\n      \u003c/thead>\n      \u003ctbody>\n        \u003ctr>\u003ctd>커맨드 팔레트 (모든 명령어)\u003c/td>\u003ctd>\u003cspan class=\"key\">⌘\u003c/span> + \u003cspan class=\"key\">P\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"key\">Ctrl\u003c/span> + \u003cspan class=\"key\">P\u003c/span>\u003c/td>\u003c/tr>\n        \u003ctr>\u
