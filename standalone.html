=\"feature-item\">\n            \u003cdiv class=\"fi-icon\">🧠\u003c/div>\n            \u003cdiv class=\"fi-title\">Thinking Mode (Plus↑)\u003c/div>\n            \u003cdiv class=\"fi-desc\">웹 검색 후 레이아웃 추론 → 이미지 생성 → 자동 검증·수정. 한 번에 최대 8장 일관된 배치 생성. 복잡한 씬 성공률 대폭 향상.\u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"feature-item\">\n            \u003cdiv class=\"fi-icon\">🔤\u003c/div>\n            \u003cdiv class=\"fi-title\">한국어·비라틴 문자 정확 렌더링\u003c/div>\n            \u003cdiv class=\"fi-desc\">한국어·일본어·중국어·힌디어 텍스트를 이미지 안에 정확하게 삽입. 포스터·배너·인포그래픽 제작 수준으로 향상.\u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"feature-item\">\n            \u003cdiv class=\"fi-icon\">📐\u003c/div>\n            \u003cdiv class=\"fi-title\">2K 해상도 · 다양한 비율\u003c/div>\n            \u003cdiv class=\"fi-desc\">최대 2K(2048px) 해상도 지원. 3:1~1:3 종횡비 자유롭게 설정. 한 프롬프트에서 8장 일관 배치 생성.\u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"feature-item\">\n            \u003cdiv class=\"fi-icon\">💬\u003c/div>\n            \u003cdiv class=\"fi-title\">대화형 반복 수정\u003c/div>\n            \u003cdiv class=\"fi-desc\">\"배경을 파란 하늘로 바꿔줘\" 등 자연어로 정밀 수정. 참조 이미지 스타일 유지 변형. 이전 맥락 기억하며 일관성 유지.\u003c/div>\n          \u003c/div>\n        \u003c/div>\n\n        \u003cdiv style=\"background:#FFF3E0;border-left:4px solid #FF9500;border-radius:0 8px 8px 0;padding:14px 18px;margin-bottom:14px;font-size:.9rem;\">\n          \u003cstrong style=\"color:#E65100;\">⚠️ DALL-E 2·3 종료 예정:\u003c/strong> 2026년 5월 12일에 DALL-E 2·3 API가 완전 종료됩니다. 기존 코드를 gpt-image-2로 마이그레이션이 필요합니다.\n        \u003c/div>\n\n        \u003cdiv class=\"prompt-box\">\n          \u003cdiv class=\"prompt-label\">ChatGPT Images 2.0 — Thinking Mode 활용 예시\u003c/div>\n          \u003cdiv class=\"prompt-content\">\n\u003cspan class=\"tag\">Thinking Mode:\u003c/span> \u003cspan class=\"val\">\"2026 AI 혁신 포럼\" 행사 포스터를 만들어줘.\u003c/span>\u003cbr>\n\u003cspan class=\"val\">상단에 한국어 타이틀, 날짜 2026.06.15, 미래적 디지털 배경,\u003c/span>\u003cbr>\n\u003cspan class=\"val\">파란색 계열, 전문적인 느낌, A4 세로 비율\u003c/span>\u003cbr>\u003cbr>\n\u003cspan class=\"tag\">→ 모델이 자동으로:\u003c/span> \u003cspan class=\"style\">레이아웃 계획 → 텍스트 배치 추론 → 생성 → 자동 검증\u003c/span>\n          \u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- 3. 프롬프트 가이드 -->\n  \u003cdiv class=\"section\" id=\"prompts\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num\">3\u003c/div>\n      \u003ch2>이미지 프롬프트 작성법\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"card\">\n      \u003cdiv style=\"font-weight:700;margin-bottom:16px;font-size:1rem;\">✍️ 황금 공식: 주제 + 스타일 + 조명 + 구도 + 품질\u003c/div>\n      \u003cdiv class=\"prompt-box\" style=\"margin-bottom:0;\">\n        \u003cdiv class=\"prompt-label\">공식 적용 예시\u003c/div>\n        \u003cdiv class=\"prompt-content\">\n\u003cspan class=\"tag\">[주제]\u003c/span> \u003cspan class=\"val\">노트북으로 작업하는 한국인 여성\u003c/span>\u003cbr>\n\u003cspan class=\"tag\">[환경]\u003c/span> \u003cspan class=\"val\">+ 모던한 카페, 큰 창문 옆\u003c/span>\u003cbr>\n\u003cspan class=\"tag\">[스타일]\u003c/span> \u003cspan class=\"style\">+ 사진 실사 스타일, 자연스러운 느낌\u003c/span>\u003cbr>\n\u003cspan class=\"tag\">[조명]\u003c/span> \u003cspan class=\"val\">+ 따뜻한 자연광, 창문에서 들어오는 빛\u003c/span>\u003cbr>\n\u003cspan class=\"tag\">[구도]\u003c/span> \u003cspan class=\"val\">+ 측면 미디엄 샷\u003c/span>\u003cbr>\n\u003cspan class=\"tag\">[품질]\u003c/span> \u003cspan class=\"style\">+ 8K, bokeh 효과, 상업 사진 품질\u003c/span>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:16px;\">\n      \u003cdiv class=\"card\" style=\"margin-bottom:0;\">\n        \u003cdiv style=\"font-weight:700;margin-bottom:10px;\">📸 사진 스타일 키워드\u003c/div>\n        \u003cdiv style=\"font-size:.86rem;color:var(--text-2);line-height:2;\">\n          photo realistic · cinematic · film grain · bokeh\u003cbr>\n          golden hour · blue hour · studio lighting\u003cbr>\n          aerial shot · close-up · wide angle\u003cbr>\n          DSLR · 35mm film · Leica style\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"card\" style=\"margin-bottom:0;\">\n        \u003cdiv style=\"font-weight:700;margin-bottom:10px;\">🎨 아트 스타일 키워드\u003c/div>\n        \u003cdiv style=\"font-size:.86rem;color:var(--text-2);line-height:2;\">\n          watercolor · oil painting · digital art\u003cbr>\n          anime · manga · ghibli style\u003cbr>\n          pixel art · flat design · vector\u003cbr>\n          ukiyo-e · impressionism · cyberpunk\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- 4. 비교 -->\n  \u003cdiv class=\"section\" id=\"compare\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num\">4\u003c/div>\n      \u003ch2>도구 비교 & 선택 가이드\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"card\">\n      \u003ctable class=\"compare-table\">\n        \u003cthead>\n          \u003ctr>\u003cth>항목\u003c/th>\u003cth>🍌 나노바나나\u003c/th>\u003cth>🤖 GPT-4o 이미지\u003c/th>\u003c/tr>\n        \u003c/thead>\n        \u003ctbody>\n          \u003ctr>\u003ctd>한국어 지원\u003c/td>\u003ctd class=\"check\">✓ 네이티브\u003c/td>\u003ctd class=\"partial\">△ 지원 (번역 필요시)\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>무료 사용\u003c/td>\u003ctd class=\"check\">✓ 일 크레딧 제공\u003c/td>\u003ctd class=\"cross\">✗ Plus 플랜 필요\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>텍스트 삽입\u003c/td>\u003ctd class=\"partial\">△ 제한적\u003c/td>\u003ctd class=\"check\">✓ 정확한 텍스트\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>대화형 수정\u003c/td>\u003ctd class=\"cross\">✗\u003c/td>\u003ctd class=\"check\">✓ 자연어 수정\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>참조 이미지\u003c/td>\u003ctd class=\"partial\">△ 일부\u003c/td>\u003ctd class=\"check\">✓ 완전 지원\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>스타일 다양성\u003c/td>\u003ctd class=\"check\">✓ 사전 설정 풍부\u003c/td>\u003ctd class=\"partial\">△ 프롬프트 의존\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>상업적 사용\u003c/td>\u003ctd class=\"check\">✓ 가능\u003c/td>\u003ctd class=\"check\">✓ 가능\u003c/td>\u003c/div>\u003c/tr>\n          \u003ctr>\u003ctd>추천 용도\u003c/td>\u003ctd>빠른 이미지, SNS, 무료 작업\u003c/td>\u003ctd>포스터, 텍스트 포함, 정밀 작업\u003c/td>\u003c/tr>\n        \u003c/tbody>\n      \u003c/table>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\" style=\"margin-top:16px;\">\n      \u003cstrong>💡 실전 추천 워크플로우:\u003c/strong> 아이디어 탐색 → 나노바나나로 스타일 빠르게 시험 → 최종 결과물 → GPT-4o로 텍스트·디테일 정밀 수정\n    \u003c/div>\n  \u003c/div>\n\n\u003c/main>\n\n\u003ca class=\"back-top\" href=\"#top\" title=\"맨 위로\">↑\u003c/a>\n\n\u003cfooter>\n  \u003cstrong>AI 이미지 생성 완전 가이드\u003c/strong> · 나노바나나 & GPT-4o · 2025\u003cbr>\n  \u003cspan style=\"margin-top:6px;display:block;\">AI 도구 활용 교육 자료 — 내부 배포용\u003c/span>\n\u003c/footer>\n\n","styles":"\n    :root {\n      --brand:      #9B59B6;\n      --brand-dark: #7D3C98;\n      --brand-deep: #5B2C6F;\n      --brand-light:#F4ECF7;\n      --brand-mid:  #D7BDE2;\n      --orange:    #FF6B35;\n      --green:     #22C55E;\n      --text:      #1A1A2E;\n      --text-2:    #4B5575;\n      --text-3:    #8892B0;\n      --bg:        #FBF7FE;\n      --white:     #FFFFFF;\n      --border:    #E8D5F0;\n      --shadow:    0 4px 24px rgba(155,89,182,0.10);\n      --shadow-lg: 0 8px 40px rgba(155,89,182,0.16);\n      --radius:    16px;\n      --radius-sm: 10px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }\n    .nav-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }\n    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--brand); text-decoration: none; }\n    .nav-logo .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, #9B59B6, #FF6B35); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }\n    .nav-links { display: flex; gap: 6px; list-style: none; }\n    .nav-links a { text-decoration: none; color: var(--text-2); font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: all .2s; }\n    .nav-links a:hover { background: var(--brand-light); color: var(--brand); }\n\n    .hero { background: linear-gradient(135deg, #1A0A2E 0%, #3D1B6E 35%, #7D3C98 65%, #FF6B35 100%); color: white; padding: 80px 24px 60px; text-align: center; position: relative; overflow: hidden; }\n    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(155,89,182,0.4) 0%, transparent 55%), radial-gradient(ellipse at 75% 25%, rgba(255,107,53,0.3) 0%, transparent 50%); }\n    .hero-inner { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }\n    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.25); border-radius: 100px; padding: 6px 16px; font-size: 13px; font-weight: 500; margin-bottom: 28px; }\n    .hero-badge span { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }\n    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }\n    .hero-emoji { font-size: 72px; margin-bottom: 20px; display: block; }\n    .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; margin-bottom: 16px; line-height: 1.2; }\n    .hero p { font-size: 1.1rem; opacity: .85; margin-bottom: 40px; }\n    .hero-stats { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; }\n    .hero-stat { text-align: center; }\n    .hero-stat strong { display: block; font-size: 1.6rem; font-weight: 700; }\n    .hero-stat span { font-size: .8rem; opacity: .7; }\n\n    main { max-width: 960px; margin: 0 auto; padding: 60px 24px; }\n    .section { margin-bottom: 72px; }\n    .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }\n    .section-num { width: 40px; height: 40px; background: linear-gradient(135deg, var(--brand), var(--orange)); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; flex-shrink: 0; }\n    .section-header h2 { font-family: 'Noto Serif KR', serif; font-size: 1.6rem; font-weight: 700; }\n\n    .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 28px; box-shadow: var(--shadow); margin-bottom: 16px; }\n\n    /* 서비스 카드 */\n    .service-block { background: white; border-radius: var(--radius); border: 2px solid var(--border); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 32px; }\n    .service-header { padding: 24px 28px; display: flex; align-items: center; gap: 16px; }\n    .service-logo { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 30px; flex-shrink: 0; }\n    .service-title { font-family: 'Noto Serif KR', serif; font-size: 1.4rem; font-weight: 700; }\n    .service-subtitle { font-size: .9rem; color: var(--text-3); }\n    .service-body { padding: 0 28px 28px; }\n\n    .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 20px; }\n    .feature-item { background: var(--bg); border-radius: var(--radius-sm); padding: 16px; border: 1px solid var(--border); }\n    .fi-icon { font-size: 1.6rem; margin-bottom: 8px; }\n    .fi-title { font-weight: 700; font-size: .92rem; margin-bottom: 4px; }\n    .fi-desc { font-size: .82rem; color: var(--text-2); }\n\n    .prompt-box { background: #1A0A2E; border-radius: var(--radius); padding: 22px; color: white; margin-bottom: 14px; }\n    .prompt-label { font-size: .78rem; color: #8892B0; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }\n    .prompt-content { font-family: monospace; font-size: .9rem; line-height: 1.8; color: #E2E8F0; }\n    .prompt-content .tag { color: #C39BD3; font-weight: 700; }\n    .prompt-content .val { color: #82E0AA; }\n    .prompt-content .style { color: #F8C471; }\n\n    /* 나노바나나 전용 */\n    .nb-header { background: linear-gradient(135deg, #FFE066, #FF9500); }\n    .nb-logo { background: rgba(255,255,255,0.3); }\n\n    /* GPT 이미지 전용 */\n    .gpt-img-header { background: linear-gradient(135deg, #10A37F, #1A1A2E); }\n    .gpt-img-logo { background: rgba(255,255,255,0.15); }\n\n    .step-list { counter-reset: steps; }\n    .step-item { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 16px; padding: 16px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); }\n    .step-num { width: 32px; height: 32px; background: linear-gradient(135deg, var(--brand), var(--orange)); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .9rem; flex-shrink: 0; }\n    .step-content strong { display: block; font-size: .95rem; margin-bottom: 4px; }\n    .step-content span { font-size: .85rem; color: var(--text-2); }\n\n    .compare-table { width: 100%; border-collapse: collapse; }\n    .compare-table th { background: linear-gradient(135deg, var(--brand), var(--brand-dark)); color: white; padding: 12px 16px; text-align: left; font-weight: 600; font-size: .9rem; }\n    .compare-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: .88rem; }\n    .compare-table tr:last-child td { border-bottom: none; }\n    .compare-table tr:nth-child(even) td { background: var(--bg); }\n    .check { color: var(--green); font-weight: 700; }\n    .cross { color: #EF4444; }\n    .partial { color: var(--orange); }\n\n    .tip-box { background: linear-gradient(135deg, var(--brand-light), #fff); border-left: 4px solid var(--brand); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 16px 20px; margin-top: 12px; }\n    .tip-box strong { color: var(--brand-dark); }\n\n    .style-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }\n    .style-pill { padding: 6px 14px; border-radius: 100px; font-size: .82rem; font-weight: 600; border: 1px solid; cursor: default; }\n\n    .back-top { position: fixed; bottom: 32px; right: 32px; width: 46px; height: 46px; background: linear-gradient(135deg, var(--brand), var(--orange)); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: var(--shadow-lg); font-size: 20px; transition: all .2s; }\n    .back-top:hover { transform: translateY(-2px); opacity: .9; }\n\n    footer { background: #1A0A2E; color: rgba(255,255,255,0.6); text-align: center; padding: 32px 24px; font-size: .88rem; }\n    footer strong { color: #C39BD3; }\n  "},"video-music-ai":{"body":"\n\u003cnav class=\"nav\" id=\"top\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#top\">\u003cdiv class=\"logo-icon\">AV\u003c/div>영상 & 음악 AI\u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#video\">영상 생성\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#music\">음악 생성\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#compare\">비교\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\u003csection class=\"hero\">\n  \u003cdiv class=\"hero-inner\">\n    \u003cdiv class=\"hero-badge\">\u003cspan>\u003c/span> AI Creative Media · 2025\u003c/div>\n    \u003ch1>AI 영상 & 음악\u003cbr>생성 완전 가이드\u003c/h1>\n    \u003cp>Sora · Google Flow · Veo 3 · Runway — 텍스트 한 줄로 영상을\u003cbr>Suno · Udio · Lyria 2 — 프롬프트로 완성된 음악을\u003c/p>\n    \u003cdiv class=\"hero-stats\">\n      \u003cdiv class=\"hero-stat\">\u003cstrong>Sora\u003c/strong>\u003cspan>OpenAI 영상\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>Google Flow\u003c/strong>\u003cspan>Veo 3 영상 플랫폼\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>Suno\u003c/strong>\u003cspan>AI 음악 생성\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>Udio\u003c/strong>\u003cspan>고품질 음악\u003c/span>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\u003cmain>\n  \u003c!-- 영상 생성 -->\n  \u003cdiv class=\"section\" id=\"video\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\" style=\"background:var(--brand);\">1\u003c/div>\u003ch2>AI 영상 생성\u003c/h2>\u003c/div>\n\n    \u003c!-- Google Flow -->\n    \u003cdiv class=\"tool-card\">\n      \u003cdiv class=\"tc-header\" style=\"background:linear-gradient(135deg,#0D47A1,#1565C0);\">\n        \u003cdiv class=\"tc-icon\" style=\"background:rgba(255,255,255,0.2);\">Flow\u003c/div>\n        \u003cdiv>\u003cdiv class=\"tc-name\" style=\"color:white;\">Google Flow\u003c/div>\u003cdiv class=\"tc-sub\" style=\"color:rgba(255,255,255,0.8);\">labs.google/flow · Veo 3 기반 AI 영화 제작 플랫폼\u003c/div>\u003c/div>\n        \u003cdiv class=\"tc-badge\" style=\"background:rgba(255,255,255,0.25);\">AI Pro/Ultra\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"tc-body\">\n        \u003cdiv class=\"feat-grid\" style=\"margin-top:16px;\">\n          \u003cdiv class=\"feat-item\">\u003cdiv class=\"fi-title\">Veo 3 영상 생성\u003c/div>\u003cdiv class=\"fi-desc\">텍스트·이미지·영상 프레임으로 고품질 영상 생성. 오디오·대사 포함 가능.\u003c/div>\u003c/div>\n          \u003cdiv class=\"feat-item\">\u003cdiv class=\"fi-title\">Ingredients 시스템\u003c/div>\u003cdiv class=\"fi-desc\">캐릭터·장소·오브젝트를 재료로 등록 후 일관된 장면 연속 생성.\u003c/div>\u003c/div>\n          \u003cdiv class=\"feat-item\">\u003cdiv class=\"fi-title\">카메라 제어\u003c/div>\u003cdiv class=\"fi-desc\">팬·줌·달리·트래킹 등 정밀한 카메라 무브먼트 텍스트로 지정.\u003c/div>\u003c/div>\n          \u003cdiv class=\"feat-item\">\u003cdiv class=\"fi-title\">Imagen 4 이미지 통합\u003c/div>\u003cdiv class=\"fi-desc\">Whisk·ImageFX 기능 통합. 이미지 생성 후 즉시 영상화. 무료 이미지 생성.\u003c/div>\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"tip-box\">\u003cstrong>💡 Flow 핵심 팁:\u003c/strong> \"Veo 3.1 Fast\" 모델로 초안 생성 → 마음에 드는 장면 선택 → 더 긴 버전 생성. \"@\" 입력으로 기존 에셋 바로 참조. 프롬프트에 카메라 용어(wide shot, close-up, tracking)를 포함하면 품질 급상승.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003c!-- Sora -->\n    \u003cdiv class=\"tool-card\">\n      \u003cdiv class=\"tc-header\" style=\"background:linear-gradient(135deg,#085040,#10A37F);\">\n        \u003cdiv class=\"tc-icon\" style=\"background:rgba(255,255,255,0.2);\">Sora\u003c/div>\n        \u003cdiv>\u003cdiv class=\"tc-name\" style=\"color:white;\">Sora\u003c/div>\u003cdiv class=\"tc-sub\" style=\"color:rgba(255,255,255,0.8);\">sora.com · OpenAI · 물리 시뮬레이션 기반 영상 생성\u003c/div>\u003c/div>\n        \u003cdiv class=\"tc-badge\" style=\"background:rgba(255,255,255,0.25);\">Plus 이상\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"tc-body\">\n        \u003cdiv class=\"feat-grid\" style=\"margin-top:16px;\">\n          \u003cdiv class=\"feat-item\">\u003cdiv class=\"fi-title\">최대 20초 HD 영상\u003c/div>\u003cdiv class=\"fi-desc\">텍스트 프롬프트로 1080p 고화질 영상 생성. 물리 법칙 이해한 현실적 움직임.\u003c/div>\u003c/div>\n          \u003cdiv class=\"feat-item\">\u003cdiv class=\"fi-title\">Storyboard 기능\u003c/div>\u003cdiv class=\"fi-desc\">여러 장면을 순서대로 배치하여 단편 영상 제작. 장면 간 연속성 유지.\u003c/div>\u003c/div>\n          \u003cdiv class=\"feat-item\">\u003cdiv class=\"fi-title\">Re-cut & Remix\u003c/div>\u003cdiv class=\"fi-desc\">기존 영상의 특정 부분 수정·재생성. 스타일 변환 및 영상 확장 가능.\u003c/div>\u003c/div>\n          \u003cdiv class=\"feat-item\">\u003cdiv class=\"fi-title\">Loop 생성\u003c/div>\u003cdiv class=\"fi-desc\">끊김 없이 반복되는 루프 영상 생성. SNS·배경 영상 제작에 최적.\u003c/div>\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"tip-box\">\u003cstrong>💡 Sora 활용법:\u003c/strong> ChatGPT Plus·Pro·Team 구독 포함. sora.com 직접 접속. 프롬프트에 \"cinematic\", \"realistic\", \"8K\" 등 품질 키워드 추가. 짧은 클립 여러 개 생성 후 편집 도구로 연결.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003c!-- Runway -->\n    \u003cdiv class=\"tool-card\">\n      \u003cdiv class=\"tc-header\" style=\"background:linear-gradient(135deg,#1A1A2E,#2D2D5E);\">\n        \u003cdiv class=\"tc-icon\" style=\"background:#5B5BD6;\">RW\u003c/div>\n        \u003cdiv>\u003cdiv class=\"tc-name\" style=\"color:white;\">Runway Gen-4\u003c/div>\u003cdiv class=\"tc-sub\" style=\"color:rgba(255,255,255,0.8);\">runwayml.com · 영상 편집 특화 AI 플랫폼\u003c/div>\u003c/div>\n        \u003cdiv class=\"tc-badge\" style=\"background:#5B5BD6;\">무료/Pro\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"tc-body\">\n        \u003cdiv class=\"feat-grid\" style=\"margin-top:16px;\">\n          \u003cdiv class=\"feat-item\">\u003cdiv class=\"fi-title\">이미지→영상 변환\u003c/div>\u003cdiv class=\"fi-desc\">정적 이미지를 자연스럽게 움직이는 영상으로. 제품 사진 애니메이션에 최적.\u003c/div>\u003c/div>\n          \u003cdiv class=\"feat-item\">\u003cdiv class=\"fi-title\">인페인팅·아웃페인팅\u003c/div>\u003cdiv class=\"fi-desc\">영상 내 특정 영역 제거·추가·교체. 배경 교체 및 객체 삭제 자동화.\u003c/div>\u003c/div>\n          \u003cdiv class=\"feat-item\">\u003cdiv class=\"fi-title\">모션 브러시\u003c/div>\u003cdiv class=\"fi-desc\">원하는 영역에 직접 그려서 움직임 방향 지정. 세밀한 애니메이션 제어.\u003c/div>\u003c/div>\n          \u003cdiv class=\"feat-item\">\u003cdiv class=\"fi-title\">Act-One 액팅 캡처\u003c/div>\u003cdiv class=\"fi-desc\">웹캠으로 표정·동작 캡처 → AI 캐릭터에 적용. 1인 영상 제작에 혁신적.\u003c/div>\u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- 음악 생성 -->\n  \u003cdiv class=\"section\" id=\"music\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\" style=\"background:var(--pink);\">2\u003c/div>\u003ch2>AI 음악 생성\u003c/h2>\u003c/div>\n    \u003cdiv class=\"grid-2\">\n      \u003cdiv class=\"tool-card\" style=\"margin-bottom:0;\">\n        \u003cdiv class=\"tc-header\" style=\"background:linear-gradient(135deg,#3B0764,#7C3AED);\">\n          \u003cdiv class=\"tc-icon\" style=\"background:rgba(255,255,255,0.2);\">Su\u003c/div>\n          \u003cdiv>\u003cdiv class=\"tc-name\" style=\"color:white;\">Suno\u003c/div>\u003cdiv class=\"tc-sub\" style=\"color:rgba(255,255,255,0.8);\">suno.com · 가사+음악 동시 생성\u003c/div>\u003c/div>\n          \u003cdiv class=\"tc-badge\" style=\"background:rgba(255,255,255,0.25);\">무료/Pro\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"tc-body\">\n          \u003cdiv style=\"margin-top:14px;font-size:.88rem;color:var(--text-2);line-height:1.9;\">\n            \u003cdiv style=\"margin-bottom:8px;\">장르·분위기·가사 입력 → 2분 내외 완성 노래 즉시 생성\u003c/div>\n            \u003cdiv style=\"margin-bottom:8px;\">한국어 가사 포함 K-pop 스타일 생성 가능\u003c/div>\n            \u003cdiv style=\"margin-bottom:8px;\">무료: 1일 5곡 | Pro $8/월: 무제한 상업적 이용\u003c/div>\n            \u003cdiv>Custom 모드: 가사·스타일·제목 직접 지정\u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"tip-box\" style=\"margin-top:12px;\">\u003cstrong>프롬프트 예:\u003c/strong> \"K-pop, upbeat, female vocal, 2025 summer vibes\" 또는 한국어로 \"신나는 여름 팝송, 여성 보컬, 기타 중심\"\u003c/div>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"tool-card\" style=\"margin-bottom:0;\">\n        \u003cdiv class=\"tc-header\" style=\"background:linear-gradient(135deg,#831843,#EC4899);\">\n          \u003cdiv class=\"tc-icon\" style=\"background:rgba(255,255,255,0.2);\">Ud\u003c/div>\n          \u003cdiv>\u003cdiv class=\"tc-name\" style=\"color:white;\">Udio\u003c/div>\u003cdiv class=\"tc-sub\" style=\"color:rgba(255,255,255,0.8);\">udio.com · 전문가급 음악 품질\u003c/div>\u003c/div>\n          \u003cdiv class=\"tc-badge\" style=\"background:rgba(255,255,255,0.25);\">무료/Pro\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"tc-body\">\n          \u003cdiv style=\"margin-top:14px;font-size:.88rem;color:var(--text-2);line-height:1.9;\">\n            \u003cdiv style=\"margin-bottom:8px;\">Suno 대비 더 높은 음악 품질·믹싱 수준\u003c/div>\n            \u003cdiv style=\"margin-bottom:8px;\">스템 분리: 보컬·드럼·베이스 개별 추출 가능\u003c/div>\n            \u003cdiv style=\"margin-bottom:8px;\">Inpainting: 곡의 특정 구간만 수정·재생성\u003c/div>\n            \u003cdiv>상업적 사용 가능 (Pro 이상)\u003c/div>\n          \u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"card\" style=\"margin-top:16px;\">\n      \u003cdiv style=\"font-weight:700;margin-bottom:12px;\">Google Lyria 2 — Google Flow 통합 음악 AI\u003c/div>\n      \u003cp style=\"font-size:.9rem;color:var(--text-2);line-height:1.8;\">Google DeepMind의 Lyria 2 음악 생성 모델이 Google Flow에 통합됩니다. 영상 생성 시 배경음악 자동 생성, 분위기에 맞는 사운드트랙 제작. 뮤지션들과 협업하여 개발된 모델로 음악적 완성도가 높음. YouTube MusicFX에서도 사용 가능.\u003c/p>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- 비교 -->\n  \u003cdiv class=\"section\" id=\"compare\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\" style=\"background:linear-gradient(135deg,var(--brand),var(--pink));\">3\u003c/div>\u003ch2>도구 선택 가이드\u003c/h2>\u003c/div>\n    \u003cdiv class=\"card\">\n      \u003ctable class=\"compare-table\">\n        \u003cthead>\u003ctr>\u003cth>목적\u003c/th>\u003cth>추천 도구\u003c/th>\u003cth>이유\u003c/th>\u003c/tr>\u003c/thead>\n        \u003ctbody>\n          \u003ctr>\u003ctd>영화적 단편 영상\u003c/td>\u003ctd>Google Flow\u003c/td>\u003ctd>Ingredients 시스템으로 캐릭터 일관성 유지\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>현실적 물리 영상\u003c/td>\u003ctd>Sora\u003c/td>\u003ctd>물리 시뮬레이션 이해, 가장 자연스러운 움직임\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>이미지 → 영상 변환\u003c/td>\u003ctd>Runway\u003c/td>\u003ctd>정적 이미지 애니메이션, 세밀한 모션 제어\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>완성된 노래 빠르게\u003c/td>\u003ctd>Suno\u003c/td>\u003ctd>가사+음악 동시 생성, 무료 플랜 충분\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>고품질 음악·상업용\u003c/td>\u003ctd>Udio\u003c/td>\u003ctd>스템 분리, 높은 믹싱 품질\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>영상+음악 통합 제작\u003c/td>\u003ctd>Google Flow\u003c/td>\u003ctd>Veo 3 + Lyria 2 + Imagen 4 올인원\u003c/td>\u003c/tr>\n        \u003c/tbody>\n      \u003c/table>\n    \u003c/div>\n  \u003c/div>\n\u003c/main>\n\u003ca class=\"back-top\" href=\"#top\">↑\u003c/a>\n\u003cfooter>\u003cstrong>AI 영상 & 음악 생성 완전 가이드\u003c/strong> · Google Flow · Sora · Suno · Udio · 2025\u003c/footer>\n","styles":"\n    :root{--brand:#7C3AED;--brand-dark:#5B21B6;--brand-light:#F5F3FF;--orange:#FF6B35;--pink:#EC4899;--teal:#10A37F;--blue:#4285F4;--text:#1A1A2E;--text-2:#4B5575;--text-3:#8892B0;--bg:#FAF8FF;--white:#FFFFFF;--border:#DDD6FE;--shadow:0 4px 24px rgba(124,58,237,0.10);--shadow-lg:0 8px 40px rgba(124,58,237,0.16);--radius:16px;--radius-sm:10px;}\n    *{box-sizing:border-box;margin:0;padding:0;}html{scroll-behavior:smooth;}\n    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;font-size:16px;}\n    .nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;}\n    .nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;}\n    .nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;color:var(--brand);text-decoration:none;}\n    .nav-logo .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--brand),var(--pink));border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:14px;}\n    .nav-links{display:flex;gap:6px;list-style:none;}\n    .nav-links a{text-decoration:none;color:var(--text-2);font-size:14px;font-weight:500;padding:6px 12px;border-radius:8px;transition:all .2s;}\n    .nav-links a:hover{background:var(--brand-light);color:var(--brand);}\n    .hero{background:linear-gradient(135deg,#1A0A3E 0%,#3D1A78 35%,#7C3AED 65%,#EC4899 100%);color:white;padding:80px 24px 60px;text-align:center;position:relative;overflow:hidden;}\n    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(124,58,237,0.4) 0%,transparent 55%),radial-gradient(ellipse at 75% 25%,rgba(236,72,153,0.25) 0%,transparent 50%);}\n    .hero-inner{max-width:760px;margin:0 auto;position:relative;z-index:1;}\n    .hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.25);border-radius:100px;padding:6px 16px;font-size:13px;font-weight:500;margin-bottom:28px;}\n    .hero-badge span{width:8px;height:8px;background:#4ade80;border-radius:50%;display:inline-block;animation:pulse 2s infinite;}\n    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}\n    .hero h1{font-family:'Noto Serif KR',serif;font-size:clamp(2rem,5vw,3rem);font-weight:700;margin-bottom:16px;}\n    .hero p{font-size:1.1rem;opacity:.85;margin-bottom:40px;}\n    .hero-stats{display:flex;gap:32px;justify-content:center;flex-wrap:wrap;}\n    .hero-stat strong{display:block;font-size:1.6rem;font-weight:700;}\n    .hero-stat span{font-size:.8rem;opacity:.7;}\n    main{max-width:960px;margin:0 auto;padding:60px 24px;}\n    .section{margin-bottom:72px;}\n    .section-header{display:flex;align-items:center;gap:14px;margin-bottom:32px;}\n    .section-num{width:40px;height:40px;color:white;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0;}\n    .section-header h2{font-family:'Noto Serif KR',serif;font-size:1.6rem;font-weight:700;}\n    .card{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:28px;box-shadow:var(--shadow);margin-bottom:16px;}\n    .tool-card{background:white;border-radius:var(--radius);border:2px solid var(--border);overflow:hidden;margin-bottom:20px;box-shadow:var(--shadow);}\n    .tc-header{padding:22px 26px;display:flex;align-items:center;gap:16px;}\n    .tc-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:white;flex-shrink:0;}\n    .tc-name{font-family:'Noto Serif KR',serif;font-size:1.3rem;font-weight:700;}\n    .tc-sub{font-size:.88rem;margin-top:2px;}\n    .tc-badge{margin-left:auto;border-radius:100px;padding:5px 14px;font-size:.82rem;font-weight:700;white-space:nowrap;color:white;}\n    .tc-body{padding:0 26px 22px;}\n    .feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:14px;}\n    .feat-item{background:#F8F9FC;border-radius:var(--radius-sm);padding:14px;border:1px solid var(--border);}\n    .fi-title{font-weight:700;font-size:.9rem;margin-bottom:4px;}\n    .fi-desc{font-size:.82rem;color:var(--text-2);line-height:1.6;}\n    .grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}\n    .compare-table{width:100%;border-collapse:collapse;}\n    .compare-table th{background:var(--brand);color:white;padding:11px 14px;text-align:left;font-size:.88rem;}\n    .compare-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:.87rem;}\n    .compare-table tr:last-child td{border-bottom:none;}\n    .compare-table tr:nth-child(even) td{background:#F8F7FF;}\n    .check{color:#22C55E;font-weight:700;}\n    .tip-box{background:var(--brand-light);border-left:4px solid var(--brand);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 18px;font-size:.9rem;}\n    .tip-box strong{color:var(--brand-dark);}\n    .back-top{position:fixed;bottom:32px;right:32px;width:46px;height:46px;background:linear-gradient(135deg,var(--brand),var(--pink));color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:var(--shadow-lg);font-size:20px;}\n    footer{background:#1A0A3E;color:rgba(255,255,255,0.6);text-align:center;padding:32px 24px;font-size:.88rem;}\n    footer strong{color:#C4B5FD;}\n  "},"design-viz":{"body":"\n\n\u003cnav class=\"nav\" id=\"top\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#top\">\n      \u003cdiv class=\"logo-icon\">✨\u003c/div>\n      디자인 & 시각화\n    \u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#canva\">Canva\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#figma\">Figma\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#gamma\">Gamma\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#compare\">비교\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"hero-inner\">\n    \u003cdiv class=\"hero-badge\">\u003cspan>\u003c/span> Design & Visualization · 2025\u003c/div>\n    \u003cdiv class=\"tool-icons\">\n      \u003cdiv class=\"tool-icon-pill\" style=\"background:rgba(124,77,255,0.3);\">🎨 Canva\u003c/div>\n      \u003cdiv class=\"tool-icon-pill\" style=\"background:rgba(242,78,30,0.3);\">🖌️ Figma\u003c/div>\n      \u003cdiv class=\"tool-icon-pill\" style=\"background:rgba(99,102,241,0.3);\">⚡ Gamma\u003c/div>\n    \u003c/div>\n    \u003ch1>디자인 & 시각화\u003cbr>도구 가이드\u003c/h1>\n    \u003cp>Canva · Figma · Gamma — 누구나 전문가처럼 만드는 시각 콘텐츠의 모든 것\u003c/p>\n    \u003cdiv class=\"hero-stats\">\n      \u003cdiv class=\"hero-stat\">\u003cstrong>Canva\u003c/strong>\u003cspan>빠른 디자인\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>Figma\u003c/strong>\u003cspan>협업 UI/UX\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>Gamma\u003c/strong>\u003cspan>AI 프레젠테이션\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>모두\u003c/strong>\u003cspan>무료 시작 가능\u003c/span>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003cmain>\n\n  \u003c!-- Canva -->\n  \u003cdiv class=\"section\" id=\"canva\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num num-canva\">C\u003c/div>\n      \u003ch2>Canva — 누구나 디자이너\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"tool-block\">\n      \u003cdiv class=\"tool-header canva-header\">\n        \u003cdiv class=\"tool-logo\">🎨\u003c/div>\n        \u003cdiv>\n          \u003cdiv class=\"tool-name\">Canva\u003c/div>\n          \u003cdiv class=\"tool-tagline\">canva.com · 브라우저 기반 디자인 플랫폼\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"tool-badge\">무료 / Pro $15/월\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"tool-body\">\n        \u003cdiv class=\"feat-grid\">\n          \u003cdiv class=\"feat-item\">\n            \u003cdiv class=\"feat-icon\">📐\u003c/div>\n            \u003cdiv class=\"feat-title\">수천 가지 템플릿\u003c/div>\n            \u003cdiv class=\"feat-desc\">PPT·포스터·SNS·명함·로고·유튜브 썸네일 등 카테고리별 전문 템플릿. 선택 후 텍스트·색상만 바꾸면 완성.\u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"feat-item\">\n            \u003cdiv class=\"feat-icon\">🤖\u003c/div>\n            \u003cdiv class=\"feat-title\">AI 기능 (Magic Studio)\u003c/div>\n            \u003cdiv class=\"feat-desc\">텍스트로 이미지 생성, 배경 제거, 사진 품질 향상, 텍스트 자동 생성. 디자인 초보도 전문가 수준 결과물.\u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"feat-item\">\n            \u003cdiv class=\"feat-icon\">👥\u003c/div>\n            \u003cdiv class=\"feat-title\">실시간 협업\u003c/div>\n            \u003cdiv class=\"feat-desc\">링크 공유로 여러 명이 동시 편집. 댓글·버전 관리·승인 기능으로 팀 디자인 작업 효율화.\u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"feat-item\">\n            \u003cdiv class=\"feat-icon\">📤\u003c/div>\n            \u003cdiv class=\"feat-title\">다양한 출력 형식\u003c/div>\n            \u003cdiv class=\"feat-desc\">PDF·PNG·MP4·GIF·PPT·SVG 등으로 즉시 내보내기. 인쇄 주문도 Canva 내에서 바로 가능.\u003c/div>\n          \u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"use-case-list\">\n          \u003cdiv class=\"uc-item\">\u003cspan class=\"uc-emoji\">📊\u003c/span> 보고서·발표 자료 빠르게 제작 (템플릿 → 내용만 교체)\u003c/div>\n          \u003cdiv class=\"uc-item\">\u003cspan class=\"uc-emoji\">📱\u003c/span> SNS 콘텐츠 자동 크기 조절 (인스타·유튜브·블로그 동시 제작)\u003c/div>\n          \u003cdiv class=\"uc-item\">\u003cspan class=\"uc-emoji\">🎤\u003c/span> 행사 홍보물·배너·현수막 제작\u003c/div>\n          \u003cdiv class=\"uc-item\">\u003cspan class=\"uc-emoji\">✂️\u003c/span> 이미지 배경 제거 후 투명 PNG 다운로드\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"tip-box tip-canva\" style=\"margin-top:14px;\">\n          \u003cstrong>💡 꿀팁:\u003c/strong> Canva에서 \"Presentation\" 선택 후 \"AI로 프레젠테이션 생성\" 클릭 → 주제 입력만 하면 자동으로 구성된 PPT 초안 완성. ChatGPT와 함께 사용하면 내용도 자동 채워짐.\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- Figma -->\n  \u003cdiv class=\"section\" id=\"figma\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num num-figma\">F\u003c/div>\n      \u003ch2>Figma — 협업 UI/UX 디자인\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"tool-block\">\n      \u003cdiv class=\"tool-header figma-header\">\n        \u003cdiv class=\"tool-logo\">🖌️\u003c/div>\n        \u003cdiv>\n          \u003cdiv class=\"tool-name\">Figma\u003c/div>\n          \u003cdiv class=\"tool-tagline\">figma.com · 클라우드 기반 UI/UX 디자인 & 프로토타이핑\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"tool-badge\">무료 / Pro $15/월\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"tool-body\">\n        \u003cdiv class=\"feat-grid\">\n          \u003cdiv class=\"feat-item\">\n            \u003cdiv class=\"feat-icon\">🔗\u003c/div>\n            \u003cdiv class=\"feat-title\">실시간 동시 편집\u003c/div>\n            \u003cdiv class=\"feat-desc\">개발자·기획자·디자이너가 같은 파일에서 동시 작업. 변경사항 즉시 반영. 버전 히스토리 무제한.\u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"feat-item\">\n            \u003cdiv class=\"feat-icon\">📱\u003c/div>\n            \u003cdiv class=\"feat-title\">프로토타이핑\u003c/div>\n            \u003cdiv class=\"feat-desc\">화면 전환 애니메이션, 클릭 인터랙션 설정. 코딩 없이 앱/웹 동작 시뮬레이션 제작.\u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"feat-item\">\n            \u003cdiv class=\"feat-icon\">🧩\u003c/div>\n            \u003cdiv class=\"feat-title\">컴포넌트 시스템\u003c/div>\n            \u003cdiv class=\"feat-desc\">버튼·아이콘·카드를 컴포넌트로 만들어 전체 디자인 시스템 구축. 수정 시 전체 자동 반영.\u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"feat-item\">\n            \u003cdiv class=\"feat-icon\">💻\u003c/div>\n            \u003cdiv class=\"feat-title\">개발자 핸드오프\u003c/div>\n            \u003cdiv class=\"feat-desc\">CSS 값, 여백, 색상 코드 자동 추출. 개발자가 디자인 파일에서 바로 스펙 확인 가능.\u003c/div>\n          \u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"use-case-list\">\n          \u003cdiv class=\"uc-item\">\u003cspan class=\"uc-emoji\">🖥️\u003c/span> 웹/앱 UI 디자인 및 와이어프레임 제작\u003c/div>\n          \u003cdiv class=\"uc-item\">\u003cspan class=\"uc-emoji\">🎯\u003c/span> 클릭 가능한 프로토타입으로 사용자 테스트\u003c/div>\n          \u003cdiv class=\"uc-item\">\u003cspan class=\"uc-emoji\">🏢\u003c/span> 팀 디자인 시스템 구축 (컬러·타이포·컴포넌트)\u003c/div>\n          \u003cdiv class=\"uc-item\">\u003cspan class=\"uc-emoji\">🤝\u003c/span> 개발팀에 정확한 스펙 전달 (핸드오프)\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"tip-box tip-figma\" style=\"margin-top:14px;\">\n          \u003cstrong>💡 Figma AI (Dev Mode):\u003c/strong> 선택한 디자인 요소의 코드를 React·CSS·SwiftUI로 자동 생성. 디자이너가 직접 개발 코드를 추출할 수 있어 개발자와 소통 비용 대폭 절감.\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- Gamma -->\n  \u003cdiv class=\"section\" id=\"gamma\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num num-gamma\">G\u003c/div>\n      \u003ch2>Gamma — AI 프레젠테이션\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"tool-block\">\n      \u003cdiv class=\"tool-header gamma-header\">\n        \u003cdiv class=\"tool-logo\">⚡\u003c/div>\n        \u003cdiv>\n          \u003cdiv class=\"tool-name\">Gamma\u003c/div>\n          \u003cdiv class=\"tool-tagline\">gamma.app · AI 기반 프레젠테이션·문서·웹페이지 생성\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"tool-badge\">무료 / Plus $10/월\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"tool-body\">\n        \u003cdiv class=\"feat-grid\">\n          \u003cdiv class=\"feat-item\">\n            \u003cdiv class=\"feat-icon\">⚡\u003c/div>\n            \u003cdiv class=\"feat-title\">AI 즉시 생성\u003c/div>\n            \u003cdiv class=\"feat-desc\">주제 한 줄 입력 → 10초 내 완성된 프레젠테이션 생성. 슬라이드 구성·내용·디자인 모두 자동.\u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"feat-item\">\n            \u003cdiv class=\"feat-icon\">🎨\u003c/div>\n            \u003cdiv class=\"feat-title\">아름다운 기본 디자인\u003c/div>\n            \u003cdiv class=\"feat-desc\">전문 디자이너가 만든 테마를 AI가 자동 적용. 파워포인트 없이도 세련된 결과물.\u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"feat-item\">\n            \u003cdiv class=\"feat-icon\">🌐\u003c/div>\n            \u003cdiv class=\"feat-title\">웹 공유 & 임베드\u003c/div>\n            \u003cdiv class=\"feat-desc\">링크만으로 공유. 방문자 수·클릭 분석. 노션·슬랙·이메일에 바로 임베드 가능.\u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"feat-item\">\n            \u003cdiv class=\"feat-icon\">📄\u003c/div>\n            \u003cdiv class=\"feat-title\">PPT/PDF 변환\u003c/div>\n            \u003cdiv class=\"feat-desc\">완성된 Gamma 문서를 PPT·PDF로 내보내기. 기존 PPT 업로드 후 AI로 재디자인도 가능.\u003c/div>\n          \u003c/div>\n        \u003c/div>\n\n        \u003cdiv class=\"prompt-box\" style=\"background:#1E1B4B;border-radius:var(--radius);padding:20px;color:white;margin-bottom:14px;\">\n          \u003cdiv style=\"font-size:.78rem;color:#A5B4FC;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;\">Gamma AI 생성 프롬프트 예시\u003c/div>\n          \u003cdiv style=\"font-family:monospace;font-size:.9rem;line-height:1.8;color:#E2E8F0;\">\n            \u003cspan style=\"color:#818CF8;font-weight:700;\">주제:\u003c/span> \u003cspan style=\"color:#6EE7B7;\">2025년 AI 도구 활용 전략 — 공공기관 업무 혁신\u003c/span>\u003cbr>\n            \u003cspan style=\"color:#818CF8;font-weight:700;\">청중:\u003c/span> \u003cspan style=\"color:#6EE7B7;\">비개발자 공무원\u003c/span>\u003cbr>\n            \u003cspan style=\"color:#818CF8;font-weight:700;\">분량:\u003c/span> \u003cspan style=\"color:#6EE7B7;\">10슬라이드\u003c/span>\u003cbr>\n            \u003cspan style=\"color:#818CF8;font-weight:700;\">톤:\u003c/span> \u003cspan style=\"color:#6EE7B7;\">전문적이면서 이해하기 쉽게\u003c/span>\n          \u003c/div>\n        \u003c/div>\n\n        \u003cdiv class=\"use-case-list\">\n          \u003cdiv class=\"uc-item\">\u003cspan class=\"uc-emoji\">📊\u003c/span> 보고·업무 발표 자료 10분 만에 제작\u003c/div>\n          \u003cdiv class=\"uc-item\">\u003cspan class=\"uc-emoji\">📚\u003c/span> 교육 자료·강의 슬라이드 AI 자동 구성\u003c/div>\n          \u003cdiv class=\"uc-item\">\u003cspan class=\"uc-emoji\">🏢\u003c/span> 제안서·기획서를 웹 페이지 형태로 공유\u003c/div>\n          \u003cdiv class=\"uc-item\">\u003cspan class=\"uc-emoji\">🔄\u003c/span> 기존 PPT를 업로드해서 AI 리디자인\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"tip-box tip-gamma\" style=\"margin-top:14px;\">\n          \u003cstrong>💡 Claude + Gamma 조합:\u003c/strong> Claude로 발표 내용 초안 작성 → 복사 → Gamma \"텍스트 붙여넣기로 생성\" 선택 → 자동 슬라이드화. 30분 만에 완성도 높은 발표 자료 완성.\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003c!-- 비교 & 워크플로우 -->\n  \u003cdiv class=\"section\" id=\"compare\">\n    \u003cdiv class=\"section-header\">\n      \u003cdiv class=\"section-num num-compare\">4\u003c/div>\n      \u003ch2>도구 선택 & 조합 가이드\u003c/h2>\n    \u003c/div>\n    \u003cdiv class=\"card\" style=\"margin-bottom:20px;\">\n      \u003cdiv style=\"font-weight:700;margin-bottom:16px;\">📊 목적별 도구 선택\u003c/div>\n      \u003ctable class=\"compare-table\">\n        \u003cthead>\u003ctr>\u003cth>작업 유형\u003c/th>\u003cth class=\"dot-c\">Canva\u003c/th>\u003cth class=\"dot-f\">Figma\u003c/th>\u003cth class=\"dot-g\">Gamma\u003c/th>\u003c/tr>\u003c/thead>\n        \u003ctbody>\n          \u003ctr>\u003ctd>발표 자료 빠르게\u003c/td>\u003ctd class=\"dot-c\">✓ 추천\u003c/td>\u003ctd>△\u003c/td>\u003ctd class=\"dot-g\">✓ 추천\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>SNS 이미지·포스터\u003c/td>\u003ctd class=\"dot-c\">✓ 최적\u003c/td>\u003ctd>△\u003c/td>\u003ctd>✗\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>웹/앱 UI 디자인\u003c/td>\u003ctd>△\u003c/td>\u003ctd class=\"dot-f\">✓ 전문\u003c/td>\u003ctd>✗\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>팀 협업 디자인\u003c/td>\u003ctd>△\u003c/td>\u003ctd class=\"dot-f\">✓ 최적\u003c/td>\u003ctd>△\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>AI 자동 생성\u003c/td>\u003ctd class=\"dot-c\">✓\u003c/td>\u003ctd>△\u003c/td>\u003ctd class=\"dot-g\">✓ 최강\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>무료 사용 범위\u003c/td>\u003ctd>충분\u003c/td>\u003ctd>충분\u003c/td>\u003ctd>제한적\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>난이도\u003c/td>\u003ctd>🟢 쉬움\u003c/td>\u003ctd>🔴 어려움\u003c/td>\u003ctd>🟢 매우 쉬움\u003c/td>\u003c/tr>\n        \u003c/tbody>\n      \u003c/table>\n    \u003c/div>\n\n    \u003cdiv class=\"card\">\n      \u003cdiv style=\"font-weight:700;margin-bottom:16px;\">🔄 추천 조합 워크플로우\u003c/div>\n      \u003cdiv class=\"workflow-strip\">\n        \u003cdiv class=\"wf-step\">\n          \u003cdiv class=\"wf-icon\">💡\u003c/div>\n          \u003cdiv class=\"wf-name\">아이디어\u003c/div>\n          \u003cdiv class=\"wf-tool\">Claude AI\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"wf-step\">\n          \u003cdiv class=\"wf-icon\">⚡\u003c/div>\n          \u003cdiv class=\"wf-name\">초안 생성\u003c/div>\n          \u003cdiv class=\"wf-tool\">Gamma\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"wf-step\">\n          \u003cdiv class=\"wf-icon\">🎨\u003c/div>\n          \u003cdiv class=\"wf-name\">디자인 보정\u003c/div>\n          \u003cdiv class=\"wf-tool\">Canva\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"wf-step\">\n          \u003cdiv class=\"wf-icon\">🖌️\u003c/div>\n          \u003cdiv class=\"wf-name\">UI 프로토타입\u003c/div>\n          \u003cdiv class=\"wf-tool\">Figma\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"wf-step\">\n          \u003cdiv class=\"wf-icon\">📤\u003c/div>\n          \u003cdiv class=\"wf-name\">공유·배포\u003c/div>\n          \u003cdiv class=\"wf-tool\">링크/PDF\u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n\u003c/main>\n\n\u003ca class=\"back-top\" href=\"#top\" title=\"맨 위로\">↑\u003c/a>\n\n\u003cfooter>\n  \u003cstrong>디자인 & 시각화 도구 가이드\u003c/strong> · Canva · Figma · Gamma · 2025\u003cbr>\n  \u003cspan style=\"margin-top:6px;display:block;\">AI 도구 활용 교육 자료 — 내부 배포용\u003c/span>\n\u003c/footer>\n\n","styles":"\n    :root {\n      --brand:      #00C4CC;\n      --brand-dark: #009BA0;\n      --brand-light:#E0FAFA;\n      --canva:     #7C4DFF;\n      --figma:     #F24E1E;\n      --gamma:     #6366F1;\n      --text:      #1A1A2E;\n      --text-2:    #4B5575;\n      --text-3:    #8892B0;\n      --bg:        #F5FFFE;\n      --white:     #FFFFFF;\n      --border:    #C0EFEE;\n      --shadow:    0 4px 24px rgba(0,196,204,0.10);\n      --shadow-lg: 0 8px 40px rgba(0,196,204,0.16);\n      --radius:    16px;\n      --radius-sm: 10px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }\n    .nav-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }\n    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--brand-dark); text-decoration: none; }\n    .nav-logo .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, #7C4DFF, #F24E1E, #6366F1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }\n    .nav-links { display: flex; gap: 6px; list-style: none; }\n    .nav-links a { text-decoration: none; color: var(--text-2); font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: all .2s; }\n    .nav-links a:hover { background: var(--brand-light); color: var(--brand-dark); }\n\n    .hero { background: linear-gradient(135deg, #0D1B3E 0%, #1A237E 35%, #4527A0 65%, #00C4CC 100%); color: white; padding: 80px 24px 60px; text-align: center; position: relative; overflow: hidden; }\n    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 25% 50%, rgba(124,77,255,0.35) 0%, transparent 55%), radial-gradient(ellipse at 75% 25%, rgba(0,196,204,0.3) 0%, transparent 50%); }\n    .hero-inner { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }\n    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.25); border-radius: 100px; padding: 6px 16px; font-size: 13px; font-weight: 500; margin-bottom: 28px; }\n    .hero-badge span { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }\n    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }\n    .tool-icons { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }\n    .tool-icon-pill { background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); border-radius: 100px; padding: 10px 20px; font-weight: 700; font-size: 1rem; }\n    .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; margin-bottom: 16px; line-height: 1.2; }\n    .hero p { font-size: 1.1rem; opacity: .85; margin-bottom: 40px; }\n    .hero-stats { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; }\n    .hero-stat { text-align: center; }\n    .hero-stat strong { display: block; font-size: 1.6rem; font-weight: 700; }\n    .hero-stat span { font-size: .8rem; opacity: .7; }\n\n    main { max-width: 960px; margin: 0 auto; padding: 60px 24px; }\n    .section { margin-bottom: 72px; }\n    .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }\n    .section-num { width: 40px; height: 40px; color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; flex-shrink: 0; }\n    .num-canva { background: var(--canva); }\n    .num-figma { background: var(--figma); }\n    .num-gamma { background: var(--gamma); }\n    .num-compare { background: linear-gradient(135deg, var(--canva), var(--gamma)); }\n    .section-header h2 { font-family: 'Noto Serif KR', serif; font-size: 1.6rem; font-weight: 700; }\n\n    .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 28px; box-shadow: var(--shadow); margin-bottom: 16px; }\n\n    .tool-block { background: white; border-radius: var(--radius); border: 2px solid var(--border); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 32px; }\n    .tool-header { padding: 24px 28px; display: flex; align-items: center; gap: 16px; color: white; }\n    .tool-logo { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; background: rgba(255,255,255,0.2); flex-shrink: 0; }\n    .tool-name { font-family: 'Noto Serif KR', serif; font-size: 1.4rem; font-weight: 700; }\n    .tool-tagline { font-size: .88rem; opacity: .85; margin-top: 2px; }\n    .tool-badge { margin-left:auto; background: rgba(255,255,255,0.25); padding: 5px 14px; border-radius: 100px; font-size: .82rem; font-weight: 700; white-space: nowrap; }\n    .tool-body { padding: 24px 28px; }\n\n    .canva-header { background: linear-gradient(135deg, #7C4DFF, #3D00C8); }\n    .figma-header { background: linear-gradient(135deg, #F24E1E, #A3290C); }\n    .gamma-header { background: linear-gradient(135deg, #6366F1, #3730A3); }\n\n    .feat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 20px; }\n    .feat-item { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; }\n    .feat-icon { font-size: 1.8rem; margin-bottom: 8px; }\n    .feat-title { font-weight: 700; font-size: .92rem; margin-bottom: 4px; }\n    .feat-desc { font-size: .82rem; color: var(--text-2); line-height: 1.6; }\n\n    .use-case-list { display: flex; flex-direction: column; gap: 10px; }\n    .uc-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: .9rem; }\n    .uc-emoji { font-size: 1.3rem; flex-shrink: 0; }\n\n    .tip-box { border-left: 4px solid; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 14px 18px; margin-top: 14px; font-size: .88rem; }\n    .tip-canva { background: #F3EEFF; border-color: var(--canva); }\n    .tip-canva strong { color: var(--canva); }\n    .tip-figma { background: #FFF0EC; border-color: var(--figma); }\n    .tip-figma strong { color: var(--figma); }\n    .tip-gamma { background: #EEEEFF; border-color: var(--gamma); }\n    .tip-gamma strong { color: var(--gamma); }\n\n    .compare-table { width: 100%; border-collapse: collapse; }\n    .compare-table th { background: #1A1A2E; color: white; padding: 12px 16px; text-align: left; font-weight: 600; font-size: .88rem; }\n    .compare-table td { padding: 11px 16px; border-bottom: 1px solid var(--border); font-size: .87rem; }\n    .compare-table tr:last-child td { border-bottom: none; }\n    .compare-table tr:nth-child(even) td { background: #F8FFFE; }\n    .dot-c { color: var(--canva); font-weight: 700; }\n    .dot-f { color: var(--figma); font-weight: 700; }\n    .dot-g { color: var(--gamma); font-weight: 700; }\n\n    .workflow-strip { display: flex; gap: 0; margin: 20px 0; overflow-x: auto; }\n    .wf-step { flex: 1; min-width: 130px; padding: 16px 12px; text-align: center; background: white; border: 1px solid var(--border); position: relative; }\n    .wf-step:not(:last-child)::after { content: '→'; position: absolute; right: -12px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; color: var(--text-3); z-index: 1; }\n    .wf-step:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }\n    .wf-step:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }\n    .wf-icon { font-size: 1.8rem; margin-bottom: 6px; }\n    .wf-name { font-size: .82rem; font-weight: 700; }\n    .wf-tool { font-size: .75rem; color: var(--text-3); }\n\n    .back-top { position: fixed; bottom: 32px; right: 32px; width: 46px; height: 46px; background: linear-gradient(135deg, var(--canva), var(--gamma)); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: var(--shadow-lg); font-size: 20px; transition: all .2s; }\n    .back-top:hover { transform: translateY(-2px); opacity: .9; }\n\n    footer { background: #0D1B3E; color: rgba(255,255,255,0.6); text-align: center; padding: 32px 24px; font-size: .88rem; }\n    footer strong { color: var(--brand); }\n  "}}}</script>
<script>
const DATA = JSON.parse(document.getElementById('appdata').textContent);
const sidebar = document.getElementById('sidebar');
const main = document.getElementById('main');
const crumb = document.getElementById('crumb');
const printBtn = document.getElementById('printBtn');
const homeBtn = document.getElementById('homeBtn');
const themeBtn = document.getElementById('themeBtn');

// 테마
const THEME_KEY = 'aiguide-theme';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  themeBtn.textContent = t==='dark' ? '☀️ 라이트' : '🌙 다크';
  try{ localStorage.setItem(THEME_KEY, t); }catch(e){}
}
function initTheme(){
  let t = null;
  try{ t = localStorage.getItem(THEME_KEY); }catch(e){}
  if(!t){
    t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
  }
  applyTheme(t);
}
themeBtn.addEventListener('click',()=>{
  const cur = document.documentElement.getAttribute('data-theme')||'dark';
  applyTheme(cur==='dark'?'light':'dark');
});
initTheme();

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function renderSidebar(activeSlug){
  let html='';
  for(const c of DATA.categories){
    html += '<div class="cat"><span class="dot" style="background:'+c.color+'"></span>'+escapeHtml(c.label)+'</div><div class="nav">';
    for(const g of c.guides){
      html += '<a class="'+(g.slug===activeSlug?'active':'')+'" data-slug="'+g.slug+'">'+escapeHtml(g.title)+'</a>';
    }
    html += '</div>';
  }
  sidebar.innerHTML = html;
  sidebar.querySelectorAll('a[data-slug]').forEach(a=>a.addEventListener('click',()=>showGuide(a.dataset.slug)));
}

function showHome(){
  crumb.textContent=''; printBtn.style.display='none';
  let html = '<div class="home"><h2>AI 가이드 허브</h2><p class="lead">필요한 도구를 골라 빠르게 익히세요. 인터넷 없이 작동합니다.</p>';
  for(const c of DATA.categories){
    html += '<div class="cat-block"><h3><span class="dot" style="background:'+c.color+'"></span>'+escapeHtml(c.label)+'</h3><div class="cards">';
    for(const g of c.guides){
      html += '<div class="card" data-slug="'+g.slug+'"><div class="t">'+escapeHtml(g.title)+'</div><div class="s">'+escapeHtml(g.subtitle)+'</div></div>';
    }
    html += '</div></div>';
  }
  html += '</div>';
  main.innerHTML = html;
  main.querySelectorAll('.card').forEach(el=>el.addEventListener('click',()=>showGuide(el.dataset.slug)));
  renderSidebar(null);
}

function findGuide(slug){for(const c of DATA.categories){const g=c.guides.find(x=>x.slug===slug);if(g)return{guide:g,category:c}}return null}
function flatGuides(){return DATA.categories.flatMap(c=>c.guides)}

function showGuide(slug){
  const found=findGuide(slug); if(!found) return;
  const {guide,category}=found;
  const content=DATA.guideContents[slug];
  crumb.textContent=' / '+category.label+' / '+guide.title;
  printBtn.style.display='inline-block';
  const all=flatGuides(); const i=all.findIndex(g=>g.slug===slug);
  const prev=i>0?all[i-1]:null; const next=i<all.length-1?all[i+1]:null;
  let html='';
  if(content.styles) html+='<style>'+content.styles+'</style>';
  html += '<div class="guide-wrap">'+content.body+'</div>';
  html += '<div class="footer-nav">';
  html += prev?'<button data-slug="'+prev.slug+'">← '+escapeHtml(prev.title)+'</button>':'<span></span>';
  html += next?'<button data-slug="'+next.slug+'">'+escapeHtml(next.title)+' →</button>':'<span></span>';
  html += '</div>';
  main.innerHTML=html;
  main.querySelectorAll('.footer-nav button[data-slug]').forEach(b=>b.addEventListener('click',()=>showGuide(b.dataset.slug)));
  renderSidebar(slug); main.scrollTop=0; location.hash='#'+slug;
}

homeBtn.addEventListener('click',()=>{location.hash=''; showHome()});
printBtn.addEventListener('click',()=>window.print());
window.addEventListener('hashchange',()=>{const s=location.hash.replace('#','');if(s)showGuide(s);else showHome()});

const initial=location.hash.replace('#','');
if(initial && findGuide(initial)) showGuide(initial); else showHome();
</script>
</body>
</html>
