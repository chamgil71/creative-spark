003ctd>퀵 스위처 (노트 이동)\u003c/td>\u003ctd>\u003cspan class=\"key\">⌘\u003c/span> + \u003cspan class=\"key\">O\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"key\">Ctrl\u003c/span> + \u003cspan class=\"key\">O\u003c/span>\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>새 노트 생성\u003c/td>\u003ctd>\u003cspan class=\"key\">⌘\u003c/span> + \u003cspan class=\"key\">N\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"key\">Ctrl\u003c/span> + \u003cspan class=\"key\">N\u003c/span>\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>전체 검색\u003c/td>\u003ctd>\u003cspan class=\"key\">⌘\u003c/span> + \u003cspan class=\"key\">Shift\u003c/span> + \u003cspan class=\"key\">F\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"key\">Ctrl\u003c/span> + \u003cspan class=\"key\">Shift\u003c/span> + \u003cspan class=\"key\">F\u003c/span>\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>편집/읽기 모드 전환\u003c/td>\u003ctd>\u003cspan class=\"key\">⌘\u003c/span> + \u003cspan class=\"key\">E\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"key\">Ctrl\u003c/span> + \u003cspan class=\"key\">E\u003c/span>\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>그래프 뷰 열기\u003c/td>\u003ctd>\u003cspan class=\"key\">⌘\u003c/span> + \u003cspan class=\"key\">G\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"key\">Ctrl\u003c/span> + \u003cspan class=\"key\">G\u003c/span>\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>내부 링크 삽입\u003c/td>\u003ctd>\u003cspan class=\"key\">[\u003c/span> \u003cspan class=\"key\">[\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"key\">[\u003c/span> \u003cspan class=\"key\">[\u003c/span>\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>분할 편집기 열기\u003c/td>\u003ctd>\u003cspan class=\"key\">⌘\u003c/span> + \u003cspan class=\"key\">\\\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"key\">Ctrl\u003c/span> + \u003cspan class=\"key\">\\\u003c/span>\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>굵게 / 기울임\u003c/td>\u003ctd>\u003cspan class=\"key\">⌘\u003c/span> + \u003cspan class=\"key\">B\u003c/span> / \u003cspan class=\"key\">I\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"key\">Ctrl\u003c/span> + \u003cspan class=\"key\">B\u003c/span> / \u003cspan class=\"key\">I\u003c/span>\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>오늘의 데일리 노트\u003c/td>\u003ctd>\u003cspan class=\"key\">⌘\u003c/span> + \u003cspan class=\"key\">Shift\u003c/span> + \u003cspan class=\"key\">D\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"key\">Ctrl\u003c/span> + \u003cspan class=\"key\">Shift\u003c/span> + \u003cspan class=\"key\">D\u003c/span>\u003c/td>\u003c/tr>\n      \u003c/tbody>\n    \u003c/table>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 팁 -->\n\u003csection class=\"section\" id=\"tips\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">6\u003c/div>\u003cspan class=\"label\">Pro Tips\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">실전 활용 팁\u003c/h2>\n    \u003cp class=\"section-sub\">옵시디언을 더 잘 활용하기 위한 방법론과 노하우입니다.\u003c/p>\n    \u003cdiv class=\"tip-box\">\n      \u003cdiv class=\"tip-header\">🗂️ PARA 방법론\u003c/div>\n      \u003cp>Projects / Areas / Resources / Archives 4개 폴더로 모든 정보를 분류합니다. 가장 널리 사용되는 PKM 구조입니다.\u003c/p>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\">\n      \u003cdiv class=\"tip-header\">🌱 Zettelkasten (제텔카스텐)\u003c/div>\n      \u003cp>각 노트는 하나의 아이디어만 담습니다. 짧고 원자적(Atomic)인 노트를 만들고 링크로 연결하면 지식이 유기적으로 성장합니다.\u003c/p>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\">\n      \u003cdiv class=\"tip-header\">🤖 AI와 함께 쓰기\u003c/div>\n      \u003cul>\n        \u003cli>Copilot 플러그인으로 노트를 Claude/ChatGPT와 연결하여 요약·확장·번역\u003c/li>\n        \u003cli>웹에서 찾은 정보를 Web Clipper로 저장 후 AI로 가공\u003c/li>\n        \u003cli>NotebookLM에 볼트의 핵심 노트를 업로드하여 대화형 질의응답 활용\u003c/li>\n      \u003c/ul>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\">\n      \u003cdiv class=\"tip-header\">⚡ 속도 향상 팁\u003c/div>\n      \u003cul>\n        \u003cli>Quick Switcher로 마우스 없이 노트 간 이동\u003c/li>\n        \u003cli>커맨드 팔레트(⌘P)로 모든 기능에 키보드로 접근\u003c/li>\n        \u003cli>Workspace 저장으로 자주 쓰는 패널 배치를 저장·불러오기\u003c/li>\n        \u003cli>스타 기능(즐겨찾기)으로 핵심 노트 빠르게 접근\u003c/li>\n      \u003c/ul>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection class=\"done-section\">\n  \u003ch2>🔮 지식을 연결하고, 생각을 성장시키세요\u003c/h2>\n  \u003cp>첫 볼트를 만들고, 첫 링크를 연결하는 것부터 시작하세요.\u003c/p>\n  \u003ca class=\"done-link\" href=\"https://obsidian.md\" target=\"_blank\">🔮 옵시디언 다운로드\u003c/a>\n\u003c/section>\n\n\u003cfooter>\n  \u003cp>Obsidian은 Dynalist Inc.에서 개발한 지식 관리 도구입니다.\u003c/p>\n  \u003cp style=\"margin-top:8px;\">공식 사이트: \u003ca href=\"https://obsidian.md\" target=\"_blank\">obsidian.md\u003c/a> &nbsp;|&nbsp; 도움말: \u003ca href=\"https://help.obsidian.md\" target=\"_blank\">help.obsidian.md\u003c/a>\u003c/p>\n\u003c/footer>\n\n\u003cbutton class=\"back-top\" id=\"backTop\" onclick=\"window.scrollTo({top:0,behavior:'smooth'})\">↑\u003c/button>\n\u003cscript>\n  window.addEventListener('scroll', () => {\n    document.getElementById('backTop').classList.toggle('visible', window.scrollY > 300);\n  });\n\u003c/script>\n","styles":"\n    :root {\n      --purple:      #7C3AED;\n      --purple-dark: #5B21B6;\n      --purple-deep: #3B0764;\n      --purple-light:#F5F3FF;\n      --purple-mid:  #DDD6FE;\n      --accent:      #A78BFA;\n      --green:       #22C55E;\n      --text:        #1A1A2E;\n      --text-2:      #4B5575;\n      --text-3:      #8892B0;\n      --bg:          #FAFAF9;\n      --white:       #FFFFFF;\n      --border:      #E9D5FF;\n      --shadow:      0 4px 24px rgba(124,58,237,0.10);\n      --shadow-lg:   0 8px 40px rgba(124,58,237,0.16);\n      --radius:      16px;\n      --radius-sm:   10px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n\n    /* NAV */\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }\n    .nav-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }\n    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--purple); text-decoration: none; }\n    .nav-logo .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--purple-dark), var(--accent)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }\n    .nav-links { display: flex; gap: 6px; list-style: none; }\n    .nav-links a { text-decoration: none; color: var(--text-2); font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: all .2s; }\n    .nav-links a:hover { background: var(--purple-light); color: var(--purple); }\n\n    /* HERO */\n    .hero { background: linear-gradient(135deg, #1E0A3C 0%, #5B21B6 50%, #7C3AED 100%); padding: 80px 24px 100px; text-align: center; position: relative; overflow: hidden; }\n    .hero::before { content: ''; position: absolute; inset: 0; background: url(\"data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1.5' fill='rgba(255,255,255,0.07)'/%3E%3C/svg%3E\") repeat; }\n    .hero-badge { display: inline-block; background: rgba(255,255,255,0.18); color: white; font-size: 13px; font-weight: 600; padding: 6px 16px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.3); margin-bottom: 24px; position: relative; }\n    .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(30px,5vw,52px); font-weight: 700; color: white; line-height: 1.3; margin-bottom: 20px; position: relative; }\n    .hero h1 span { color: #C4B5FD; }\n    .hero p { font-size: clamp(15px,2.5vw,18px); color: rgba(255,255,255,0.88); max-width: 560px; margin: 0 auto 36px; position: relative; }\n    .hero-cta { display: inline-flex; align-items: center; gap: 8px; background: white; color: var(--purple); font-weight: 700; font-size: 16px; padding: 14px 28px; border-radius: 100px; text-decoration: none; box-shadow: 0 8px 32px rgba(0,0,0,0.2); transition: transform .2s, box-shadow .2s; position: relative; }\n    .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.28); }\n    .hero-stats { display: flex; justify-content: center; gap: 40px; margin-top: 56px; position: relative; flex-wrap: wrap; }\n    .hero-stat { text-align: center; }\n    .hero-stat strong { display: block; font-size: 26px; font-weight: 900; color: white; }\n    .hero-stat span { font-size: 13px; color: rgba(255,255,255,0.7); }\n\n    /* LOGO VISUAL */\n    .obsidian-logo { width: 80px; height: 80px; margin: 0 auto 24px; position: relative; }\n    .obsidian-logo svg { width: 100%; height: 100%; filter: drop-shadow(0 8px 24px rgba(167,139,250,0.6)); }\n\n    /* 공통 */\n    .section { padding: 72px 24px; }\n    .section-inner { max-width: 960px; margin: 0 auto; }\n    .section-title { font-family: 'Noto Serif KR', serif; font-size: clamp(22px,3.5vw,30px); font-weight: 700; margin-bottom: 8px; color: var(--text); }\n    .section-sub { color: var(--text-2); font-size: 15px; margin-bottom: 40px; }\n    .section-num { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 16px; }\n    .section-num .num { width: 36px; height: 36px; background: var(--purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; flex-shrink: 0; }\n    .section-num .label { font-size: 13px; font-weight: 600; color: var(--purple); text-transform: uppercase; letter-spacing: .06em; }\n\n    /* 개념 카드 그리드 */\n    .concept-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }\n    .concept-card { background: white; border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); border: 1px solid var(--border); transition: transform .2s, box-shadow .2s; }\n    .concept-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }\n    .concept-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 16px; }\n    .concept-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; color: var(--text); }\n    .concept-card p { font-size: 14px; color: var(--text-2); line-height: 1.6; }\n\n    /* 핵심 기능 */\n    .feature-list { display: flex; flex-direction: column; gap: 20px; }\n    .feature-item { display: flex; gap: 20px; background: white; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); border-left: 4px solid var(--purple); }\n    .feature-num { width: 40px; height: 40px; background: var(--purple); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; font-size: 16px; }\n    .feature-content h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }\n    .feature-content p { font-size: 14px; color: var(--text-2); line-height: 1.6; }\n    .feature-tag { display: inline-block; background: var(--purple-light); color: var(--purple); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 100px; margin-top: 8px; }\n\n    /* 그래프 시각화 */\n    .graph-visual { background: linear-gradient(135deg, #1E0A3C, #3B0764); border-radius: 20px; padding: 40px; position: relative; overflow: hidden; }\n    .graph-visual::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 30% 50%, rgba(124,58,237,0.3) 0%, transparent 60%), radial-gradient(circle at 70% 30%, rgba(167,139,250,0.2) 0%, transparent 50%); }\n    .graph-nodes { position: relative; height: 280px; }\n    .node { position: absolute; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #3B0764; box-shadow: 0 4px 20px rgba(124,58,237,0.4); transition: transform .3s; cursor: pointer; }\n    .node:hover { transform: scale(1.1); }\n    .node-main { width: 64px; height: 64px; background: #A78BFA; color: white; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 13px; }\n    .node-1 { width: 48px; height: 48px; left: 20%; top: 15%; }\n    .node-2 { width: 44px; height: 44px; left: 72%; top: 10%; }\n    .node-3 { width: 50px; height: 50px; left: 78%; top: 55%; }\n    .node-4 { width: 42px; height: 42px; left: 12%; top: 60%; }\n    .node-5 { width: 40px; height: 40px; left: 40%; top: 5%; }\n    .node-6 { width: 38px; height: 38px; left: 60%; top: 78%; }\n\n    /* 플러그인 카드 */\n    .plugin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }\n    .plugin-card { background: white; border-radius: var(--radius-sm); padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); display: flex; gap: 14px; align-items: flex-start; }\n    .plugin-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--purple-light); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }\n    .plugin-info h4 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }\n    .plugin-info p { font-size: 13px; color: var(--text-2); line-height: 1.5; }\n    .plugin-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; margin-top: 6px; }\n    .badge-free { background: #DCFCE7; color: #16A34A; }\n    .badge-community { background: var(--purple-light); color: var(--purple); }\n\n    /* 단축키 테이블 */\n    .shortcut-table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }\n    .shortcut-table th { background: var(--purple); color: white; padding: 14px 20px; text-align: left; font-size: 14px; font-weight: 600; }\n    .shortcut-table td { padding: 12px 20px; font-size: 14px; border-bottom: 1px solid var(--border); }\n    .shortcut-table tr:last-child td { border-bottom: none; }\n    .shortcut-table tr:hover td { background: var(--purple-light); }\n    .key { display: inline-block; background: #F3F4F6; border: 1px solid #D1D5DB; border-radius: 4px; padding: 2px 8px; font-family: monospace; font-size: 13px; color: var(--text); }\n\n    /* 팁 박스 */\n    .tip-box { background: linear-gradient(135deg, var(--purple-light), #F0FDFB); border: 1px solid var(--purple-mid); border-radius: var(--radius); padding: 24px 28px; margin: 24px 0; }\n    .tip-box .tip-header { display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--purple); margin-bottom: 12px; font-size: 16px; }\n    .tip-box p { font-size: 14px; color: var(--text-2); line-height: 1.7; }\n    .tip-box ul { padding-left: 20px; color: var(--text-2); font-size: 14px; line-height: 2; }\n\n    /* 완료 배너 */\n    .done-section { background: linear-gradient(135deg, #1E0A3C, #5B21B6); padding: 72px 24px; text-align: center; color: white; }\n    .done-section h2 { font-family: 'Noto Serif KR', serif; font-size: clamp(22px,4vw,34px); margin-bottom: 16px; }\n    .done-section p { font-size: 16px; color: rgba(255,255,255,0.8); margin-bottom: 32px; }\n    .done-link { display: inline-flex; align-items: center; gap: 8px; background: white; color: var(--purple); font-weight: 700; padding: 14px 28px; border-radius: 100px; text-decoration: none; font-size: 16px; transition: transform .2s; }\n    .done-link:hover { transform: translateY(-2px); }\n\n    footer { background: #1A1A2E; color: rgba(255,255,255,0.6); text-align: center; padding: 32px 24px; font-size: 14px; }\n    footer a { color: var(--accent); text-decoration: none; }\n\n    .back-top { position: fixed; bottom: 28px; right: 28px; width: 44px; height: 44px; background: var(--purple); color: white; border: none; border-radius: 50%; font-size: 18px; cursor: pointer; opacity: 0; transition: opacity .3s; box-shadow: var(--shadow); z-index: 200; }\n    .back-top.visible { opacity: 1; }\n\n    @media (max-width: 640px) {\n      .concept-grid { grid-template-columns: 1fr; }\n      .hero-stats { gap: 24px; }\n      .feature-item { flex-direction: column; }\n      .nav-links { display: none; }\n    }\n  "},"everything":{"body":"\n\u003cnav class=\"nav\" id=\"top\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#top\">\u003cdiv class=\"logo-icon\">🔍\u003c/div>Everything 가이드\u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#speed\">속도 비교\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#syntax\">검색 문법\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#features\">기능\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#install\">설치\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"hero-inner\">\n    \u003cdiv class=\"hero-badge\">🔍 Windows 전용 · 완전 무료 · 오픈소스\u003c/div>\n    \u003cspan class=\"hero-emoji\">🔍\u003c/span>\n    \u003ch1>Everything\u003cbr>(에브리띵)\u003c/h1>\n    \u003cp>Windows 파일 검색을 완전히 바꾸는 도구\u003cbr>수백만 개의 파일을 0.1초 안에 찾아내는 인덱싱 검색\u003c/p>\n    \u003cdiv class=\"hero-stats\">\n      \u003cdiv class=\"hero-stat\">\u003cstrong>&lt;1초\u003c/strong>\u003cspan>전체 드라이브 검색\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>0MB\u003c/strong>\u003cspan>RAM 점유율\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>무료\u003c/strong>\u003cspan>완전 무료\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>실시간\u003c/strong>\u003cspan>파일 변경 반영\u003c/span>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003cmain>\n  \u003cdiv class=\"section\" id=\"speed\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">1\u003c/div>\u003ch2>왜 Everything인가?\u003c/h2>\u003c/div>\n    \u003cdiv class=\"speed-demo\">\n      \u003cdiv class=\"sd-title\">검색 속도 비교 — \"2024 예산보고서.xlsx\" 찾기\u003c/div>\n      \u003cdiv class=\"sd-compare\">\n        \u003cdiv class=\"sd-before\">\n          \u003cdiv class=\"sd-label\">🐌 Windows 기본 검색\u003c/div>\n          \u003cdiv class=\"sd-content\">\n            인덱스 없는 폴더: 탐색기에서 검색\u003cbr>\n            드라이브 전체 스캔\u003cbr>\n            로딩 인디케이터 돌아가는 중...\u003cbr>\n            파일 하나씩 순차 검색\n          \u003c/div>\n          \u003cdiv class=\"sd-time\">30초 ~ 5분\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"sd-after\">\n          \u003cdiv class=\"sd-label\">⚡ Everything\u003c/div>\n          \u003cdiv class=\"sd-content\">\n            Win+Alt+E로 실행\u003cbr>\n            파일명 타이핑 시작\u003cbr>\n            입력과 동시에 결과 표시\u003cbr>\n            전체 드라이브 즉시 완료\n          \u003c/div>\n          \u003cdiv class=\"sd-time\">0.1초\u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\" style=\"margin-top:14px;\">\n      \u003cstrong>💡 동작 원리:\u003c/strong> Windows NTFS의 MFT(Master File Table)를 직접 읽어 모든 파일 정보를 메모리에 인덱싱. 설치 직후 빠르게 인덱스 구축 후 실시간 업데이트.\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section\" id=\"syntax\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">2\u003c/div>\u003ch2>검색 문법 & 고급 쿼리\u003c/h2>\u003c/div>\n    \u003cdiv class=\"syntax-grid\">\n      \u003cdiv class=\"syntax-item\">\n        \u003cdiv class=\"syn-query\">*.xlsx\u003c/div>\n        \u003cdiv class=\"syn-desc\">특정 확장자 파일 전체 검색\u003c/div>\n        \u003cdiv class=\"syn-ex\">예: *.pptx, *.pdf, *.py\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"syntax-item\">\n        \u003cdiv class=\"syn-query\">보고서 2025\u003c/div>\n        \u003cdiv class=\"syn-desc\">두 단어 모두 포함 (AND)\u003c/div>\n        \u003cdiv class=\"syn-ex\">띄어쓰기 = AND 조건\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"syntax-item\">\n        \u003cdiv class=\"syn-query\">ext:xlsx dm:today\u003c/div>\n        \u003cdiv class=\"syn-desc\">오늘 수정된 Excel 파일\u003c/div>\n        \u003cdiv class=\"syn-ex\">dm:yesterday / dm:thisweek\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"syntax-item\">\n        \u003cdiv class=\"syn-query\">path:C:\\Projects *.py\u003c/div>\n        \u003cdiv class=\"syn-desc\">특정 폴더 내에서만 검색\u003c/div>\n        \u003cdiv class=\"syn-ex\">경로 + 파일명 조합\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"syntax-item\">\n        \u003cdiv class=\"syn-query\">size:>10mb *.mp4\u003c/div>\n        \u003cdiv class=\"syn-desc\">10MB 초과 MP4 파일\u003c/div>\n        \u003cdiv class=\"syn-ex\">size:&lt;1mb, size:1mb..100mb\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"syntax-item\">\n        \u003cdiv class=\"syn-query\">regex:2025\\d{4}\u003c/div>\n        \u003cdiv class=\"syn-desc\">정규식 패턴 검색\u003c/div>\n        \u003cdiv class=\"syn-ex\">고급 사용자 패턴 매칭\u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"accent-box\" style=\"margin-top:14px;\">\n      \u003cstrong>⭐ 자주 쓰는 쿼리 저장:\u003c/strong> 자주 사용하는 검색식은 Bookmarks로 저장 가능. 예: \"*.pptx dm:thismonth\" → \"이달 PPT 파일\"로 즐겨찾기.\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section\" id=\"features\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">3\u003c/div>\u003ch2>주요 기능\u003c/h2>\u003c/div>\n    \u003cdiv class=\"feat-grid\">\n      \u003cdiv class=\"feat-item\">\n        \u003cdiv class=\"feat-icon\">⚡\u003c/div>\n        \u003cdiv class=\"feat-title\">실시간 인덱스\u003c/div>\n        \u003cdiv class=\"feat-desc\">파일 생성·삭제·이동 즉시 반영. 항상 최신 상태 유지.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-item\">\n        \u003cdiv class=\"feat-icon\">🖱️\u003c/div>\n        \u003cdiv class=\"feat-title\">우클릭 메뉴 통합\u003c/div>\n        \u003cdiv class=\"feat-desc\">결과에서 우클릭 → 열기·경로 복사·폴더 열기 즉시 실행.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-item\">\n        \u003cdiv class=\"feat-icon\">🌐\u003c/div>\n        \u003cdiv class=\"feat-title\">HTTP 서버\u003c/div>\n        \u003cdiv class=\"feat-desc\">내부망에서 Everything을 웹 서버로 실행. 다른 PC에서 검색 가능.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-item\">\n        \u003cdiv class=\"feat-icon\">⌨️\u003c/div>\n        \u003cdiv class=\"feat-title\">글로벌 단축키\u003c/div>\n        \u003cdiv class=\"feat-desc\">어떤 창에서도 Win+Alt+E로 즉시 검색창 호출 (설정 가능).\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section\" id=\"install\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">4\u003c/div>\u003ch2>설치 & 설정\u003c/h2>\u003c/div>\n    \u003cdiv class=\"step-list\">\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">1\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>voidtools.com 접속 → Everything 다운로드 및 설치 (무료)\u003c/strong>\u003cspan>32/64비트 선택. 설치 파일 크기 2MB 이하로 매우 가벼움.\u003c/span>\u003c/div>\u003c/div>\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">2\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>최초 실행 시 자동 인덱싱 시작 (수십 초 ~ 수 분)\u003c/strong>\u003cspan>SSD 환경에서는 100만 파일도 1분 이내 완료. 이후 실시간 업데이트.\u003c/span>\u003c/div>\u003c/div>\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">3\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>Tools → Options → 글로벌 단축키 설정\u003c/strong>\u003cspan>Win+Alt+E 또는 원하는 단축키로 변경. 시작 프로그램에 등록 권장.\u003c/span>\u003c/div>\u003c/div>\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">4\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>시스템 트레이에 상주하며 백그라운드 실행\u003c/strong>\u003cspan>CPU·RAM 점유율 거의 0%. 항상 켜두어도 성능 영향 없음.\u003c/span>\u003c/div>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\" style=\"margin-top:14px;\">\n      \u003cstrong>💡 PowerToys Run 연동:\u003c/strong> Microsoft PowerToys 설치 후 Alt+Space → Everything 플러그인 활성화. PowerToys Run 검색창에서 Everything 검색 동시 사용 가능.\n    \u003c/div>\n  \u003c/div>\n\u003c/main>\n\n\u003ca class=\"back-top\" href=\"#top\">↑\u003c/a>\n\u003cfooter>\u003cstrong>Everything (에브리띵) 가이드\u003c/strong> · voidtools · Windows 전용 · 완전 무료 · 2025\u003c/footer>\n","styles":"\n    :root {\n      --brand: #1565C0; --brand-dark: #0D47A1; --brand-light: #E3F2FD;\n      --accent: #FFC107;\n      --text: #1A1A2E; --text-2: #4B5575; --text-3: #8892B0;\n      --bg: #F5F9FF; --white: #FFFFFF; --border: #BBDEFB;\n      --shadow: 0 4px 24px rgba(21,101,192,0.10); --shadow-lg: 0 8px 40px rgba(21,101,192,0.16);\n      --radius: 16px; --radius-sm: 10px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }\n    .nav-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }\n    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--brand); text-decoration: none; }\n    .nav-logo .logo-icon { width: 34px; height: 34px; background: var(--brand); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }\n    .nav-links { display: flex; gap: 6px; list-style: none; }\n    .nav-links a { text-decoration: none; color: var(--text-2); font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: all .2s; }\n    .nav-links a:hover { background: var(--brand-light); color: var(--brand); }\n\n    .hero { background: linear-gradient(135deg, #0A0F2E 0%, #0D47A1 50%, #1565C0 80%, #1976D2 100%); color: white; padding: 72px 24px 56px; text-align: center; position: relative; overflow: hidden; }\n    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(255,193,7,0.2) 0%, transparent 55%); }\n    .hero-inner { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }\n    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.25); border-radius: 100px; padding: 6px 16px; font-size: 13px; font-weight: 600; margin-bottom: 24px; }\n    .hero-emoji { font-size: 64px; display: block; margin-bottom: 16px; }\n    .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 700; margin-bottom: 14px; }\n    .hero p { font-size: 1.05rem; opacity: .85; margin-bottom: 36px; }\n    .hero-stats { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; }\n      .hero-stat strong { display: block; font-size: 1.5rem; font-weight: 700; }\n    .hero-stat span { font-size: .78rem; opacity: .7; }\n\n    main { max-width: 900px; margin: 0 auto; padding: 56px 24px; }\n    .section { margin-bottom: 64px; }\n    .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }\n    .section-num { width: 38px; height: 38px; background: var(--brand); color: white; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 17px; flex-shrink: 0; }\n    .section-header h2 { font-family: 'Noto Serif KR', serif; font-size: 1.5rem; font-weight: 700; }\n    .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 26px; box-shadow: var(--shadow); margin-bottom: 14px; }\n\n    .speed-demo { background: #0A0F2E; border-radius: var(--radius); padding: 28px; color: white; }\n    .sd-title { font-size: .82rem; color: #90CAF9; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 16px; }\n    .sd-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }\n    .sd-before { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); border-radius: var(--radius-sm); padding: 18px; }\n    .sd-after { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4); border-radius: var(--radius-sm); padding: 18px; }\n    .sd-label { font-size: .8rem; font-weight: 700; margin-bottom: 10px; }\n    .sd-before .sd-label { color: #FCA5A5; }\n    .sd-after .sd-label { color: #86EFAC; }\n    .sd-content { font-size: .87rem; opacity: .85; line-height: 1.9; }\n    .sd-time { font-size: 1.5rem; font-weight: 700; margin-top: 10px; }\n    .sd-before .sd-time { color: #FCA5A5; }\n    .sd-after .sd-time { color: #86EFAC; }\n\n    .syntax-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }\n    .syntax-item { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px; }\n    .syn-query { font-family: monospace; font-size: .95rem; font-weight: 700; color: var(--brand); background: var(--brand-light); padding: 6px 12px; border-radius: 6px; display: inline-block; margin-bottom: 8px; }\n    .syn-desc { font-size: .85rem; color: var(--text-2); margin-bottom: 6px; }\n    .syn-ex { font-size: .82rem; color: var(--text-3); font-family: monospace; }\n\n    .feat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }\n    .feat-item { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; }\n    .feat-icon { font-size: 1.8rem; margin-bottom: 8px; }\n    .feat-title { font-weight: 700; font-size: .9rem; margin-bottom: 4px; }\n    .feat-desc { font-size: .82rem; color: var(--text-2); }\n\n    .step-list { display: flex; flex-direction: column; gap: 12px; }\n    .step-item { display: flex; gap: 14px; align-items: flex-start; padding: 14px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); }\n    .step-num { width: 28px; height: 28px; background: var(--brand); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .84rem; flex-shrink: 0; }\n    .step-content strong { display: block; font-size: .92rem; margin-bottom: 3px; }\n    .step-content span { font-size: .83rem; color: var(--text-2); }\n\n    .tip-box { background: var(--brand-light); border-left: 4px solid var(--brand); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 14px 18px; font-size: .88rem; }\n    .tip-box strong { color: var(--brand-dark); }\n    .accent-box { background: #FFFDE7; border-left: 4px solid var(--accent); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 14px 18px; font-size: .88rem; margin-top: 12px; }\n    .accent-box strong { color: #F57F17; }\n\n    .back-top { position: fixed; bottom: 32px; right: 32px; width: 44px; height: 44px; background: var(--brand); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: var(--shadow-lg); font-size: 20px; }\n    footer { background: #0A0F2E; color: rgba(255,255,255,0.6); text-align: center; padding: 28px 24px; font-size: .86rem; }\n    footer strong { color: #90CAF9; }\n  "},"grabit":{"body":"\n\u003cnav class=\"nav\" id=\"top\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#top\">\u003cdiv class=\"logo-icon\">🪣\u003c/div>Grabit 가이드\u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#problem\">문제 해결\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#features\">기능\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#how\">사용법\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"hero-inner\">\n    \u003cdiv class=\"hero-badge\">🪣 크롬 익스텐션 · 기본 무료\u003c/div>\n    \u003cspan class=\"hero-emoji\">🪣\u003c/span>\n    \u003ch1>Grabit (그랩잇)\u003c/h1>\n    \u003cp>웹페이지의 수많은 이미지를 클릭 한 번으로\u003cbr>일괄 수집하는 크롬 익스텐션\u003c/p>\n    \u003cdiv class=\"hero-stats\">\n      \u003cdiv class=\"hero-stat\">\u003cstrong>1클릭\u003c/strong>\u003cspan>전체 이미지 저장\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>필터\u003c/strong>\u003cspan>크기·형식 선택\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>무료\u003c/strong>\u003cspan>기본 기능\u003c/span>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003cmain>\n  \u003cdiv class=\"section\" id=\"problem\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">1\u003c/div>\u003ch2>어떤 문제를 해결하나?\u003c/h2>\u003c/div>\n    \u003cdiv class=\"before-after\">\n      \u003cdiv class=\"ba-box ba-before\">\n        \u003cdiv class=\"ba-label\">😫 Grabit 없이\u003c/div>\n        \u003cdiv class=\"ba-list\">\n          이미지 우클릭 → 다른 이름으로 저장\u003cbr>\n          반복 × 수십 장\u003cbr>\n          폴더 정리 필요\u003cbr>\n          UI 레퍼런스 30장 = 30분 작업\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"ba-box ba-after\">\n        \u003cdiv class=\"ba-label\">✅ Grabit 사용 후\u003c/div>\n        \u003cdiv class=\"ba-list\">\n          익스텐션 아이콘 클릭\u003cbr>\n          크기 필터 설정 (예: 200px 이상)\u003cbr>\n          \"전체 다운로드\" 클릭\u003cbr>\n          30장 = 10초 완료\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section\" id=\"features\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">2\u003c/div>\u003ch2>주요 기능\u003c/h2>\u003c/div>\n    \u003cdiv class=\"feat-grid\">\n      \u003cdiv class=\"feat-item\">\u003cdiv class=\"feat-icon\">🖼️\u003c/div>\u003cdiv class=\"feat-title\">페이지 전체 이미지 수집\u003c/div>\u003cdiv class=\"feat-desc\">현재 탭의 모든 이미지를 자동 감지. 보이지 않는 영역까지 스캔.\u003c/div>\u003c/div>\n      \u003cdiv class=\"feat-item\">\u003cdiv class=\"feat-icon\">🔍\u003c/div>\u003cdiv class=\"feat-title\">크기 필터\u003c/div>\u003cdiv class=\"feat-desc\">최소 가로·세로 픽셀 설정. 아이콘·로고 같은 소형 이미지 제외 가능.\u003c/div>\u003c/div>\n      \u003cdiv class=\"feat-item\">\u003cdiv class=\"feat-icon\">📁\u003c/div>\u003cdiv class=\"feat-title\">형식 필터\u003c/div>\u003cdiv class=\"feat-desc\">JPG·PNG·WebP·SVG 등 원하는 형식만 선택 다운로드.\u003c/div>\u003c/div>\n      \u003cdiv class=\"feat-item\">\u003cdiv class=\"feat-icon\">👁️\u003c/div>\u003cdiv class=\"feat-title\">미리보기 선택\u003c/div>\u003cdiv class=\"feat-desc\">다운로드 전 이미지 목록 미리보기. 필요한 것만 체크 후 일괄 저장.\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section\" id=\"how\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">3\u003c/div>\u003ch2>설치 & 사용법\u003c/h2>\u003c/div>\n    \u003cdiv class=\"step-list\">\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">1\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>Chrome 웹스토어에서 \"Grabify Image Downloader\" 또는 \"Grabit\" 검색 후 설치\u003c/strong>\u003cspan>유사 이름의 익스텐션 다수 존재. 별점·리뷰 확인 후 선택.\u003c/span>\u003c/div>\u003c/div>\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">2\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>이미지가 많은 웹페이지로 이동 (Pinterest, Behance, 쇼핑몰 등)\u003c/strong>\u003cspan>디자인 레퍼런스, 상품 이미지, 포트폴리오 사이트에서 특히 유용.\u003c/span>\u003c/div>\u003c/div>\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">3\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>툴바에서 Grabit 아이콘 클릭 → 이미지 목록 자동 로드\u003c/strong>\u003cspan>크기 필터로 200×200px 이상만 표시 설정 권장.\u003c/span>\u003c/div>\u003c/div>\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">4\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>원하는 이미지 체크 또는 전체 선택 → 다운로드\u003c/strong>\u003cspan>ZIP 파일로 일괄 다운로드. 파일명 자동 생성.\u003c/span>\u003c/div>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\" style=\"margin-top:16px;\">\n      \u003cstrong>💡 UI 레퍼런스 수집 팁:\u003c/strong> Pinterest·Dribbble·Behance에서 마음에 드는 디자인 페이지를 열고 Grabit 실행 → 300px 이상 필터 적용 → 전체 레퍼런스 이미지 일괄 저장. Figma 프로젝트 시작 전 무드보드 구성에 최적.\n    \u003c/div>\n  \u003c/div>\n\u003c/main>\n\n\u003ca class=\"back-top\" href=\"#top\">↑\u003c/a>\n\u003cfooter>\u003cstrong>Grabit (그랩잇) 가이드\u003c/strong> · Chrome Extension · 기본 무료 · 2025\u003c/footer>\n","styles":"\n    :root {\n      --brand: #FF5722; --brand-dark: #D84315; --brand-light: #FBE9E7;\n      --text: #1A1A2E; --text-2: #4B5575; --text-3: #8892B0;\n      --bg: #FFFAF8; --white: #FFFFFF; --border: #FFCCBC;\n      --shadow: 0 4px 24px rgba(255,87,34,0.10); --shadow-lg: 0 8px 40px rgba(255,87,34,0.16);\n      --radius: 16px; --radius-sm: 10px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }\n    .nav-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }\n    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--brand); text-decoration: none; }\n    .nav-logo .logo-icon { width: 34px; height: 34px; background: var(--brand); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }\n    .nav-links { display: flex; gap: 6px; list-style: none; }\n    .nav-links a { text-decoration: none; color: var(--text-2); font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: all .2s; }\n    .nav-links a:hover { background: var(--brand-light); color: var(--brand); }\n\n    .hero { background: linear-gradient(135deg, #1A0800 0%, #4A1500 40%, #BF360C 70%, #FF5722 100%); color: white; padding: 72px 24px 56px; text-align: center; position: relative; overflow: hidden; }\n    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(255,87,34,0.3) 0%, transparent 55%); }\n    .hero-inner { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }\n    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.25); border-radius: 100px; padding: 6px 16px; font-size: 13px; font-weight: 600; margin-bottom: 24px; }\n    .hero-emoji { font-size: 64px; display: block; margin-bottom: 16px; }\n    .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 700; margin-bottom: 14px; }\n    .hero p { font-size: 1.05rem; opacity: .85; margin-bottom: 36px; }\n    .hero-stats { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; }\n    .hero-stat strong { display: block; font-size: 1.5rem; font-weight: 700; }\n    .hero-stat span { font-size: .78rem; opacity: .7; }\n\n    main { max-width: 900px; margin: 0 auto; padding: 56px 24px; }\n    .section { margin-bottom: 64px; }\n    .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }\n    .section-num { width: 38px; height: 38px; background: var(--brand); color: white; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 17px; flex-shrink: 0; }\n    .section-header h2 { font-family: 'Noto Serif KR', serif; font-size: 1.5rem; font-weight: 700; }\n    .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 26px; box-shadow: var(--shadow); margin-bottom: 14px; }\n\n    .before-after { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n    .ba-box { border-radius: var(--radius); padding: 20px; }\n    .ba-before { background: #FFF3E0; border: 1px solid #FFCC80; }\n    .ba-after { background: #E8F5E9; border: 1px solid #A5D6A7; }\n    .ba-label { font-weight: 700; font-size: .85rem; margin-bottom: 10px; }\n    .ba-before .ba-label { color: #E65100; }\n    .ba-after .ba-label { color: #2E7D32; }\n    .ba-list { font-size: .87rem; color: var(--text-2); line-height: 2; }\n\n    .feat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }\n    .feat-item { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px; }\n    .feat-icon { font-size: 1.8rem; margin-bottom: 8px; }\n    .feat-title { font-weight: 700; font-size: .9rem; margin-bottom: 5px; }\n    .feat-desc { font-size: .82rem; color: var(--text-2); }\n\n    .step-list { display: flex; flex-direction: column; gap: 12px; }\n    .step-item { display: flex; gap: 14px; align-items: flex-start; padding: 14px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); }\n    .step-num { width: 28px; height: 28px; background: var(--brand); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .84rem; flex-shrink: 0; }\n    .step-content strong { display: block; font-size: .92rem; margin-bottom: 3px; }\n    .step-content span { font-size: .83rem; color: var(--text-2); }\n\n    .tip-box { background: var(--brand-light); border-left: 4px solid var(--brand); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 14px 18px; font-size: .88rem; }\n    .tip-box strong { color: var(--brand-dark); }\n\n    .back-top { position: fixed; bottom: 32px; right: 32px; width: 44px; height: 44px; background: var(--brand); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: var(--shadow-lg); font-size: 20px; }\n    footer { background: #1A0800; color: rgba(255,255,255,0.6); text-align: center; padding: 28px 24px; font-size: .86rem; }\n    footer strong { color: #FFAB91; }\n  "},"snipaste":{"body":"\n\u003cnav class=\"nav\" id=\"top\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#top\">\u003cdiv class=\"logo-icon\">📌\u003c/div>Snipaste 가이드\u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#what\">핵심 기능\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#pin\">Pin 활용\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#shortcuts\">단축키\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#cases\">활용법\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"hero-inner\">\n    \u003cdiv class=\"hero-badge\">📌 로컬 설치 · 무료 / Pro\u003c/div>\n    \u003cspan class=\"hero-emoji\">📌\u003c/span>\n    \u003ch1>Snipaste\u003c/h1>\n    \u003cp>캡처한 화면을 화면 위에 고정(Pin)시키는\u003cbr>생산성을 바꾸는 스크린샷 도구\u003c/p>\n    \u003cdiv class=\"hero-stats\">\n      \u003cdiv class=\"hero-stat\">\u003cstrong>F1\u003c/strong>\u003cspan>캡처 단축키\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>F3\u003c/strong>\u003cspan>화면에 Pin\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>무료\u003c/strong>\u003cspan>기본 기능 모두\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>로컬\u003c/strong>\u003cspan>인터넷 불필요\u003c/span>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003cmain>\n  \u003cdiv class=\"section\" id=\"what\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">1\u003c/div>\u003ch2>Snipaste란?\u003c/h2>\u003c/div>\n    \u003cdiv class=\"card\">\n      \u003cp style=\"color:var(--text-2);margin-bottom:16px;\">일반 캡처 도구와의 결정적 차이 — \u003cstrong>캡처한 이미지를 화면 위에 떠 있게(항상 위에 표시)\u003c/strong> 고정할 수 있습니다. 다른 창을 열어도 사라지지 않아 참조·비교 작업이 혁신적으로 편해집니다.\u003c/p>\n      \u003cdiv class=\"feat-grid\">\n        \u003cdiv class=\"feat-item\">\n          \u003cdiv class=\"feat-icon\">✂️\u003c/div>\n          \u003cdiv class=\"feat-title\">정밀 영역 캡처\u003c/div>\n          \u003cdiv class=\"feat-desc\">픽셀 단위 정밀 선택. 색상 피커로 특정 픽셀 색상값(HEX) 즉시 복사.\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"feat-item\">\n          \u003cdiv class=\"feat-icon\">📌\u003c/div>\n          \u003cdiv class=\"feat-title\">화면 위 고정 (Pin)\u003c/div>\n          \u003cdiv class=\"feat-desc\">캡처 이미지를 화면 최상단에 고정. 다른 프로그램 사용 중에도 참조 가능.\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"feat-item\">\n          \u003cdiv class=\"feat-icon\">🎨\u003c/div>\n          \u003cdiv class=\"feat-title\">즉시 편집·마킹\u003c/div>\n          \u003cdiv class=\"feat-desc\">캡처 후 바로 화살표·텍스트·형광펜·모자이크 추가. 저장 없이 클립보드 복사.\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"feat-item\">\n          \u003cdiv class=\"feat-icon\">📋\u003c/div>\n          \u003cdiv class=\"feat-title\">클립보드 이미지 Pin\u003c/div>\n          \u003cdiv class=\"feat-desc\">클립보드에 복사된 이미지도 F3으로 화면에 바로 고정. 웹 이미지 참조에 최적.\u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section\" id=\"pin\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">2\u003c/div>\u003ch2>Pin 기능 — 멀티태스킹의 혁신\u003c/h2>\u003c/div>\n    \u003cdiv class=\"pin-demo\">\n      \u003cdiv class=\"pin-demo-title\">📌 화면에 고정된 참조 창들 (예시)\u003c/div>\n      \u003cdiv class=\"pin-items\">\n        \u003cdiv class=\"pin-item\">\u003cstrong>디자인 시안\u003c/strong>Figma 화면 캡처\u003cbr>투명도 조절 가능\u003c/div>\n        \u003cdiv class=\"pin-item\">\u003cstrong>API 문서\u003c/strong>파라미터 목록\u003cbr>코딩하며 참조\u003c/div>\n        \u003cdiv class=\"pin-item\">\u003cstrong>회의 내용\u003c/strong>슬라이드 캡처\u003cbr>메모하며 확인\u003c/div>\n        \u003cdiv class=\"pin-item\">\u003cstrong>계산 결과\u003c/strong>스프레드시트 값\u003cbr>보고서 작성 중 참조\u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\" style=\"margin-top:14px;\">\n      \u003cstrong>💡 Pin 조작법:\u003c/strong> Pin된 이미지는 마우스 휠로 투명도 조절, Ctrl+휠로 크기 조절, 드래그로 이동 가능. 우클릭으로 닫기.\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section\" id=\"shortcuts\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">3\u003c/div>\u003ch2>핵심 단축키\u003c/h2>\u003c/div>\n    \u003cdiv class=\"shortcut-grid\">\n      \u003cdiv class=\"shortcut-item\">\n        \u003cdiv class=\"sc-key\">F1\u003c/div>\n        \u003cdiv class=\"sc-desc\">화면 캡처 시작\u003c/div>\n        \u003cdiv class=\"sc-detail\">드래그로 영역 선택. ESC로 취소.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"shortcut-item\">\n        \u003cdiv class=\"sc-key\">F3\u003c/div>\n        \u003cdiv class=\"sc-desc\">클립보드 → Pin\u003c/div>\n        \u003cdiv class=\"sc-detail\">복사된 이미지를 화면에 즉시 고정.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"shortcut-item\">\n        \u003cdiv class=\"sc-key\">Ctrl+C\u003c/div>\n        \u003cdiv class=\"sc-desc\">캡처 후 클립보드\u003c/div>\n        \u003cdiv class=\"sc-detail\">캡처 영역 선택 후 Enter 대신 사용.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"shortcut-item\">\n        \u003cdiv class=\"sc-key\">Alt+C\u003c/div>\n        \u003cdiv class=\"sc-desc\">색상 피커\u003c/div>\n        \u003cdiv class=\"sc-detail\">픽셀 색상 HEX 값 즉시 복사.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section\" id=\"cases\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">4\u003c/div>\u003ch2>실전 활용 시나리오\u003c/h2>\u003c/div>\n    \u003cdiv class=\"step-list\">\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">💻\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>코딩 중 문서 참조\u003c/strong>\u003cspan>API 문서나 에러 메시지를 캡처 → Pin → 코드 에디터 위에 고정. 탭 전환 없이 개발 가능.\u003c/span>\u003c/div>\u003c/div>\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">🎨\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>디자인 비교 작업\u003c/strong>\u003cspan>원본 디자인 캡처 → Pin → 새 디자인 작업 화면 옆에 고정. 색상·비율 실시간 비교.\u003c/span>\u003c/div>\u003c/div>\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">📝\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>회의 중 슬라이드 참조\u003c/strong>\u003cspan>발표 화면 캡처 → Pin → 자신의 메모 앱에서 내용 정리. 화면 전환 없이 회의록 작성.\u003c/span>\u003c/div>\u003c/div>\n      \u003cdiv class=\"step-item\">\u003cdiv class=\"step-num\">🎨\u003c/div>\u003cdiv class=\"step-content\">\u003cstrong>색상 코드 추출 (Alt+C)\u003c/strong>\u003cspan>웹사이트나 이미지에서 마음에 드는 색상의 HEX 코드를 즉시 복사. 디자이너 필수.\u003c/span>\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/main>\n\n\u003ca class=\"back-top\" href=\"#top\">↑\u003c/a>\n\u003cfooter>\u003cstrong>Snipaste 가이드\u003c/strong> · 로컬 캡처 & Pin 도구 · 무료/Pro · 2025\u003c/footer>\n","styles":"\n    :root {\n      --brand: #00897B; --brand-dark: #00695C; --brand-light: #E0F2F1;\n      --text: #1A1A2E; --text-2: #4B5575; --text-3: #8892B0;\n      --bg: #F5FFFE; --white: #FFFFFF; --border: #B2DFDB;\n      --shadow: 0 4px 24px rgba(0,137,123,0.10); --shadow-lg: 0 8px 40px rgba(0,137,123,0.16);\n      --radius: 16px; --radius-sm: 10px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }\n    .nav-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }\n    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--brand); text-decoration: none; }\n    .nav-logo .logo-icon { width: 34px; height: 34px; background: var(--brand); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }\n    .nav-links { display: flex; gap: 6px; list-style: none; }\n    .nav-links a { text-decoration: none; color: var(--text-2); font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: all .2s; }\n    .nav-links a:hover { background: var(--brand-light); color: var(--brand); }\n\n    .hero { background: linear-gradient(135deg, #002924 0%, #00574B 45%, #00897B 80%, #4DB6AC 100%); color: white; padding: 72px 24px 56px; text-align: center; position: relative; overflow: hidden; }\n    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(0,137,123,0.4) 0%, transparent 55%); }\n    .hero-inner { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }\n    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.25); border-radius: 100px; padding: 6px 16px; font-size: 13px; font-weight: 600; margin-bottom: 24px; }\n    .hero-emoji { font-size: 64px; display: block; margin-bottom: 16px; }\n    .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 700; margin-bottom: 14px; }\n    .hero p { font-size: 1.05rem; opacity: .85; margin-bottom: 36px; }\n    .hero-stats { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; }\n    .hero-stat strong { display: block; font-size: 1.5rem; font-weight: 700; }\n    .hero-stat span { font-size: .78rem; opacity: .7; }\n\n    main { max-width: 900px; margin: 0 auto; padding: 56px 24px; }\n    .section { margin-bottom: 64px; }\n    .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }\n    .section-num { width: 38px; height: 38px; background: var(--brand); color: white; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 17px; flex-shrink: 0; }\n    .section-header h2 { font-family: 'Noto Serif KR', serif; font-size: 1.5rem; font-weight: 700; }\n    .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 26px; box-shadow: var(--shadow); margin-bottom: 14px; }\n\n    .shortcut-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }\n    .shortcut-item { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px; }\n    .sc-ke \n            \u003cdiv class=\"fi-title\">인페인팅 편집\u003c/div>\n            \u003cdiv class=\"fi-desc\">생성된 이미지의 특정 영역만 선택하여 수정. 배경 교체, 객체 제거·추가 가능.\u003c/div>\n          \u003c/div>\n        \u003c/div>\n\n        \u003cdiv style=\"font-weight:700;margin-bottom:12px;font-size:1rem;\">🚀 나노바나나 시작하기\u003c/div>\n        \u003cdiv class=\"step-list\">\n          \u003cdiv class=\"step-item\">\n            \u003cdiv class=\"step-num\">1\u003c/div>\n            \u003cdiv class=\"step-content\">\n              \u003cstrong>nanobanana.ai 접속 → 카카오/구글 간편 로그인\u003c/strong>\n              \u003cspan>무료 크레딧 제공. 매일 일정량 충전되어 부담 없이 시작.\u003c/span>\n            \u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"step-item\">\n            \u003cdiv class=\"step-num\">2\u003c/div>\n            \u003cdiv class=\"step-content\">\n              \u003cstrong>스타일 선택 → 한국어로 원하는 이미지 설명 입력\u003c/strong>\n              \u003cspan>예: \"따뜻한 카페에 앉아 책을 읽는 여성, 빈티지 느낌, 따뜻한 조명\"\u003c/span>\n            \u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"step-item\">\n            \u003cdiv class=\"step-num\">3\u003c/div>\n            \u003cdiv class=\"step-content\">\n              \u003cstrong>생성된 4장 중 선택 → 고해상도 다운로드\u003c/strong>\n              \u003cspan>마음에 들지 않으면 \"변형\" 버튼으로 유사 이미지 재생성.\u003c/span>\n            \u003c/div>\n          \u003c/div>\n        \u003c/div>\n\n        \u003cdiv class=\"style-pills\">\n          \u003cspan class=\"style-pill\" style=\"background:#FFF3E0;border-color:#FF9500;color:#E65100;\">📸 사진 실사\u003c/span>\n          \u003cspan class=\"style-pill\" style=\"background:#F3E5F5;border-color:#9B59B6;color:#6A1B9A;\">🎌 애니메이션\u003c/span>\n          \u003cspan class=\"style-pill\" style=\"background:#E8F5E9;border-color:#34A853;color:#1B5E20;\">🎨 수채화\u003c/span>\n          \u003cspan class=\"style-pill\" style=\"background:#E3F2FD;border-color:#1A73E8;color:#0D47A1;\">🖌️ 유화\u003c/span>\n          \u003cspan class=\"style-pill\" style=\"background:#FCE
