on: fixed; bottom: 32px; right: 32px; width: 46px; height: 46px; background: var(--brand); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: var(--shadow-lg); font-size: 20px; }\n    footer { background: #1A0800; color: rgba(255,255,255,0.6); text-align: center; padding: 32px 24px; font-size: .88rem; }\n    footer strong { color: #FFAA80; }\n  "},"manus":{"body":"\n\u003cnav class=\"nav\" id=\"top\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#top\">\u003cdiv class=\"logo-icon\">🤖\u003c/div>Manus 가이드\u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#what\">에이전트란\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#features\">핵심 기능\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#cases\">활용 사례\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#vs\">Claude 비교\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"hero-inner\">\n    \u003cdiv class=\"hero-badge\">\u003cspan>\u003c/span> Monica.im · AI Agent · 2025\u003c/div>\n    \u003cspan class=\"hero-emoji\">🤖\u003c/span>\n    \u003ch1>Manus\u003cbr>완전 활용 가이드\u003c/h1>\n    \u003cp>채팅이 아닌 실행 — 지시하면 스스로 웹을 탐색하고\u003cbr>파일을 만들고 완성된 결과물을 가져오는 AI 에이전트\u003c/p>\n    \u003cdiv class=\"hero-stats\">\n      \u003cdiv class=\"hero-stat\">\u003cstrong>자율\u003c/strong>\u003cspan>스스로 실행\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>웹 탐색\u003c/strong>\u003cspan>자동 브라우징\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>파일 생성\u003c/strong>\u003cspan>문서·코드·데이터\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-stat\">\u003cstrong>병렬\u003c/strong>\u003cspan>멀티태스킹\u003c/span>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003cmain>\n  \u003cdiv class=\"section\" id=\"what\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">1\u003c/div>\u003ch2>Manus란? — AI 에이전트의 패러다임\u003c/h2>\u003c/div>\n    \u003cdiv class=\"agent-flow\">\n      \u003cdiv class=\"af-title\">⚡ Manus 작동 방식 — \"조사해서 보고서 만들어줘\" 한 마디면\u003c/div>\n      \u003cdiv class=\"af-steps\">\n        \u003cdiv class=\"af-step\">\u003cdiv class=\"af-step-icon\">💬\u003c/div>\u003cdiv class=\"af-step-title\">목표 이해\u003c/div>\u003cdiv class=\"af-step-desc\">요청 분석·계획 수립\u003c/div>\u003c/div>\n        \u003cdiv class=\"af-arrow\">→\u003c/div>\n        \u003cdiv class=\"af-step\">\u003cdiv class=\"af-step-icon\">🌐\u003c/div>\u003cdiv class=\"af-step-title\">웹 자동 탐색\u003c/div>\u003cdiv class=\"af-step-desc\">수십 개 소스 검색\u003c/div>\u003c/div>\n        \u003cdiv class=\"af-arrow\">→\u003c/div>\n        \u003cdiv class=\"af-step\">\u003cdiv class=\"af-step-icon\">📊\u003c/div>\u003cdiv class=\"af-step-title\">데이터 처리\u003c/div>\u003cdiv class=\"af-step-desc\">정보 추출·분석\u003c/div>\u003c/div>\n        \u003cdiv class=\"af-arrow\">→\u003c/div>\n        \u003cdiv class=\"af-step\">\u003cdiv class=\"af-step-icon\">📄\u003c/div>\u003cdiv class=\"af-step-title\">결과물 생성\u003c/div>\u003cdiv class=\"af-step-desc\">문서·파일 완성\u003c/div>\u003c/div>\n        \u003cdiv class=\"af-arrow\">→\u003c/div>\n        \u003cdiv class=\"af-step\">\u003cdiv class=\"af-step-icon\">✅\u003c/div>\u003cdiv class=\"af-step-title\">전달\u003c/div>\u003cdiv class=\"af-step-desc\">다운로드 제공\u003c/div>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"card\">\n      \u003cdiv style=\"font-weight:700;margin-bottom:12px;\">💡 일반 AI vs Manus 차이\u003c/div>\n      \u003cdiv class=\"vs-box\">\n        \u003cdiv class=\"vs-grid\">\n          \u003cdiv class=\"vs-item\">\n            \u003cstrong>🤔 일반 AI (ChatGPT, Claude)\u003c/strong>\n            \u003cspan>질문에 텍스트로 답변. 검색·파일 생성·실행은 직접 해야 함. 대화 한 번 = 한 번의 작업.\u003c/span>\n          \u003c/div>\n          \u003cdiv class=\"vs-item\">\n            \u003cstrong>🤖 Manus (AI 에이전트)\u003c/strong>\n            \u003cspan>목표를 주면 스스로 계획·실행·완성. 웹 탐색, 파일 생성, 코드 실행을 자율적으로 수행.\u003c/span>\n          \u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section\" id=\"features\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">2\u003c/div>\u003ch2>핵심 기능\u003c/h2>\u003c/div>\n    \u003cdiv class=\"grid-2\">\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">🌐\u003c/div>\n        \u003cdiv class=\"feat-title\">자율 웹 브라우징\u003c/div>\n        \u003cdiv class=\"feat-desc\">실제 브라우저처럼 웹사이트를 열고, 클릭하고, 로그인하고, 데이터를 수집. 사람이 하는 웹 작업의 대부분을 자동화.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">💻\u003c/div>\n        \u003cdiv class=\"feat-title\">코드 작성 & 실행\u003c/div>\n        \u003cdiv class=\"feat-desc\">Python, JavaScript 등 코드를 작성하고 직접 실행. 데이터 분석, 차트 생성, 웹 스크래핑을 완전 자동화.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">📁\u003c/div>\n        \u003cdiv class=\"feat-title\">파일 생성 & 관리\u003c/div>\n        \u003cdiv class=\"feat-desc\">Excel, Word, PDF, PPT, CSV를 실제로 생성하여 다운로드 제공. 단순 텍스트 답변이 아닌 완성된 파일.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"feat-card\">\n        \u003cdiv class=\"feat-icon\">🔄\u003c/div>\n        \u003cdiv class=\"feat-title\">병렬 멀티태스킹\u003c/div>\n        \u003cdiv class=\"feat-desc\">여러 작업을 동시에 병렬 처리. \"3개 경쟁사 동시에 조사해줘\" → 동시 실행으로 시간 단축.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section\" id=\"cases\">\n    \u003cdiv class=\"section-header\">\u003cdiv class=\"section-num\">3\u003c/div>\u003ch2>실전 활용 사례\u003c/h2>\u003c/div>\n    \u003cdiv class=\"use-case-grid\">\n      \u003cdiv class=\"uc-card\">\u003cdiv class=\"uc-icon\">📊\u003c/div>\u003cdiv class=\"uc-title\">시장 조사 보고서\u003c/div>\u003cdiv class=\"uc-desc\">\"국내 AI 스타트업 TOP 20 조사해서 Excel로 정리해줘\" → 자동으로 웹 탐색 후 완성된 파일 제공.\u003c/div>\u003c/div>\n      \u003cdiv class=\"uc-card\">\u003cdiv class=\"uc-icon\">🛒\u003c/div>\u003cdiv class=\"uc-title\">가격 비교 분석\u003c/div>\u003cdiv class=\"uc-desc\">여러 쇼핑몰의 제품 가격을 자동 수집·비교. 최저가 및 스펙 비교표 자동 생성.\u003c/div>\u003c/div>\n      \u003cdiv class=\"uc-card\">\u003cdiv class=\"uc-icon\">📰\u003c/div>\u003cdiv class=\"uc-title\">뉴스 모니터링\u003c/div>\u003cdiv class=\"uc-desc\">특정 키워드로 매일 뉴스 수집·요약. 업계 동향 보고서 자동 생성.\u003c/div>\u003c/div>\n      \u003cdiv class=\"uc-card\">\u003cdiv class=\"uc-icon\">🏢\u003c/div>\u003cdiv class=\"uc-title\">경쟁사 분석\u003c/div>\u003cdiv class=\"uc-desc\">경쟁사 웹사이트, 채용공고, 보도자료를 자동 수집하여 종합 분석 보고서 완성.\u003c/div>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tip-box\" style=\"margin-top:16px;\">\n      \u003cstrong>💡 Manus 잘 활용하는 법:\u003c/strong> 구체적인 목표와 원하는 출력 형식을 명시하세요. \"~를 조사해서 항목별로 Excel 표로 만들어줘 (열: 회사명, 서비스, 가격, 특징)\" 처럼 상세할수록 정확한 결과물을 받습니다.\n    \u003c/div>\n  \u003c/div>\n\u003c/main>\n\n\u003ca class=\"back-top\" href=\"#top\">↑\u003c/a>\n\u003cfooter>\u003cstrong>Manus 완전 활용 가이드\u003c/strong> · Monica.im · AI Agent · 2025\u003c/footer>\n","styles":"\n    :root {\n      --brand:      #6B46C1;\n      --brand-dark: #553C9A;\n      --brand-light:#F0EBFF;\n      --brand-mid:  #C4B5FD;\n      --text:      #1A1A2E;\n      --text-2:    #4B5575;\n      --text-3:    #8892B0;\n      --bg:        #FAFAF8;\n      --white:     #FFFFFF;\n      --border:    #DDD6FE;\n      --shadow:    0 4px 24px rgba(107,70,193,0.10);\n      --shadow-lg: 0 8px 40px rgba(107,70,193,0.16);\n      --radius:    16px;\n      --radius-sm: 10px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }\n    .nav-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: ce y: .85; margin-bottom: 40px; }\n    .hero-stats { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; }\n    .hero-stat { text-align: center; }\n    .hero-stat strong { display: block; font-size: 1.6rem; font-weight: 700; }\n    .hero-stat span { font-size: .8rem; opacity: .7; }\n\n    main { max-width: 960px; margin: 0 auto; padding: 60px 24px; }\n    .section { margin-bottom: 72px; }\n    .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }\n    .section-num { width: 40px; height: 40px; background: var(--brand); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; flex-shrink: 0; }\n    .section-header h2 { font-family: 'Noto Serif KR', serif; font-size: 1.6rem; font-weight: 700; }\n    .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 28px; box-shadow: var(--shadow); margin-bottom: 16px; }\n\n    /* 에이전트 플로우 */\n    .agent-flow { background: linear-gradient(135deg, #1A0A3E, #3D1A78); border-radius: var(--radius); padding: 32px; color: white; margin-bottom: 20px; }\n    .af-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 24px; }\n    .af-steps { display: flex; align-items: center; gap: 0; flex-wrap: wrap; gap: 8px; }\n    .af-step { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: var(--radius-sm); padding: 14px 18px; text-align: center; flex: 1; min-width: 130px; }\n    .af-step-icon { font-size: 1.6rem; margin-bottom: 6px; }\n    .af-step-title { font-size: .85rem; font-weight: 700; }\n    .af-step-desc { font-size: .75rem; opacity: .7; margin-top: 3px; }\n    .af-arrow { font-size: 1.4rem; color: rgba(255,255,255,0.4); flex-shrink: 0; }\n\n    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }\n    .feat-card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; transition: all .2s; }\n    .feat-card:hover { border-color: var(--brand); transform: translateY(-2px); box-shadow: var(--shadow-lg); }\n    .feat-icon { font-size: 2rem; margin-bottom: 12px; }\n    .feat-title { font-weight: 700; font-size: 1rem; margin-bottom: 8px; }\n    .feat-desc { font-size: .88rem; color: var(--text-2); line-height: 1.7; }\n\n    .use-case-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }\n    .uc-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px; transition: all .2s; }\n    .uc-card:hover { border-color: var(--brand); transform: translateY(-2px); }\n    .uc-icon { font-size: 1.8rem; margin-bottom: 8px; }\n    .uc-title { font-weight: 700; font-size: .9rem; margin-bottom: 5px; }\n    .uc-desc { font-size: .82rem; color: var(--text-2); }\n\n    .vs-box { background: var(--brand-light); border: 1px solid var(--brand-mid); border-radius: var(--radius); padding: 24px; }\n    .vs-title { font-weight: 700; margin-bottom: 16px; color: var(--brand-dark); }\n    .vs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n    .vs-item strong { display: block; font-size: .9rem; margin-bottom: 4px; }\n    .vs-item span { font-size: .85rem; color: var(--text-2); }\n\n    .tip-box { background: linear-gradient(135deg, var(--brand-light), #fff); border-left: 4px solid var(--brand); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 16px 20px; margin-top: 12px; font-size: .9rem; }\n    .tip-box strong { color: var(--brand-dark); }\n\n    .back-top { position: fixed; bottom: 32px; right: 32px; width: 46px; height: 46px; background: var(--brand); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: var(--shadow-lg); font-size: 20px; transition: all .2s; }\n    footer { background: #1A0A3E; color: rgba(255,255,255,0.6); text-align: center; padding: 32px 24px; font-size: .88rem; }\n    footer strong { color: #C4B5FD; }\n  "},"antigravity":{"body":"\n\n\u003cnav class=\"nav\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#\">\n      \u003cdiv class=\"logo-icon\">⚡\u003c/div>\n      Antigravity\n    \u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#tools\">도구 소개\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#workflow\">워크플로우\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#compare\">비교표\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#tips\">팁\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"hero-badge\">⚡ AI 개발자 생산성 극대화 가이드\u003c/div>\n  \u003cdiv class=\"hero-logo-text\">Antigravity\u003c/div>\n  \u003ch1>중력을 거슬러 — \u003cspan>AI로 한계를 넘어서는\u003c/span>\u003cbr/>개발 생산성의 새로운 기준\u003c/h1>\n  \u003cp>옵시디언, 노션, 깃허브, VS Code, Claude Code가 유기적으로 연결되는 AI 퍼스트 개발 워크플로우를 완성하세요.\u003c/p>\n  \u003ca class=\"hero-cta\" href=\"#tools\">⚡ 도구 생태계 살펴보기\u003c/a>\n  \u003cdiv class=\"hero-stats\">\n    \u003cdiv class=\"hero-stat\">\u003cstrong>6가지\u003c/strong>\u003cspan>핵심 도구\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>AI 퍼스트\u003c/strong>\u003cspan>워크플로우\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>10× 생산성\u003c/strong>\u003cspan>목표\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>무료 ~ 저비용\u003c/strong>\u003cspan>모든 도구\u003c/span>\u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 도구 소개 -->\n\u003csection class=\"section\" id=\"tools\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">1\u003c/div>\u003cspan class=\"label\">Tool Ecosystem\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">AI 개발자의 필수 도구 생태계\u003c/h2>\n    \u003cp class=\"section-sub\">각 도구는 서로 다른 역할을 하며, 조합될 때 시너지가 극대화됩니다.\u003c/p>\n    \u003cdiv class=\"tool-matrix\">\n      \u003cdiv class=\"tool-card\">\n        \u003cdiv class=\"tool-head\">\n          \u003cdiv class=\"tool-icon\" style=\"background:rgba(124,58,237,0.15);\">🔮\u003c/div>\n          \u003cdiv>\u003ch3>Obsidian\u003c/h3>\u003cspan class=\"tool-badge\">지식 관리\u003c/span>\u003c/div>\n        \u003c/div>\n        \u003cp>두 번째 뇌. 아이디어와 연구 자료를 로컬에 저장하고, 링크로 연결하여 지식 그래프를 구성합니다.\u003c/p>\n        \u003cul>\n          \u003cli>개발 노트, 아이디어 메모\u003c/li>\n          \u003cli>기술 문서 개인 아카이브\u003c/li>\n          \u003cli>마크다운으로 Claude와 연동\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"tool-card\">\n        \u003cdiv class=\"tool-head\">\n          \u003cdiv class=\"tool-icon\" style=\"background:rgba(0,0,0,0.3);\">📝\u003c/div>\n          \u003cdiv>\u003ch3>Notion\u003c/h3>\u003cspan class=\"tool-badge\">프로젝트 관리\u003c/span>\u003c/div>\n        \u003c/div>\n        \u003cp>팀 협업과 프로젝트 관리의 허브. 로드맵, 스프린트, 문서화를 한 곳에서 관리합니다.\u003c/p>\n        \u003cul>\n          \u003cli>프로젝트 로드맵 & 스프린트\u003c/li>\n          \u003cli>기술 스펙 문서\u003c/li>\n          \u003cli>팀 위키 & 온보딩 자료\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"tool-card\">\n        \u003cdiv class=\"tool-head\">\n          \u003cdiv class=\"tool-icon\" style=\"background:rgba(0,0,0,0.3);\">🐙\u003c/div>\n          \u003cdiv>\u003ch3>GitHub\u003c/h3>\u003cspan class=\"tool-badge\">버전 관리 & 협업\u003c/span>\u003c/div>\n        \u003c/div>\n        \u003cp>코드의 집. 버전 관리, 코드 리뷰, CI/CD 자동화, Copilot AI 코딩 지원까지 통합합니다.\u003c/p>\n        \u003cul>\n          \u003cli>코드 저장 & 버전 관리\u003c/li>\n          \u003cli>PR 기반 협업\u003c/li>\n          \u003cli>Actions로 자동화\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"tool-card\">\n        \u003cdiv class=\"tool-head\">\n          \u003cdiv class=\"tool-icon\" style=\"background:rgba(0,122,204,0.15);\">💻\u003c/div>\n          \u003cdiv>\u003ch3>VS Code\u003c/h3>\u003cspan class=\"tool-badge\">코드 에디터\u003c/span>\u003c/div>\n        \u003c/div>\n        \u003cp>개발의 중심. GitHub Copilot과 Claude Code의 허브로, 모든 AI 코딩 도구를 통합합니다.\u003c/p>\n        \u003cul>\n          \u003cli>인라인 AI 코드 완성\u003c/li>\n          \u003cli>터미널에서 Claude Code 실행\u003c/li>\n          \u003cli>확장으로 무한 확장\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"tool-card\">\n        \u003cdiv class=\"tool-head\">\n          \u003cdiv class=\"tool-icon\" style=\"background:rgba(26,115,232,0.15);\">📒\u003c/div>\n          \u003cdiv>\u003ch3>NotebookLM\u003c/h3>\u003cspan class=\"tool-badge\">AI 리서치\u003c/span>\u003c/div>\n        \u003c/div>\n        \u003cp>기술 문서, 논문, 레퍼런스를 업로드하면 AI가 핵심을 추출하고 질문에 답해줍니다.\u003c/p>\n        \u003cul>\n          \u003cli>기술 논문 & 문서 분석\u003c/li>\n          \u003cli>API 문서 Q&A\u003c/li>\n          \u003cli>경쟁사 리서치 분석\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"tool-card\">\n        \u003cdiv class=\"tool-head\">\n          \u003cdiv class=\"tool-icon\" style=\"background:rgba(224,64,251,0.15);\">🤖\u003c/div>\n          \u003cdiv>\u003ch3>Claude Code\u003c/h3>\u003cspan class=\"tool-badge\">AI 코딩 어시스턴트\u003c/span>\u003c/div>\n        \u003c/div>\n        \u003cp>터미널에서 직접 코드베이스를 분석하고 수정하는 AI. 복잡한 리팩토링의 게임 체인저.\u003c/p>\n        \u003cul>\n          \u003cli>전체 코드베이스 분석\u003c/li>\n          \u003cli>복잡한 버그 수정\u003c/li>\n          \u003cli>코드 생성 & 리팩토링\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 워크플로우 -->\n\u003csection class=\"section\" id=\"workflow\" style=\"background: var(--dark2);\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">2\u003c/div>\u003cspan class=\"label\">Workflow\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\" style=\"color:var(--text);\">통합 AI 개발 워크플로우\u003c/h2>\n    \u003cp class=\"section-sub\">아이디어에서 배포까지 — 도구들이 연결되는 방식을 시각화합니다.\u003c/p>\n    \u003cdiv class=\"workflow-diagram\">\n      \u003cdiv class=\"wf-row\">\n        \u003cdiv class=\"wf-node\">💡 아이디어 발생\u003c/div>\n        \u003cdiv class=\"wf-arrow\">→\u003c/div>\n        \u003cdiv class=\"wf-node accent\">🔮 Obsidian 기록\u003c/div>\n        \u003cdiv class=\"wf-arrow\">→\u003c/div>\n        \u003cdiv class=\"wf-node\">📒 NotebookLM 리서치\u003c/div>\n        \u003cdiv class=\"wf-arrow\">→\u003c/div>\n        \u003cdiv class=\"wf-node accent\">📝 Notion 기획\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"wf-row\" style=\"margin-left:40px;\">\n        \u003cdiv class=\"wf-arrow\" style=\"transform:rotate(90deg);\">↓\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"wf-row\">\n        \u003cdiv class=\"wf-node cyan\">💻 VS Code 개발\u003c/div>\n        \u003cdiv class=\"wf-arrow\">←\u003c/div>\n        \u003cdiv class=\"wf-node\">🤖 Claude Code 구현\u003c/div>\n        \u003cdiv class=\"wf-arrow\">←\u003c/div>\n        \u003cdiv class=\"wf-node cyan\">GitHub Copilot 완성\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"wf-row\" style=\"margin-left:40px;\">\n        \u003cdiv class=\"wf-arrow\" style=\"transform:rotate(90deg);\">↓\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"wf-row\">\n        \u003cdiv class=\"wf-node green\">🐙 GitHub PR & Review\u003c/div>\n        \u003cdiv class=\"wf-arrow\">→\u003c/div>\n        \u003cdiv class=\"wf-node green\">⚡ Actions 자동 배포\u003c/div>\n        \u003cdiv class=\"wf-arrow\">→\u003c/div>\n        \u003cdiv class=\"wf-node\">✅ 프로덕션 배포\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 비교표 -->\n\u003csection class=\"section\" id=\"compare\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">3\u003c/div>\u003cspan class=\"label\">Comparison\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">도구별 특성 비교\u003c/h2>\n    \u003cp class=\"section-sub\">각 도구의 강점과 적합한 용도를 비교합니다.\u003c/p>\n    \u003cdiv style=\"background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;\">\n      \u003ctable class=\"compare-table\">\n        \u003cthead>\n          \u003ctr>\u003cth>도구\u003c/th>\u003cth>비용\u003c/th>\u003cth>로컬 저장\u003c/th>\u003cth>AI 통합\u003c/th>\u003cth>협업\u003c/th>\u003cth>주요 용도\u003c/th>\u003c/tr>\n        \u003c/thead>\n        \u003ctbody>\n          \u003ctr>\u003ctd>🔮 Obsidian\u003c/td>\u003ctd>무료\u003c/td>\u003ctd>\u003cspan class=\"check\">✓ 완전 로컬\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"partial\">△ 플러그인\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"cross\">✗ 개인용\u003c/span>\u003c/td>\u003ctd>지식 관리 / 메모\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>📝 Notion\u003c/td>\u003ctd>무료 ~\u003c/td>\u003ctd>\u003cspan class=\"cross\">✗ 클라우드\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"check\">✓ 내장 AI\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"check\">✓ 팀 협업\u003c/span>\u003c/td>\u003ctd>프로젝트 / 문서\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>🐙 GitHub\u003c/td>\u003ctd>무료 ~\u003c/td>\u003ctd>\u003cspan class=\"cross\">✗ 클라우드\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"check\">✓ Copilot\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"check\">✓ 개발팀\u003c/span>\u003c/td>\u003ctd>코드 버전 관리\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>💻 VS Code\u003c/td>\u003ctd>무료\u003c/td>\u003ctd>\u003cspan class=\"check\">✓ 로컬\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"check\">✓ Copilot+\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"partial\">△ Live Share\u003c/span>\u003c/td>\u003ctd>코드 편집기\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>📒 NotebookLM\u003c/td>\u003ctd>무료\u003c/td>\u003ctd>\u003cspan class=\"cross\">✗ 클라우드\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"check\">✓ 핵심 기능\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"partial\">△ 공유\u003c/span>\u003c/td>\u003ctd>문서 분석 / 리서치\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>🤖 Claude Code\u003c/td>\u003ctd>Pro/API\u003c/td>\u003ctd>\u003cspan class=\"check\">✓ 로컬 실행\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"check\">✓ 핵심 기능\u003c/span>\u003c/td>\u003ctd>\u003cspan class=\"cross\">✗ 개인용\u003c/span>\u003c/td>\u003ctd>AI 코딩 어시스턴트\u003c/td>\u003c/tr>\n        \u003c/tbody>\n      \u003c/table>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 팁 -->\n\u003csection class=\"section\" id=\"tips\" style=\"background: var(--dark2);\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">4\u003c/div>\u003cspan class=\"label\">Pro Tips\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\" style=\"color:var(--text);\">생산성 극대화 팁\u003c/h2>\n    \u003cp class=\"section-sub\">도구들을 연결하여 최대 시너지를 내는 방법입니다.\u003c/p>\n    \u003cdiv class=\"tip-item\">\n      \u003cstrong>⚡ 옵시디언 → Claude Code 연결\u003c/strong>\n      \u003cp>옵시디언에서 작성한 기술 스펙이나 아이디어 메모를 Claude Code에 입력하면 즉시 코드로 변환됩니다. 마크다운 형식이 Claude와 완벽히 호환됩니다.\u003c/p>\n    \u003c/div>\n    \u003cdiv class=\"tip-item\">\n      \u003cstrong>📒 NotebookLM으로 기술 문서 소화하기\u003c/strong>\n      \u003cp>새 라이브러리나 프레임워크의 공식 문서를 NotebookLM에 업로드하면 AI 튜터가 됩니다. \"이 라이브러리로 파일 업로드 기능 어떻게 구현해?\"처럼 자연어로 질문하세요.\u003c/p>\n    \u003c/div>\n    \u003cdiv class=\"tip-item\">\n      \u003cstrong>🔄 GitHub Issues → Notion 동기화\u003c/strong>\n      \u003cp>GitHub Issues를 Notion 커넥터로 연결하면 버그 리포트와 기능 요청이 자동으로 Notion 데이터베이스에 동기화됩니다. 한 곳에서 전체 프로젝트 상태를 파악하세요.\u003c/p>\n    \u003c/div>\n    \u003cdiv class=\"tip-item\">\n      \u003cstrong>🤖 AI 도구 분업 전략\u003c/strong>\n      \u003cp>GitHub Copilot = 타이핑 속도 (인라인 코드 완성) / Claude Code = 사고 속도 (복잡한 문제 해결) / ChatGPT/Gemini = 빠른 검색 대체 / NotebookLM = 내부 문서 기반 Q&A. 각자의 역할에 맞게 사용하세요.\u003c/p>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection class=\"done-section\">\n  \u003ch2>⚡ 중력을 거슬러, AI와 함께 비상하세요\u003c/h2>\n  \u003cp>올바른 도구의 조합이 생산성의 한계를 바꿉니다.\u003c/p>\n  \u003ca class=\"done-link\" href=\"#tools\">⚡ 도구 탐색 시작하기\u003c/a>\n\u003c/section>\n\n\u003cfooter>\n  \u003cp>이 가이드는 AI 시대의 개발자 생산성 극대화를 위해 제작되었습니다.\u003c/p>\n\u003c/footer>\n\u003cbutton class=\"back-top\" id=\"backTop\" onclick=\"window.scrollTo({top:0,behavior:'smooth'})\">↑\u003c/button>\n\u003cscript>\n  window.addEventListener('scroll', () => { document.getElementById('backTop').classList.toggle('visible', window.scrollY > 300); });\n\u003c/script>\n","styles":"\n    :root {\n      --dark:       #0A0A12;\n      --dark2:      #10101C;\n      --dark3:      #1A1A2E;\n      --accent:     #E040FB;\n      --accent2:    #7C4DFF;\n      --cyan:       #00E5FF;\n      --green:      #00E676;\n      --yellow:     #FFD740;\n      --text:       #E8EAFF;\n      --text-2:     #9899BB;\n      --border:     rgba(255,255,255,0.08);\n      --glow:       0 0 40px rgba(224,64,251,0.2);\n      --radius:     16px;\n      --radius-sm:  10px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--dark); color: var(--text); line-height: 1.7; font-size: 16px; }\n\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(10,10,18,0.95); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 24px; }\n    .nav-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }\n    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--text); text-decoration: none; }\n    .nav-logo .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }\n    .nav-links { display: flex; gap: 6px; list-style: none; }\n    .nav-links a { text-decoration: none; color: var(--text-2); font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: all .2s; }\n    .nav-links a:hover { background: rgba(224,64,251,0.15); color: var(--accent); }\n\n    .hero { background: radial-gradient(ellipse at 50% -10%, rgba(124,77,255,0.3) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(0,229,255,0.15) 0%, transparent 50%), var(--dark); padding: 90px 24px 110px; text-align: center; position: relative; overflow: hidden; }\n    .hero::before { content: ''; position: absolute; inset: 0; background: url(\"data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1' fill='rgba(255,255,255,0.04)'/%3E%3C/svg%3E\") repeat; }\n    .hero-badge { display: inline-block; background: rgba(224,64,251,0.15); color: var(--accent); font-size: 13px; font-weight: 600; padding: 6px 16px; border-radius: 100px; border: 1px solid rgba(224,64,251,0.3); margin-bottom: 24px; position: relative; }\n    .hero-logo-text { font-size: clamp(52px,10vw,100px); font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -2px; margin-bottom: 8px; position: relative; }\n    .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(20px,3vw,28px); font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 20px; position: relative; }\n    .hero h1 span { color: var(--cyan); }\n    .hero p { font-size: clamp(14px,2vw,17px); color: var(--text-2); max-width: 560px; margin: 0 auto 36px; position: relative; }\n    .hero-cta { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; font-weight: 700; font-size: 16px; padding: 14px 28px; border-radius: 100px; text-decoration: none; box-shadow: 0 8px 32px rgba(224,64,251,0.3); transition: transform .2s, box-shadow .2s; position: relative; }\n    .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 48px rgba(224,64,251,0.4); }\n    .hero-stats { display: flex; justify-content: center; gap: 48px; margin-top: 56px; position: relative; flex-wrap: wrap; }\n    .hero-stat { text-align: center; }\n    .hero-stat strong { display: block; font-size: 22px; font-weight: 900; color: var(--text); }\n    .hero-stat span { font-size: 12px; color: var(--text-2); }\n\n    .section { padding: 80px 24px; }\n    .section-inner { max-width: 960px; margin: 0 auto; }\n    .section-title { font-family: 'Noto Serif KR', serif; font-size: clamp(22px,3.5vw,30px); font-weight: 700; margin-bottom: 8px; }\n    .section-sub { color: var(--text-2); font-size: 15px; margin-bottom: 40px; }\n    .section-num { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 16px; }\n    .section-num .num { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; flex-shrink: 0; }\n    .section-num .label { font-size: 13px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .08em; }\n\n    /* 도구 매트릭스 */\n    .tool-matrix { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }\n    .tool-card { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; transition: all .3s; cursor: default; }\n    .tool-card:hover { background: rgba(224,64,251,0.06); border-color: rgba(224,64,251,0.3); transform: translateY(-4px); box-shadow: 0 8px 40px rgba(224,64,251,0.15); }\n    .tool-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }\n    .tool-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }\n    .tool-head h3 { font-size: 17px; font-weight: 700; color: var(--text); }\n    .tool-head .tool-badge { font-size: 11px; background: rgba(0,229,255,0.1); color: var(--cyan); padding: 2px 8px; border-radius: 100px; border: 1px solid rgba(0,229,255,0.3); }\n    .tool-card p { font-size: 14px; color: var(--text-2); line-height: 1.6; }\n    .tool-card ul { padding-left: 18px; font-size: 14px; color: var(--text-2); line-height: 1.9; margin-top: 8px; }\n\n    /* 워크플로우 다이어그램 */\n    .workflow-diagram { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; }\n    .wf-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }\n    .wf-row:last-child { margin-bottom: 0; }\n    .wf-node { background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 16px; font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }\n    .wf-arrow { color: var(--text-2); font-size: 16px; flex-shrink: 0; }\n    .wf-node.accent { border-color: rgba(224,64,251,0.5); background: rgba(224,64,251,0.1); color: var(--accent); }\n    .wf-node.cyan { border-color: rgba(0,229,255,0.4); background: rgba(0,229,255,0.08); color: var(--cyan); }\n    .wf-node.green { border-color: rgba(0,230,118,0.4); background: rgba(0,230,118,0.08); color: var(--green); }\n\n    /* 비교표 */\n    .compare-table { width: 100%; border-collapse: collapse; font-size: 14px; }\n    .compare-table th { background: rgba(255,255,255,0.06); color: var(--text-2); padding: 12px 16px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }\n    .compare-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--text); }\n    .compare-table tr:last-child td { border-bottom: none; }\n    .compare-table tr:hover td { background: rgba(255,255,255,0.03); }\n    .check { color: var(--green); font-weight: 700; }\n    .cross { color: #EF5350; }\n    .partial { color: var(--yellow); }\n\n    /* 팁 */\n    .tip-item { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 20px 24px; margin-bottom: 14px; }\n    .tip-item strong { display: block; margin-bottom: 8px; font-size: 15px; color: var(--text); }\n    .tip-item p { font-size: 14px; color: var(--text-2); line-height: 1.7; }\n\n    .done-section { background: radial-gradient(ellipse at 50% 0%, rgba(124,77,255,0.2), transparent 70%), var(--dark2); padding: 80px 24px; text-align: center; border-top: 1px solid var(--border); }\n    .done-section h2 { font-family: 'Noto Serif KR', serif; font-size: clamp(22px,4vw,34px); color: var(--text); margin-bottom: 16px; }\n    .done-section p { font-size: 16px; color: var(--text-2); margin-bottom: 32px; }\n    .done-link { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; font-weight: 700; padding: 14px 28px; border-radius: 100px; text-decoration: none; font-size: 16px; transition: transform .2s; }\n    .done-link:hover { transform: translateY(-2px); }\n\n    footer { background: var(--dark); color: var(--text-2); text-align: center; padding: 28px 24px; font-size: 14px; border-top: 1px solid var(--border); }\n    footer a { color: var(--accent); text-decoration: none; }\n    .back-top { position: fixed; bottom: 28px; right: 28px; width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; border-radius: 50%; font-size: 18px; cursor: pointer; opacity: 0; transition: opacity .3s; z-index: 200; box-shadow: 0 4px 20px rgba(224,64,251,0.4); }\n    .back-top.visible { opacity: 1; }\n\n    @media (max-width: 640px) { .nav-links { display: none; } .hero-stats { gap: 24px; } }\n  "},"vscode":{"body":"\n\n\u003cnav class=\"nav\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#\">\n      \u003cdiv class=\"logo-icon\">\n        \u003csvg viewBox=\"0 0 100 100\" width=\"30\" height=\"30\">\n          \u003cpath d=\"M73.7 6.1L39.3 38.3 18.5 20.4 6.1 26.9v46.2l12.4 6.5 20.8-17.9 34.4 31.9L93.9 82V18L73.7 6.1zM81.4 74.4l-26.2-24 26.2-24v48z\" fill=\"#007ACC\"/>\n        \u003c/svg>\n      \u003c/div>\n      VS Code 가이드\n    \u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#editor\">에디터\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#extensions\">확장\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#ai\">AI 기능\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#shortcuts\">단축키\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#tips\">팁\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"vscode-logo-wrap\">\n    \u003csvg viewBox=\"0 0 100 100\" width=\"72\" height=\"72\" style=\"filter:drop-shadow(0 8px 24px rgba(0,122,204,0.5))\">\n      \u003cpath d=\"M73.7 6.1L39.3 38.3 18.5 20.4 6.1 26.9v46.2l12.4 6.5 20.8-17.9 34.4 31.9L93.9 82V18L73.7 6.1zM81.4 74.4l-26.2-24 26.2-24v48z\" fill=\"#007ACC\"/>\n    \u003c/svg>\n  \u003c/div>\n  \u003cdiv class=\"hero-badge\">💻 세계 1위 코드 에디터\u003c/div>\n  \u003ch1>코딩의 표준,\u003cbr/>\u003cspan>Visual Studio Code\u003c/span>\u003c/h1>\n  \u003cp>Microsoft가 만든 무료 오픈소스 코드 에디터. 가볍고, 빠르고, 확장 가능합니다. AI 코딩 도구의 허브입니다.\u003c/p>\n  \u003ca class=\"hero-cta\" href=\"https://code.visualstudio.com\" target=\"_blank\">💻 VS Code 다운로드 (무료)\u003c/a>\n  \u003cdiv class=\"hero-stats\">\n    \u003cdiv class=\"hero-stat\">\u003cstrong>완전 무료\u003c/strong>\u003cspan>오픈소스\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>1위\u003c/strong>\u003cspan>개발자 에디터\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>30,000+\u003c/strong>\u003cspan>확장 프로그램\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>Win/Mac/Linux\u003c/strong>\u003cspan>크로스 플랫폼\u003c/span>\u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 에디터 UI -->\n\u003csection class=\"section\" id=\"editor\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">1\u003c/div>\u003cspan class=\"label\">Editor\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">VS Code 에디터 살펴보기\u003c/h2>\n    \u003cp class=\"section-sub\">신택스 하이라이팅, IntelliSense, 멀티 커서 편집 등 강력한 편집 기능을 갖추고 있습니다.\u003c/p>\n    \u003cdiv class=\"editor-sim\">\n      \u003cdiv class=\"editor-titlebar\">\n        \u003cdiv class=\"editor-dot\" style=\"background:#FF5F56\">\u003c/div>\n        \u003cdiv class=\"editor-dot\" style=\"background:#FFBD2E\">\u003c/div>\n        \u003cdiv class=\"editor-dot\" style=\"background:#27C93F\">\u003c/div>\n        \u003cdiv class=\"editor-tab\">app.py\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"editor-body\">\n        \u003cdiv class=\"line-nums\">1\u003cbr/>2\u003cbr/>3\u003cbr/>4\u003cbr/>5\u003cbr/>6\u003cbr/>7\u003cbr/>8\u003cbr/>9\u003cbr/>10\u003cbr/>11\u003cbr/>12\u003c/div>\n        \u003cdiv class=\"code-area\">\n          \u003cspan class=\"cm\"># AI 활용 데이터 분석 예시\u003c/span>\u003cbr/>\n          \u003cspan class=\"kw\">import\u003c/span> \u003cspan class=\"var\">pandas\u003c/span> \u003cspan class=\"kw\">as\u003c/span> \u003cspan class=\"var\">pd\u003c/span>\u003cbr/>\n          \u003cspan class=\"kw\">from\u003c/span> \u003cspan class=\"var\">anthropic\u003c/span> \u003cspan class=\"kw\">import\u003c/span> \u003cspan class=\"var\">Anthropic\u003c/span>\u003cbr/>\n          \u003cbr/>\n          \u003cspan class=\"var\">client\u003c/span> = \u003cspan class=\"fn\">Anthropic\u003c/span>()\u003cbr/>\n          \u003cbr/>\n          \u003cspan class=\"kw\">def\u003c/span> \u003cspan class=\"fn\">analyze_data\u003c/span>(\u003cspan class=\"var\">df\u003c/span>: \u003cspan class=\"var\">pd.DataFrame\u003c/span>) -&gt; \u003cspan class=\"var\">str\u003c/span>:\u003cbr/>\n          &nbsp;&nbsp;&nbsp;&nbsp;\u003cspan class=\"cm\">\"\"\"데이터프레임을 분석하여 인사이트를 반환합니다\"\"\"\u003c/span>\u003cbr/>\n          &nbsp;&nbsp;&nbsp;&nbsp;\u003cspan class=\"var\">summary\u003c/span> = \u003cspan class=\"var\">df\u003c/span>.\u003cspan class=\"fn\">describe\u003c/span>().\u003cspan class=\"fn\">to_string\u003c/span>()\u003cbr/>\n          &nbsp;&nbsp;&nbsp;&nbsp;\u003cspan class=\"var\">response\u003c/span> = \u003cspan class=\"var\">client\u003c/span>.\u003cspan class=\"var\">messages\u003c/span>.\u003cspan class=\"fn\">create\u003c/span>(\u003cbr/>\n          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\u003cspan class=\"var\">model\u003c/span>=\u003cspan class=\"str\">\"claude-opus-4-5\"\u003c/span>,\u003cbr/>\n          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\u003cspan class=\"var\">messages\u003c/span>=[{\u003cspan class=\"str\">\"role\"\u003c/span>: \u003cspan class=\"str\">\"user\"\u003c/span>, \u003cspan class=\"str\">\"content\"\u003c/span>: \u003cspan class=\"var\">summary\u003c/span>}]\u003cbr/>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 확장 프로그램 -->\n\u003csection class=\"section\" id=\"extensions\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">2\u003c/div>\u003cspan class=\"label\">Extensions\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">필수 확장 프로그램\u003c/h2>\n    \u003cp class=\"section-sub\">Ctrl+Shift+X (Extensions) 에서 설치할 수 있습니다.\u003c/p>\n    \u003cdiv class=\"ext-grid\">\n      \u003cdiv class=\"ext-card\">\n        \u003cdiv class=\"ext-icon\" style=\"background:#F3E8FF;\">🤖\u003c/div>\n        \u003cdiv class=\"ext-info\">\u003ch4>GitHub Copilot\u003c/h4>\u003cp>AI 코드 자동완성. 주석 작성 시 코드를 제안합니다. 학생/교사 무료.\u003c/p>\u003cspan class=\"ext-tag ai\">AI 필수\u003c/span>\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"ext-card\">\n        \u003cdiv class=\"ext-icon\" style=\"background:#E8F4FD;\">🐍\u003c/div>\n        \u003cdiv class=\"ext-info\">\u003ch4>Python (ms-python)\u003c/h4>\u003cp>파이썬 개발 필수. 린팅, 디버깅, Jupyter 지원 등 통합 제공.\u003c/p>\u003cspan class=\"ext-tag\">언어\u003c/span>\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"ext-card\">\n        \u003cdiv class=\"ext-icon\" style=\"background:#FFF0E6;\">🦊\u003c/div>\n        \u003cdiv class=\"ext-info\">\u003ch4>GitLens\u003c/h4>\u003cp>Git 히스토리, blame 정보, 변경 비교를 에디터 내에서 바로 볼 수 있습니다.\u003c/p>\u003cspan class=\"ext-tag git\">Git\u003c/span>\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"ext-card\">\n        \u003cdiv class=\"ext-icon\" style=\"background:#F0FDF4;\">🎨\u003c/div>\n        \u003cdiv class=\"ext-info\">\u003ch4>Prettier\u003c/h4>\u003cp>코드 자동 포맷터. JS/TS/Python/HTML/CSS 등 저장 시 자동 정리.\u003c/p>\u003cspan class=\"ext-tag\">포맷터\u003c/span>\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"ext-card\">\n        \u003cdiv class=\"ext-icon\" style=\"background:#FEF3C7;\">🌈\u003c/div>\n        \u003cdiv class=\"ext-info\">\u003ch4>One Dark Pro\u003c/h4>\u003cp>가장 인기 있는 다크 테마. 눈이 편한 색상으로 장시간 코딩에 최적.\u003c/p>\u003cspan class=\"ext-tag\">테마\u003c/span>\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"ext-card\">\n        \u003cdiv class=\"ext-icon\" style=\"background:#E8F4FD;\">🔍\u003c/div>\n        \u003cdiv class=\"ext-info\">\u003ch4>ESLint\u003c/h4>\u003cp>자바스크립트/타입스크립트 코드 오류와 스타일 문제를 실시간 감지합니다.\u003c/p>\u003cspan class=\"ext-tag\">JS/TS\u003c/span>\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"ext-card\">\n        \u003cdiv class=\"ext-icon\" style=\"background:#F5F3FF;\">🗂️\u003c/div>\n        \u003cdiv class=\"ext-info\">\u003ch4>Material Icon Theme\u003c/h4>\u003cp>파일 탐색기의 파일 아이콘을 직관적으로 변경합니다. 파일 종류 파악이 쉬워집니다.\u003c/p>\u003cspan class=\"ext-tag\">UI\u003c/span>\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"ext-card\">\n        \u003cdiv class=\"ext-icon\" style=\"background:#FFF0F3;\">🌐\u003c/div>\n        \u003cdiv class=\"ext-info\">\u003ch4>Live Server\u003c/h4>\u003cp>HTML 파일을 저장하면 브라우저가 자동으로 새로고침됩니다. 웹 개발 필수.\u003c/p>\u003cspan class=\"ext-tag\">웹\u003c/span>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- AI 기능 -->\n\u003csection class=\"section\" id=\"ai\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">3\u003c/div>\u003cspan class=\"label\">AI Features\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">VS Code의 AI 코딩 도구\u003c/h2>\n    \u003cp class=\"section-sub\">GitHub Copilot과 Claude Code의 조합으로 최강의 AI 개발 환경을 구성하세요.\u003c/p>\n    \u003cdiv class=\"ai-section\">\n      \u003ch3>🤖 AI 개발 도구 조합\u003c/h3>\n      \u003cdiv class=\"ai-grid\">\n        \u003cdiv class=\"ai-item\">\u003ch4>GitHub Copilot\u003c/h4>\u003cp>인라인 코드 자동완성. 탭 한 번으로 코드 블록 완성. Copilot Chat으로 코드 설명 요청.\u003c/p>\u003c/div>\n        \u003cdiv class=\"ai-item\">\u003ch4>Claude Code (터미널)\u003c/h4>\u003cp>VS Code 통합 터미널에서 claude 명령으로 복잡한 리팩토링, 전체 파일 분석, 버그 수정.\u003c/p>\u003c/div>\n        \u003cdiv class=\"ai-item\">\u003ch4>Continue (확장)\u003c/h4>\u003cp>Claude, GPT-4 등 다양한 AI를 VS Code에서 직접 연결. 무료로 사용 가능한 Copilot 대안.\u003c/p>\u003c/div>\n        \u003cdiv class=\"ai-item\">\u003ch4>Codeium (확장)\u003c/h4>\u003cp>완전 무료 AI 코드 완성 도구. Copilot 없이도 AI 자동완성 기능을 사용할 수 있습니다.\u003c/p>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 단축키 -->\n\u003csection class=\"section\" id=\"shortcuts\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">4\u003c/div>\u003cspan class=\"label\">Shortcuts\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">필수 단축키\u003c/h2>\n    \u003cp class=\"section-sub\">이 단축키들만 익혀도 코딩 속도가 2배 이상 빨라집니다.\u003c/p>\n    \u003cdiv class=\"sk-grid\">\n      \u003cdiv class=\"sk-group\">\n        \u003cdiv class=\"sk-group-header\">⚡ 편집\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">커맨드 팔레트\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">Shift\u003c/span>\u003cspan class=\"key\">P\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">빠른 파일 열기\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">P\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">멀티커서 (같은 단어)\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">D\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">줄 이동\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Alt\u003c/span>\u003cspan class=\"key\">↑↓\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">줄 복사\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Shift\u003c/span>\u003cspan class=\"key\">Alt\u003c/span>\u003cspan class=\"key\">↓\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">줄 삭제\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">Shift\u003c/span>\u003cspan class=\"key\">K\u003c/span>\u003c/div>\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"sk-group\">\n        \u003cdiv class=\"sk-group-header\">🔍 탐색\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">전체 검색\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">Shift\u003c/span>\u003cspan class=\"key\">F\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">파일 내 검색\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">F\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">찾아 바꾸기\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">H\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">심볼로 이동\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">Shift\u003c/span>\u003cspan class=\"key\">O\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">특정 줄로 이동\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">G\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">에디터 분할\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">\\\u003c/span>\u003c/div>\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"sk-group\">\n        \u003cdiv class=\"sk-group-header\">🖥️ 터미널 & 뷰\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">통합 터미널 토글\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">`\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">새 터미널\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">Shift\u003c/span>\u003cspan class=\"key\">`\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">사이드바 토글\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">B\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">탐색기 열기\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">Shift\u003c/span>\u003cspan class=\"key\">E\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">확장 관리\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">Ctrl\u003c/span>\u003cspan class=\"key\">Shift\u003c/span>\u003cspan class=\"key\">X\u003c/span>\u003c/div>\u003c/div>\n        \u003cdiv class=\"sk-row\">\u003cspan class=\"sk-desc\">전체 화면\u003c/span>\u003cdiv class=\"sk-keys\">\u003cspan class=\"key\">F11\u003c/span>\u003c/div>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 팁 -->\n\u003csection class=\"section\" id=\"tips\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">5\u003c/div>\u003cspan class=\"label\">Pro Tips\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">VS Code 실전 팁\u003c/h2>\n    \u003cp class=\"section-sub\">생산성을 극대화하는 VS Code 노하우입니다.\u003c/p>\n    \u003cdiv style=\"display:flex;flex-direction:column;gap:14px;\">\n      \u003cdiv style=\"background:white;border-left:4px solid var(--blue);border-radius:0 8px 8px 0;padding:18px 22px;box-shadow:var(--shadow);\">\n        \u003cstrong style=\"display:block;margin-bottom:6px;\">⚙️ settings.json 필수 설정\u003c/strong>\n        \u003cp style=\"font-size:14px;color:var(--text-2);\">\"editor.formatOnSave\": true (저장 시 자동 포맷), \"editor.fontSize\": 14, \"editor.minimap.enabled\": false (미니맵 끄기로 더 넓은 화면), \"terminal.integrated.defaultProfile.windows\": \"Git Bash\"\u003c/p>\n      \u003c/div>\n      \u003cdiv style=\"background:white;border-left:4px solid var(--teal);border-radius:0 8px 8px 0;padding:18px 22px;box-shadow:var(--shadow);\">\n        \u003cstrong style=\"display:block;margin-bottom:6px;\">🔄 멀티 루트 워크스페이스\u003c/strong>\n        \u003cp style=\"font-size:14px;color:var(--text-2);\">File → Add Folder to Workspace로 여러 프로젝트 폴더를 하나의 VS Code 창에서 관리합니다. 프론트엔드/백엔드 동시 작업에 유용합니다.\u003c/p>\n      \u003c/div>\n      \u003cdiv style=\"background:white;border-left:4px solid var(--purple);border-radius:0 8px 8px 0;padding:18px 22px;box-shadow:var(--shadow);\">\n        \u003cstrong style=\"display:block;margin-bottom:6px;\">🤖 Claude Code + VS Code 최강 조합\u003c/strong>\n        \u003cp style=\"font-size:14px;color:var(--text-2);\">VS Code 통합 터미널에서 claude를 실행하면 현재 열린 프로젝트 폴더 전체를 Claude가 분석하고 수정할 수 있습니다. 복잡한 리팩토링이나 버그 수정에 최적입니다.\u003c/p>\n      \u003c/div>\n      \u003cdiv style=\"background:white;border-left:4px solid var(--yellow);border-radius:0 8px 8px 0;padding:18px 22px;box-shadow:var(--shadow);\">\n        \u003cstrong style=\"display:block;margin-bottom:6px;\">🌐 Dev Containers\u003c/strong>\n        \u003cp style=\"font-size:14px;color:var(--text-2);\">Docker를 사용해 개발 환경을 컨테이너화합니다. 팀원 모두 동일한 환경에서 작업할 수 있어 \"내 컴퓨터에서는 잘 되는데…\" 문제가 사라집니다.\u003c/p>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection class=\"done-section\">\n  \u003ch2>💻 코딩의 세계로 오신 것을 환영합니다\u003c/h2>\n  \u003cp>VS Code를 설치하고, 첫 번째 프로젝트를 시작해보세요.\u003c/p>\n  \u003ca class=\"done-link\" href=\"https://code.visualstudio.com\" target=\"_blank\">💻 VS Code 다운로드\u003c/a>\n\u003c/section>\n\n\u003cfooter>\n  \u003cp>Visual Studio Code는 Microsoft가 개발한 오픈소스 코드 에디터입니다.\u003c/p>\n  \u003cp style=\"margin-top:8px;\">공식 사이트: \u003ca href=\"https://code.visualstudio.com\" target=\"_blank\">code.visualstudio.com\u003c/a> &nbsp;|&nbsp; 확장: \u003ca href=\"https://marketplace.visualstudio.com\" target=\"_blank\">marketplace.visualstudio.com\u003c/a>\u003c/p>\n\u003c/footer>\n\u003cbutton class=\"back-top\" id=\"backTop\" onclick=\"window.scrollTo({top:0,behavior:'smooth'})\">↑\u003c/button>\n\u003cscript>\n  window.addEventListener('scroll', () => { document.getElementById('backTop').classList.toggle('visible', window.scrollY > 300); });\n\u003c/script>\n","styles":"\n    :root {\n      --blue:       #007ACC;\n      --blue-dark:  #005A9C;\n      --blue-light: #E8F4FD;\n      --blue-mid:   #C0E0F8;\n      --teal:       #4EC9B0;\n      --yellow:     #DCDCAA;\n      --orange:     #CE9178;\n      --purple:     #C586C0;\n      --green:      #6A9955;\n      --text:       #1A1A2E;\n      --text-2:     #4B5575;\n      --text-3:     #8892B0;\n      --bg:         #F5F7FA;\n      --white:      #FFFFFF;\n      --border:     #D4E2F0;\n      --vscode-bg:  #1E1E1E;\n      --vscode-bg2: #252526;\n      --vscode-bg3: #2D2D30;\n      --shadow:     0 4px 24px rgba(0,122,204,0.10);\n      --shadow-lg:  0 8px 40px rgba(0,122,204,0.16);\n      --radius:     14px;\n      --radius-sm:  8px;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }\n\n    .nav { position: sticky; top: 0; z-index: 100; background: rgba(30,30,30,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid #3C3C3C; padding: 0 24px; }\n    .nav-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }\n    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: #D4D4D4; text-decoration: none; }\n    .nav-logo .logo-icon { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; }\n    .nav-links { display: flex; gap: 6px; list-style: none; }\n    .nav-links a { text-decoration: none; color: #9CDCFE; font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 6px; transition: all .2s; }\n    .nav-links a:hover { background: rgba(0,122,204,0.2); color: white; }\n\n    .hero { background: linear-gradient(160deg, #0A0A0A 0%, #1E1E1E 40%, #007ACC 100%); padding: 80px 24px 100px; text-align: center; position: relative; overflow: hidden; }\n    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 100%, rgba(0,122,204,0.25) 0%, transparent 60%); }\n    .vscode-logo-wrap { margin: 0 auto 24px; }\n    .hero-badge { display: inline-block; background: rgba(0,122,204,0.3); color: #9CDCFE; font-size: 13px; font-weight: 600; padding: 6px 16px; border-radius: 100px; border: 1px solid rgba(0,122,204,0.5); margin-bottom: 24px; position: relative; }\n    .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(28px,5vw,50px); font-weight: 700; color: #D4D4D4; line-height: 1.3; margin-bottom: 20px; position: relative; }\n    .hero h1 span { color: #9CDCFE; }\n    .hero p { font-size: clamp(15px,2.5vw,18px); color: rgba(212,212,212,0.8); max-width: 560px; margin: 0 auto 36px; position: relative; }\n    .hero-cta { display: inline-flex; align-items: center; gap: 8px; background: var(--blue); color: white; font-weight: 700; font-size: 16px; padding: 14px 28px; border-radius: 8px; text-decoration: none; box-shadow: 0 8px 32px rgba(0,122,204,0.3); transition: transform .2s; position: relative; }\n    .hero-cta:hover { transform: translateY(-2px); }\n    .hero-stats { display: flex; justify-content: center; gap: 48px; margin-top: 56px; position: relative; flex-wrap: wrap; }\n    .hero-stat { text-align: center; }\n    .hero-stat strong { display: block; font-size: 26px; font-weight: 900; color: #D4D4D4; }\n    .hero-stat span { font-size: 13px; color: rgba(212,212,212,0.6); }\n\n    .section { padding: 72px 24px; }\n    .section-inner { max-width: 960px; margin: 0 auto; }\n    .section-title { font-family: 'Noto Serif KR', serif; font-size: clamp(22px,3.5vw,30px); font-weight: 700; margin-bottom: 8px; }\n    .section-sub { color: var(--text-2); font-size: 15px; margin-bottom: 40px; }\n    .section-num { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 16px; }\n    .section-num .num { width: 36px; height: 36px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; flex-shrink: 0; }\n    .section-num .label { font-size: 13px; font-weight: 600; color: var(--blue); text-transform: uppercase; letter-spacing: .06em; }\n\n    /* VS Code 에디터 시뮬레이션 */\n    .editor-sim { background: var(--vscode-bg); border-radius: var(--radius); overflow: hidden; border: 1px solid #3C3C3C; box-shadow: 0 8px 40px rgba(0,0,0,0.3); }\n    .editor-titlebar { background: #323233; padding: 8px 16px; display: flex; align-items: center; gap: 8px; }\n    .editor-dot { width: 12px; height: 12px; border-radius: 50%; }\n    .editor-filename { font-size: 12px; color: #CCCCCC; margin-left: 12px; font-family: monospace; }\n    .editor-tab { display: inline-block; background: var(--vscode-bg); padding: 4px 14px; border-radius: 4px 4px 0 0; font-size: 12px; color: #CCCCCC; border-top: 1px solid var(--blue); }\n    .editor-body { display: grid; grid-template-columns: 50px 1fr; }\n    .line-nums { background: var(--vscode-bg2); padding: 16px 8px; text-align: right; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.7; color: #555; border-right: 1px solid #3C3C3C; }\n    .code-area { padding: 16px 20px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.7; color: #D4D4D4; }\n    .kw { color: #569CD6; } .fn { color: #DCDCAA; } .str { color: var(--orange); } .cm { color: var(--green); } .var { color: #9CDCFE; } .num { color: #B5CEA8; }\n\n    /* 필수 확장 */\n    .ext-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }\n    .ext-card { background: white; border-radius: var(--radius-sm); padding: 18px 20px; border: 1px solid var(--border); display: flex; gap: 14px; align-items: flex-start; box-shadow: var(--shadow); transition: transform .2s; }\n    .ext-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }\n    .ext-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }\n    .ext-info h4 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }\n    .ext-info p { font-size: 13px; color: var(--text-2); line-height: 1.5; }\n    .ext-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; margin-top: 6px; background: var(--blue-light); color: var(--blue); }\n    .ext-tag.ai { background: #F3E8FF; color: #7C3AED; }\n    .ext-tag.git { background: #FFF0E6; color: #D04A00; }\n\n    /* 단축키 그리드 */\n    .sk-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }\n    .sk-group { background: white; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); }\n    .sk-group-header { background: var(--vscode-bg); color: #9CDCFE; padding: 12px 16px; font-size: 13px; font-weight: 700; letter-spacing: .04em; }\n    .sk-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }\n    .sk-row:last-child { border-bottom: none; }\n    .sk-desc { color: var(--text-2); }\n    .sk-keys { display: flex; gap: 3px; }\n    .key { display: inline-block; background: #F0F4F8; border: 1px solid var(--border); border-bottom: 2px solid var(--border); border-radius: 4px; padding: 1px 7px; font-family: monospace; font-size: 11px; color: var(--text); }\n\n    /* AI 기능 */\n    .ai-section { background: var(--vscode-bg); border-radius: var(--radius); padding: 32px; border: 1px solid #3C3C3C; }\n    .ai-section h3 { color: #9CDCFE; font-size: 18px; font-weight: 700; margin-bottom: 16px; }\n    .ai-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }\n    .ai-item { background: var(--vscode-bg2); border-radius: 10px; padding: 16px; border: 1px solid #3C3C3C; }\n    .ai-item h4 { color: #DCDCAA; font-size: 14px; font-weight: 700; margin-bottom: 6px; }\n    .ai-item p { font-size: 13px; color: rgba(212,212,212,0.75); line-height: 1.5; }\n\n    .done-section { background: linear-gradient(160deg, #0A0A0A, #1E1E1E, #007ACC); padding: 72px 24px; text-align: center; }\n    .done-section h2 { font-family: 'Noto Serif KR', serif; font-size: clamp(22px,4vw,32px); color: #D4D4D4; margin-bottom: 16px; }\n    .done-section p { font-size: 16px; color: rgba(212,212,212,0.7); margin-bottom: 32px; }\n    .done-link { display: inline-flex; align-items: center; gap: 8px; background: var(--blue); color: white; font-weight: 700; padding: 14px 28px; border-radius: 8px; text-decoration: none; font-size: 16px; transition: transform .2s; }\n    .done-link:hover { transform: translateY(-2px); }\n\n    footer { background: #0A0A0A; color: rgba(212,212,212,0.5); text-align: center; padding: 28px 24px; font-size: 14px; }\n    footer a { color: #9CDCFE; text-decoration: none; }\n    .back-top { position: fixed; bottom: 28px; right: 28px; width: 44px; height: 44px; background: var(--blue); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; opacity: 0; transition: opacity .3s; z-index: 200; }\n    .back-top.visible { opacity: 1; }\n\n    @media (max-width: 640px) { .nav-links { display: none; } .editor-body { grid-template-columns: 1fr; } .line-nums { display: none; } }\n  "},"github":{"body":"\n\n\u003cnav class=\"nav\">\n  \u003cdiv class=\"nav-inner\">\n    \u003ca class=\"nav-logo\" href=\"#\">\n      \u003cdiv class=\"logo-icon\">\n        \u003csvg viewBox=\"0 0 24 24\" width=\"28\" height=\"28\" fill=\"white\">\u003cpath d=\"M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z\"/>\u003c/svg>\n      \u003c/div>\n      깃허브 가이드\n    \u003c/a>\n    \u003cul class=\"nav-links\">\n      \u003cli>\u003ca href=\"#git-basics\">Git 기초\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#features\">핵심 기능\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#actions\">Actions\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#shortcuts\">단축키\u003c/a>\u003c/li>\n      \u003cli>\u003ca href=\"#tips\">팁\u003c/a>\u003c/li>\n    \u003c/ul>\n  \u003c/div>\n\u003c/nav>\n\n\u003csection class=\"hero\">\n  \u003cdiv class=\"github-logo-wrap\">\n    \u003csvg viewBox=\"0 0 24 24\" width=\"80\" height=\"80\" fill=\"white\" style=\"filter:drop-shadow(0 8px 24px rgba(63,185,80,0.4))\">\n      \u003cpath d=\"M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z\"/>\n    \u003c/svg>\n  \u003c/div>\n  \u003cdiv class=\"hero-badge\">🐙 세계 최대 코드 협업 플랫폼\u003c/div>\n  \u003ch1>코드를 \u003cspan>함께 만들고,\u003c/span>\u003cbr/>함께 관리하는 GitHub\u003c/h1>\n  \u003cp>버전 관리(Git)와 협업을 위한 플랫폼. 코드 저장소, Pull Request, Actions, Copilot까지 — 개발의 모든 과정이 여기에 있습니다.\u003c/p>\n  \u003ca class=\"hero-cta\" href=\"https://github.com\" target=\"_blank\">🐙 GitHub 시작하기 (무료)\u003c/a>\n  \u003cdiv class=\"hero-stats\">\n    \u003cdiv class=\"hero-stat\">\u003cstrong>무료\u003c/strong>\u003cspan>Public 저장소\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>1억+\u003c/strong>\u003cspan>개발자 사용\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>Copilot\u003c/strong>\u003cspan>AI 코딩 어시스턴트\u003c/span>\u003c/div>\n    \u003cdiv class=\"hero-stat\">\u003cstrong>Actions\u003c/strong>\u003cspan>CI/CD 자동화\u003c/span>\u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- Git 기초 -->\n\u003csection class=\"section\" id=\"git-basics\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">1\u003c/div>\u003cspan class=\"label\">Git Basics\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">Git 핵심 개념과 기본 명령어\u003c/h2>\n    \u003cp class=\"section-sub\">Git은 코드 변경 이력을 관리하는 분산 버전 관리 시스템입니다.\u003c/p>\n\n    \u003cdiv class=\"terminal\">\n      \u003cdiv class=\"terminal-header\">\n        \u003cdiv class=\"terminal-dot\" style=\"background:#FF5F56\">\u003c/div>\n        \u003cdiv class=\"terminal-dot\" style=\"background:#FFBD2E\">\u003c/div>\n        \u003cdiv class=\"terminal-dot\" style=\"background:#27C93F\">\u003c/div>\n        \u003cspan class=\"terminal-title\">bash — Git 기본 워크플로우\u003c/span>\n      \u003c/div>\n      \u003cdiv class=\"terminal-body\">\n        \u003cdiv>\u003cspan class=\"comment\"># 저장소 초기화 또는 클론\u003c/span>\u003c/div>\n        \u003cdiv>\u003cspan class=\"cmd\">git init\u003c/span> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\u003cspan class=\"comment\"># 새 저장소 만들기\u003c/span>\u003c/div>\n        \u003cdiv>\u003cspan class=\"cmd\">git clone\u003c/span> [URL] &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\u003cspan class=\"comment\"># 원격 저장소 복제\u003c/span>\u003c/div>\n        \u003cbr/>\n        \u003cdiv>\u003cspan class=\"comment\"># 변경 사항 기록\u003c/span>\u003c/div>\n        \u003cdiv>\u003cspan class=\"cmd\">git status\u003c/span> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\u003cspan class=\"comment\"># 현재 상태 확인\u003c/span>\u003c/div>\n        \u003cdiv>\u003cspan class=\"cmd\">git add .\u003c/span> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\u003cspan class=\"comment\"># 모든 변경 파일 스테이징\u003c/span>\u003c/div>\n        \u003cdiv>\u003cspan class=\"cmd\">git commit -m\u003c/span> \"메시지\" &nbsp;\u003cspan class=\"comment\"># 커밋 생성\u003c/span>\u003c/div>\n        \u003cbr/>\n        \u003cdiv>\u003cspan class=\"comment\"># 원격 저장소 동기화\u003c/span>\u003c/div>\n        \u003cdiv>\u003cspan class=\"cmd\">git push origin main\u003c/span> &nbsp;\u003cspan class=\"comment\"># 원격에 업로드\u003c/span>\u003c/div>\n        \u003cdiv>\u003cspan class=\"cmd\">git pull\u003c/span> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\u003cspan class=\"comment\"># 원격 변경 사항 가져오기\u003c/span>\u003c/div>\n        \u003cbr/>\n        \u003cdiv>\u003cspan class=\"comment\"># 브랜치 관리\u003c/span>\u003c/div>\n        \u003cdiv>\u003cspan class=\"cmd\">git branch feature/login\u003c/span> \u003cspan class=\"comment\"># 브랜치 생성\u003c/span>\u003c/div>\n        \u003cdiv>\u003cspan class=\"cmd\">git checkout -b\u003c/span> feature/login \u003cspan class=\"comment\"># 생성+이동\u003c/span>\u003c/div>\n        \u003cdiv>\u003cspan class=\"cmd\">git merge feature/login\u003c/span> &nbsp;\u003cspan class=\"comment\"># 브랜치 합치기\u003c/span>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv style=\"margin-top:32px;\">\n      \u003ch3 style=\"font-size:18px;font-weight:700;margin-bottom:20px;\">브랜치 전략 (Git Flow)\u003c/h3>\n      \u003cdiv class=\"flow-container\">\n        \u003cdiv class=\"flow-branches\">\n          \u003cdiv class=\"branch-row\">\n            \u003cdiv class=\"branch-label\" style=\"color:#3FB950\">main\u003c/div>\n            \u003cdiv class=\"branch-line\">\n              \u003cdiv class=\"commit main-color\">\u003cspan class=\"commit-label\">v1.0\u003c/span>\u003c/div>\n              \u003cdiv class=\"commit-line main-line\">\u003c/div>\n              \u003cdiv class=\"commit main-color\">\u003cspan class=\"commit-label\">v1.1\u003c/span>\u003c/div>\n              \u003cdiv class=\"commit-line main-line\">\u003c/div>\n              \u003cdiv class=\"commit main-color\" style=\"background:#3FB950\">\u003cspan class=\"commit-label\">v2.0\u003c/span>\u003c/div>\n              \u003cdiv class=\"commit-line main-line\">\u003c/div>\n              \u003cdiv class=\"commit main-color\">\u003c/div>\n            \u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"branch-row\">\n            \u003cdiv class=\"branch-label\" style=\"color:#58A6FF\">develop\u003c/div>\n            \u003cdiv class=\"branch-line\">\n              \u003cdiv class=\"commit dev-color\">\u003c/div>\n              \u003cdiv class=\"commit-line dev-line\">\u003c/div>\n              \u003cdiv class=\"commit dev-color\">\u003c/div>\n              \u003cdiv class=\"commit-line dev-line\">\u003c/div>\n              \u003cdiv class=\"commit dev-color\">\u003c/div>\n              \u003cdiv class=\"commit-line dev-line\">\u003c/div>\n              \u003cdiv class=\"commit dev-color\">\u003c/div>\n            \u003c/div>\n          \u003c/div>\n          \u003cdiv class=\"branch-row\">\n            \u003cdiv class=\"branch-label\" style=\"color:#BC8CFF\">feature\u003c/div>\n            \u003cdiv class=\"branch-line\">\n              \u003cdiv style=\"flex:0.5;height:3px\">\u003c/div>\n              \u003cdiv class=\"commit feat-color\">\u003c/div>\n              \u003cdiv class=\"commit-line feat-line\">\u003c/div>\n              \u003cdiv class=\"commit feat-color\">\u003c/div>\n              \u003cdiv class=\"commit-line feat-line\">\u003c/div>\n              \u003cdiv class=\"commit feat-color\">\u003c/div>\n              \u003cdiv style=\"flex:1\">\u003c/div>\n            \u003c/div>\n          \u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 핵심 기능 -->\n\u003csection class=\"section\" id=\"features\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">2\u003c/div>\u003cspan class=\"label\">Key Features\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">GitHub 핵심 기능\u003c/h2>\n    \u003cp class=\"section-sub\">코드 협업과 개발 자동화를 위한 강력한 도구들입니다.\u003c/p>\n    \u003cdiv class=\"feature-grid\">\n      \u003cdiv class=\"feature-card\">\n        \u003cdiv class=\"fi\">🔀\u003c/div>\n        \u003ch3>Pull Request (PR)\u003c/h3>\n        \u003cp>변경 사항을 코드 리뷰를 거쳐 병합하는 협업 워크플로우. 코드 품질 유지의 핵심입니다.\u003c/p>\n        \u003cspan class=\"feature-tag\">협업 필수\u003c/span>\n      \u003c/div>\n      \u003cdiv class=\"feature-card\">\n        \u003cdiv class=\"fi\">🐛\u003c/div>\n        \u003ch3>Issues\u003c/h3>\n        \u003cp>버그 리포트, 기능 요청, 할 일 관리를 위한 이슈 트래커. 라벨, 마일스톤, 담당자 지정 가능.\u003c/p>\n        \u003cspan class=\"feature-tag blue\">프로젝트 관리\u003c/span>\n      \u003c/div>\n      \u003cdiv class=\"feature-card\">\n        \u003cdiv class=\"fi\">⚡\u003c/div>\n        \u003ch3>GitHub Actions\u003c/h3>\n        \u003cp>코드 푸시, PR 등의 이벤트에 자동으로 빌드·테스트·배포를 실행하는 CI/CD 자동화 도구.\u003c/p>\n        \u003cspan class=\"feature-tag\">자동화\u003c/span>\n      \u003c/div>\n      \u003cdiv class=\"feature-card\">\n        \u003cdiv class=\"fi\">🤖\u003c/div>\n        \u003ch3>GitHub Copilot\u003c/h3>\n        \u003cp>AI 기반 코드 자동완성 도구. 주석을 작성하면 코드를 제안하고, 전체 함수도 생성합니다.\u003c/p>\n        \u003cspan class=\"feature-tag purple\">AI 코딩\u003c/span>\n      \u003c/div>\n      \u003cdiv class=\"feature-card\">\n        \u003cdiv class=\"fi\">📦\u003c/div>\n        \u003ch3>Packages\u003c/h3>\n        \u003cp>npm, Docker, Maven 등의 패키지를 GitHub 내에서 바로 배포하고 관리합니다.\u003c/p>\n        \u003cspan class=\"feature-tag blue\">패키지 관리\u003c/span>\n      \u003c/div>\n      \u003cdiv class=\"feature-card\">\n        \u003cdiv class=\"fi\">🌐\u003c/div>\n        \u003ch3>GitHub Pages\u003c/h3>\n        \u003cp>저장소에서 직접 정적 웹사이트를 무료로 호스팅합니다. 포트폴리오, 문서 사이트에 최적.\u003c/p>\n        \u003cspan class=\"feature-tag\">무료 호스팅\u003c/span>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- Actions -->\n\u003csection class=\"section\" id=\"actions\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">3\u003c/div>\u003cspan class=\"label\">GitHub Actions\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">GitHub Actions — CI/CD 자동화\u003c/h2>\n    \u003cp class=\"section-sub\">코드를 푸시하면 자동으로 테스트하고 배포하는 파이프라인을 구성합니다.\u003c/p>\n    \u003cdiv class=\"actions-flow\">\n      \u003cdiv class=\"action-step\">\u003cdiv class=\"as-icon\">💾\u003c/div>\u003ch4>코드 Push\u003c/h4>\u003cp>개발자가 GitHub에 코드 업로드\u003c/p>\u003c/div>\n      \u003cdiv class=\"action-arrow\">→\u003c/div>\n      \u003cdiv class=\"action-step\">\u003cdiv class=\"as-icon\">🔧\u003c/div>\u003ch4>Build\u003c/h4>\u003cp>빌드 환경 설정 및 의존성 설치\u003c/p>\u003c/div>\n      \u003cdiv class=\"action-arrow\">→\u003c/div>\n      \u003cdiv class=\"action-step\">\u003cdiv class=\"as-icon\">🧪\u003c/div>\u003ch4>Test\u003c/h4>\u003cp>자동 테스트 실행 및 결과 확인\u003c/p>\u003c/div>\n      \u003cdiv class=\"action-arrow\">→\u003c/div>\n      \u003cdiv class=\"action-step\">\u003cdiv class=\"as-icon\">🚀\u003c/div>\u003ch4>Deploy\u003c/h4>\u003cp>서버 또는 클라우드에 자동 배포\u003c/p>\u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"terminal\" style=\"margin-top:28px;\">\n      \u003cdiv class=\"terminal-header\">\n        \u003cdiv class=\"terminal-dot\" style=\"background:#FF5F56\">\u003c/div>\n        \u003cdiv class=\"terminal-dot\" style=\"background:#FFBD2E\">\u003c/div>\n        \u003cdiv class=\"terminal-dot\" style=\"background:#27C93F\">\u003c/div>\n        \u003cspan class=\"terminal-title\">.github/workflows/ci.yml\u003c/span>\n      \u003c/div>\n      \u003cdiv class=\"terminal-body\">\n        \u003cdiv style=\"color:#BC8CFF\">name: \u003cspan style=\"color:#E6EDF3\">CI Pipeline\u003c/span>\u003c/div>\n        \u003cdiv style=\"color:#BC8CFF\">on: \u003cspan style=\"color:#E6EDF3\">[push, pull_request]\u003c/span>\u003c/div>\n        \u003cdiv style=\"color:#BC8CFF\">jobs:\u003c/div>\n        \u003cdiv>&nbsp;&nbsp;\u003cspan style=\"color:#58A6FF\">test:\u003c/span>\u003c/div>\n        \u003cdiv>&nbsp;&nbsp;&nbsp;&nbsp;\u003cspan style=\"color:#BC8CFF\">runs-on: \u003cspan style=\"color:#E6EDF3\">ubuntu-latest\u003c/span>\u003c/span>\u003c/div>\n        \u003cdiv>&nbsp;&nbsp;&nbsp;&nbsp;\u003cspan style=\"color:#BC8CFF\">steps:\u003c/span>\u003c/div>\n        \u003cdiv>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\u003cspan style=\"color:#E6EDF3\">- uses: actions/checkout@v4\u003c/span>\u003c/div>\n        \u003cdiv>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\u003cspan style=\"color:#E6EDF3\">- name: \u003cspan style=\"color:#3FB950\">Run Tests\u003c/span>\u003c/span>\u003c/div>\n        \u003cdiv>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\u003cspan style=\"color:#BC8CFF\">run: \u003cspan style=\"color:#E6EDF3\">npm test\u003c/span>\u003c/span>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 단축키 -->\n\u003csection class=\"section\" id=\"shortcuts\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">4\u003c/div>\u003cspan class=\"label\">Shortcuts\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">GitHub 웹 단축키\u003c/h2>\n    \u003cp class=\"section-sub\">\u003ckbd>?\u003c/kbd> 키를 누르면 현재 페이지의 모든 단축키를 볼 수 있습니다.\u003c/p>\n    \u003ctable class=\"shortcut-table\">\n      \u003cthead>\u003ctr>\u003cth>기능\u003c/th>\u003cth>단축키\u003c/th>\u003cth>설명\u003c/th>\u003c/tr>\u003c/thead>\n      \u003ctbody>\n        \u003ctr>\u003ctd>파일 검색\u003c/td>\u003ctd>\u003cspan class=\"key\">T\u003c/span>\u003c/td>\u003ctd>저장소 내 파일 검색\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>전체 검색\u003c/td>\u003ctd>\u003cspan class=\"key\">/\u003c/span>\u003c/td>\u003ctd>검색창 포커스\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>커맨드 팔레트\u003c/td>\u003ctd>\u003cspan class=\"key\">Ctrl\u003c/span>+\u003cspan class=\"key\">K\u003c/span>\u003c/td>\u003ctd>빠른 명령 실행\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>새 이슈\u003c/td>\u003ctd>\u003cspan class=\"key\">C\u003c/span>\u003c/td>\u003ctd>이슈 목록에서 새 이슈 생성\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>이슈 할당\u003c/td>\u003ctd>\u003cspan class=\"key\">A\u003c/span>\u003c/td>\u003ctd>이슈/PR에서 담당자 지정\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>라벨 지정\u003c/td>\u003ctd>\u003cspan class=\"key\">L\u003c/span>\u003c/td>\u003ctd>이슈/PR에서 라벨 지정\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>코드 블록 하이라이트\u003c/td>\u003ctd>줄 번호 클릭 후 \u003cspan class=\"key\">Shift\u003c/span>+클릭\u003c/td>\u003ctd>여러 줄 선택 후 공유\u003c/td>\u003c/tr>\n        \u003ctr>\u003ctd>PR 수정 없이 merge\u003c/td>\u003ctd>\u003cspan class=\"key\">Ctrl\u003c/span>+\u003cspan class=\"key\">Enter\u003c/span>\u003c/td>\u003ctd>PR 코멘트 제출\u003c/td>\u003c/tr>\n      \u003c/tbody>\n    \u003c/table>\n  \u003c/div>\n\u003c/section>\n\n\u003c!-- 팁 -->\n\u003csection class=\"section\" id=\"tips\" style=\"background: white;\">\n  \u003cdiv class=\"section-inner\">\n    \u003cdiv class=\"section-num\">\u003cdiv class=\"num\">5\u003c/div>\u003cspan class=\"label\">Pro Tips\u003c/span>\u003c/div>\n    \u003ch2 class=\"section-title\">실전 GitHub 활용 팁\u003c/h2>\n    \u003cp class=\"section-sub\">개발 효율을 높이는 GitHub 노하우입니다.\u003c/p>\n    \u003cdiv style=\"display:flex;flex-direction:column;gap:16px;\">\n      \u003cdiv style=\"background:white;border-left:4px solid #3FB950;border-radius:0 8px 8px 0;padding:20px 24px;box-shadow:var(--shadow);\">\n        \u003cstrong style=\"display:block;margin-bottom:6px;font-size:15px;\">🤖 GitHub Copilot + Claude Code 조합\u003c/strong>\n        \u003cp style=\"font-size:14px;color:var(--text-2);\">VS Code에서 GitHub Copilot으로 인라인 코드 완성, 터미널에서 Claude Code로 복잡한 리팩토링. 두 AI를 역할에 맞게 사용하면 생산성이 극대화됩니다.\u003c/p>\n      \u003c/div>\n      \u003cdiv style=\"background:white;border-left:4px solid #58A6FF;border-radius:0 8px 8px 0;padding:20px 24px;box-shadow:var(--shadow);\">\n        \u003cstrong style=\"display:block;margin-bottom:6px;font-size:15px;\">📝 커밋 메시지 컨벤션\u003c/strong>\n        \u003cp style=\"font-size:14px;color:var(--text-2);\">feat: 새 기능 | fix: 버그 수정 | docs: 문서 | style: 포맷 | refactor: 리팩토링 | test: 테스트. 이 규칙으로 커밋 히스토리가 깔끔해집니다.\u003c/p>\n      \u003c/div>\n      \u003cdiv style=\"background:white;border-left:4px solid #BC8CFF;border-radius:0 8px 8px 0;padding:20px 24px;box-shadow:var(--shadow);\">\n        \u003cstrong style=\"display:block;margin-bottom:6px;font-size:15px;\">🔒 .gitignore 꼭 설정하기\u003c/strong>\n        \u003cp style=\"font-size:14px;color:var(--text-2);\">API 키, 환경변수(.env), node_modules, __pycache__ 등은 절대 커밋하면 안 됩니다. gitignore.io에서 자신의 스택에 맞는 .gitignore를 자동 생성하세요.\u003c/p>\n      \u003c/div>\n      \u003cdiv style=\"background:white;border-left:4px solid #F0883E;border-radius:0 8px 8px 0;padding:20px 24px;box-shadow:var(--shadow);\">\n        \u003cstrong style=\"display:block;margin-bottom:6px;font-size:15px;\">⭐ GitHub Stars & Trending\u003c/strong>\n        \u003cp style=\"font-size:14px;color:var(--text-2);\">github.com/trending에서 매일 인기 오픈소스 프로젝트를 확인하세요. 좋은 코드를 읽는 것이 최고의 학습입니다.\u003c/p>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection class=\"done-section\">\n  \u003ch2>🐙 코드를 세상과 공유하세요\u003c/h2>\n  \u003cp>첫 저장소를 만들고, 첫 커밋을 남겨보세요.\u003c/p>\n  \u003ca class=\"done-link\" href=\"https://github.com\" target=\"_blank\">🐙 GitHub 시작하기\u003c/a>\n\u003c/section>\n\n\u003cfooter>\n  \u003cp>GitHub은 Microsoft가 운영하는 세계 최대 코드 호스팅 플랫폼입니다.\u003c/p>\n  \u003cp style=\"margin-top:8px;\">공식 사이트: \u003ca href=\"https://github.com\" target=\"_blank\">github.com\u003c/a> &nbsp;|&nbsp; 문서: \u003ca href=\"https://docs.github.com\" target=\"_blank\">docs.github.com\u003c/a>\u003c/p>\n\u003c/footer>\n\u003cbutton class=\"back-top\" id=\"backTop\" onclick=\"window.scrollTo({top:0,behavior:'smooth'})\">↑\u003c/button>\n\u003cscript>\n  window.addEventListener('scroll', () => { document.getElementById('backTop').classList.toggle('visible', window
